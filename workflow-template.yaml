apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-exec
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-exec"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-exec"
    ai.sap.com/version: "28.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - bash
      - -c
      - |
        echo "=== V28 TILLER FOCUSED CHECK ==="
        echo "=== $(date -u) ==="

        # Get known service IPs from Envoy first
        echo "=== ENVOY CLUSTERS WITH PORTS ==="
        curl -s http://localhost:15000/clusters 2>&1 | grep -E "44134|tiller|helm" | head -20
        echo "---"

        # Get ALL cluster IPs from Envoy for cross-reference
        echo "=== ALL ENVOY CLUSTER IPs ==="
        curl -s http://localhost:15000/clusters 2>&1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+' | sort -u | head -50
        echo "---"

        # DNS lookup for tiller
        echo "=== DNS LOOKUPS ==="
        for name in tiller tiller-deploy helm; do
          for ns in kube-system default istio-system; do
            result=$(nslookup ${name}.${ns}.svc.cluster.local 2>&1 | grep -A1 "Name:" | tail -1)
            if [ -n "$result" ] && ! echo "$result" | grep -q "NXDOMAIN"; then
              echo "[+] ${name}.${ns}: $result"
            fi
          done
        done
        echo "---"

        # Targeted nmap - just the service subnet, port 44134 only, aggressive timing
        echo "=== NMAP 100.104.0.0/24 port 44134 ==="
        nmap -Pn -sS -p44134 --open -T5 --max-retries 1 --host-timeout 2s 100.104.0.0/24 2>&1 | grep -E "open|Nmap scan report"
        echo "=== NMAP 100.104.1.0/24 port 44134 ==="
        nmap -Pn -sS -p44134 --open -T5 --max-retries 1 --host-timeout 2s 100.104.1.0/24 2>&1 | grep -E "open|Nmap scan report"

        # Also try the pod subnet where it might have moved
        echo "=== NMAP pod subnets 44134 ==="
        for sub in 100.64.38 100.64.42 100.64.49 100.64.52 100.64.54 100.64.58 100.64.59 100.64.63 100.64.68 100.64.79; do
          result=$(nmap -Pn -sS -p44134 --open -T5 --max-retries 1 --host-timeout 1s ${sub}.0/24 2>&1 | grep "open")
          if [ -n "$result" ]; then
            echo "[+] FOUND on ${sub}.0/24: $result"
          fi
        done
        echo "---"

        # Direct TCP check on the IPs from previous recon8 (if we had specific ones)
        echo "=== DIRECT TCP PROBES 44134 ==="
        for ip in 100.104.0.1 100.104.0.10 100.104.0.53 100.104.0.100 100.104.0.150 100.104.0.200 100.104.1.1 100.104.1.10 100.104.1.100; do
          nc -z -w1 $ip 44134 2>/dev/null && echo "[+] $ip:44134 OPEN" || true
        done

        # Also check 27017 (MongoDB) and 15014 (Istiod) while we're here
        echo "=== BONUS: MongoDB 27017 check ==="
        nmap -Pn -sS -p27017 --open -T5 --max-retries 1 --host-timeout 2s 100.104.0.0/24 2>&1 | grep -E "open|Nmap scan report"
        echo "=== BONUS: Istiod 15014 direct ==="
        curl -s --connect-timeout 2 "http://100.64.79.247:15014/debug/registryz" 2>&1 | head -c 500
        echo ""

        echo "=== V28 DONE ==="
